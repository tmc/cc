<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CASS — Coding Agent Session Search</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app"></div>
<script type="module">
import { html, render } from 'https://esm.sh/htm@3/preact?deps=preact@10';
import { useState, useEffect, useCallback, useRef, useMemo } from 'https://esm.sh/preact@10/hooks';

// --- API helpers ---

async function api(path, opts) {
  const r = await fetch('/api/' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function qs(params) {
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) {
    if (v) p.set(k, v);
  }
  return p.toString();
}

// --- Utilities ---

function relTime(ts) {
  if (!ts) return '';
  const d = Date.now() - new Date(ts).getTime();
  const m = Math.floor(d / 60000);
  if (m < 1) return 'now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const days = Math.floor(h / 24);
  if (days < 7) return days + 'd ago';
  return ts.slice(0, 10);
}

function shortProject(ws) {
  if (!ws) return '';
  const idx = ws.indexOf('github.com/');
  if (idx >= 0) {
    const after = ws.slice(idx + 11);
    const parts = after.split('/');
    return parts.length >= 2 ? parts[0] + '/' + parts[1] : after;
  }
  const parts = ws.split('/');
  return parts.slice(-2).join('/');
}

function fmtDuration(secs) {
  if (!secs) return '';
  if (secs < 60) return secs + 's';
  const m = Math.floor(secs / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
  return '' + n;
}

// --- URL state ---

const TABS = ['search', 'graph', 'map', 'teams', 'stats'];

function tabFromPath() {
  const p = location.pathname.replace(/^\/+|\/+$/g, '');
  return TABS.includes(p) ? p : 'search';
}

function paramsFromURL() {
  return Object.fromEntries(new URLSearchParams(location.search));
}

function pushURL(tab, params) {
  const path = tab === 'search' ? '/' : '/' + tab;
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(params || {})) {
    if (v) p.set(k, v);
  }
  const search = p.toString();
  const url = path + (search ? '?' + search : '');
  if (url !== location.pathname + location.search) {
    history.pushState(null, '', url);
  }
  // Update document title.
  const q = params?.q;
  document.title = q ? `${q} — cass ${tab}` : `cass — ${tab}`;
}

// Tool color map for micro-bars.
const TOOL_COLORS = {
  Bash: 'var(--cyan)', Read: 'var(--green)', Write: 'var(--yellow)',
  Edit: 'var(--orange)', Grep: 'var(--magenta)', Glob: 'var(--accent)',
  Task: 'var(--dim)', WebFetch: 'var(--faint)',
};

// --- Tool micro-bar ---
function ToolMicroBar({ breakdown }) {
  if (!breakdown || Object.keys(breakdown).length === 0) return null;
  const total = Object.values(breakdown).reduce((a, b) => a + b, 0);
  if (total === 0) return null;
  return html`
    <div class="tool-bar">
      ${Object.entries(breakdown).map(([name, count]) => html`
        <div class="tool-bar-seg" style="width:${(count/total*100).toFixed(1)}%;background:${TOOL_COLORS[name]||'var(--faint)'}" title="${name}: ${count}"></div>
      `)}
    </div>
  `;
}

// --- App ---

function App() {
  const [tab, setTabRaw] = useState(tabFromPath);
  const [urlParams, setUrlParams] = useState(paramsFromURL);
  const [navVersion, setNavVersion] = useState(0);  // Incremented on popstate to signal panels.
  const [connected, setConnected] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const searchRef = useRef(null);
  const toastId = useRef(0);

  function setTab(t, params) {
    setTabRaw(t);
    const p = params || {};
    setUrlParams(p);
    pushURL(t, p);
  }

  function updateParams(params) {
    pushURL(tab, params);
  }

  // Browser back/forward.
  useEffect(() => {
    function onPop() {
      setTabRaw(tabFromPath());
      setUrlParams(paramsFromURL());
      setNavVersion(v => v + 1);
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // SSE connection.
  useEffect(() => {
    const es = new EventSource('/events');
    es.onopen = () => setConnected(true);
    es.onerror = () => setConnected(false);
    es.addEventListener('session_change', (e) => {
      const data = JSON.parse(e.data);
      showToast(data.files_changed + ' session(s) updated');
      window.dispatchEvent(new CustomEvent('cass:refresh'));
    });
    es.addEventListener('index_complete', (e) => {
      const data = JSON.parse(e.data);
      showToast('Indexed ' + data.indexed + ' sessions');
      window.dispatchEvent(new CustomEvent('cass:refresh'));
    });
    es.addEventListener('team_message', (e) => {
      window.dispatchEvent(new CustomEvent('cass:team_message', { detail: JSON.parse(e.data) }));
    });
    return () => es.close();
  }, []);

  function showToast(msg) {
    const id = ++toastId.current;
    setToasts(prev => [...prev.slice(-2), { id, msg, show: true }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, show: false } : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
    }, 3000);
  }

  // Global keyboard shortcuts.
  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setPaletteOpen(p => !p);
        return;
      }
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        if (e.key === 'Escape') { e.target.blur(); setPaletteOpen(false); }
        return;
      }
      if (e.key === '/') { e.preventDefault(); setTab('search'); setTimeout(() => searchRef.current?.focus(), 50); return; }
      if (e.key === 'Escape') { setPaletteOpen(false); return; }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return html`
    <div class="app">
      <div class="header">
        <h1>cass <span>session search</span></h1>
        <div class="live-badge">
          <div class="live-dot ${connected ? 'connected' : ''}"></div>
          ${connected ? 'live' : 'disconnected'}
        </div>
      </div>
      <div class="tabs" role="tablist">
        ${TABS.map(t => html`
          <button class="tab ${tab === t ? 'active' : ''}" onClick=${() => setTab(t)}
            role="tab" aria-selected=${tab === t}>${t}</button>
        `)}
      </div>
      ${tab === 'search' && html`<${SearchPanel} searchRef=${searchRef} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} onNavigate=${setTab} />`}
      ${tab === 'graph' && html`<${GraphPanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} />`}
      ${tab === 'map' && html`<${MapPanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} />`}
      ${tab === 'teams' && html`<${TeamsPanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} />`}
      ${tab === 'stats' && html`<${StatsPanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} />`}

      <div class="toast-container" aria-live="polite">
        ${toasts.map(t => html`<div class="toast ${t.show ? 'show' : ''}" key=${t.id}>${t.msg}</div>`)}
      </div>

      <${CommandPalette} open=${paletteOpen} onClose=${() => setPaletteOpen(false)}
        onNavigate=${(id) => { setTab(id, {}); setPaletteOpen(false); }}
        onFocusSearch=${() => { setTab('search', urlParams); setPaletteOpen(false); setTimeout(() => searchRef.current?.focus(), 50); }} />
    </div>
  `;
}

// --- Command Palette ---

function CommandPalette({ open, onClose, onNavigate, onFocusSearch }) {
  const [query, setQuery] = useState('');
  const [focused, setFocused] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => {
    if (open) { setQuery(''); setFocused(0); setTimeout(() => inputRef.current?.focus(), 50); }
  }, [open]);

  const actions = [
    { label: 'Search sessions', hint: '/', action: onFocusSearch },
    { label: 'View graph', hint: '', action: () => onNavigate('graph') },
    { label: 'View map', hint: '', action: () => onNavigate('map') },
    { label: 'View teams', hint: '', action: () => onNavigate('teams') },
    { label: 'View stats', hint: '', action: () => onNavigate('stats') },
  ];

  const filtered = query
    ? actions.filter(a => a.label.toLowerCase().includes(query.toLowerCase()))
    : actions;

  function onKeyDown(e) {
    if (e.key === 'ArrowDown') { e.preventDefault(); setFocused(f => Math.min(f + 1, filtered.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setFocused(f => Math.max(f - 1, 0)); }
    else if (e.key === 'Enter' && filtered[focused]) { filtered[focused].action(); }
    else if (e.key === 'Escape') { onClose(); }
  }

  return html`
    <div class="palette-backdrop ${open ? 'open' : ''}" onClick=${onClose}></div>
    <div class="palette ${open ? 'open' : ''}" role="dialog" aria-label="Command palette">
      <input ref=${inputRef} class="palette-input" type="text" placeholder="Type a command..."
        value=${query} onInput=${e => { setQuery(e.target.value); setFocused(0); }} onKeyDown=${onKeyDown} />
      <div class="palette-section">
        <div class="palette-section-title">Actions</div>
        ${filtered.map((a, i) => html`
          <div class="palette-item ${i === focused ? 'focused' : ''}" onClick=${a.action}
            onMouseEnter=${() => setFocused(i)}>
            <span>${a.label}</span>
            ${a.hint && html`<span class="palette-item-hint">${a.hint}</span>`}
          </div>
        `)}
      </div>
    </div>
  `;
}

// --- Search Panel ---

function SearchPanel({ searchRef, urlParams, updateParams, navVersion, onNavigate }) {
  const [query, setQueryRaw] = useState(urlParams.q || '');
  const [agent, setAgentRaw] = useState(urlParams.agent || '');
  const [workspace, setWorkspaceRaw] = useState(urlParams.workspace || '');
  const [since, setSinceRaw] = useState(urlParams.since || '');
  const [sort, setSortRaw] = useState(urlParams.sort || '');
  const [team, setTeamRaw] = useState(urlParams.team || '');
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [selectedIdx, setSelectedIdx] = useState(-1);

  function setQuery(v) { setQueryRaw(v); }
  function setAgent(v) { setAgentRaw(v); }
  function setWorkspace(v) { setWorkspaceRaw(v); }
  function setSince(v) { setSinceRaw(v); }
  function setSort(v) { setSortRaw(v); }
  function setTeam(v) { setTeamRaw(v); }

  // Push URL on state changes (debounced with the search).
  const urlRef = useRef(null);
  useEffect(() => {
    clearTimeout(urlRef.current);
    urlRef.current = setTimeout(() => updateParams({ q: query, agent, workspace, since, sort, team }), 300);
    return () => clearTimeout(urlRef.current);
  }, [query, agent, workspace, since, sort, team]);

  // Restore state from URL on browser navigation.
  useEffect(() => {
    if (navVersion === 0) return;
    setQueryRaw(urlParams.q || '');
    setAgentRaw(urlParams.agent || '');
    setWorkspaceRaw(urlParams.workspace || '');
    setSinceRaw(urlParams.since || '');
    setSortRaw(urlParams.sort || '');
    setTeamRaw(urlParams.team || '');
  }, [navVersion]);

  const effectiveSort = sort || (query ? 'relevance' : 'recent');

  const doSearch = useCallback(async () => {
    setLoading(true);
    try {
      const params = { q: query, agent, workspace, since, sort: sort || '', team, limit: '30' };
      const r = await api('search?' + qs(params));
      setResults(r);
    } catch (e) {
      console.error('search:', e);
    }
    setLoading(false);
  }, [query, agent, workspace, since, sort, team]);

  // Debounced live search.
  useEffect(() => {
    const id = setTimeout(doSearch, 250);
    return () => clearTimeout(id);
  }, [query, agent, workspace, since, sort, team]);

  // Auto-refresh on SSE.
  useEffect(() => {
    const handler = () => doSearch();
    window.addEventListener('cass:refresh', handler);
    return () => window.removeEventListener('cass:refresh', handler);
  }, [doSearch]);

  // j/k keyboard navigation.
  useEffect(() => {
    function onKey(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const hits = results?.hits;
      if (!hits || hits.length === 0) return;
      if (e.key === 'j') { e.preventDefault(); setSelectedIdx(i => Math.min(i + 1, hits.length - 1)); }
      else if (e.key === 'k') { e.preventDefault(); setSelectedIdx(i => Math.max(i - 1, 0)); }
      else if (e.key === 'Enter' && selectedIdx >= 0) { e.preventDefault(); setSelected(hits[selectedIdx]); }
      else if (e.key === 'Escape' && selected) { e.preventDefault(); setSelected(null); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [results, selectedIdx, selected]);

  const timePresets = [
    { label: '1h', value: '1h' },
    { label: '24h', value: '24h' },
    { label: '7d', value: '168h' },
    { label: '30d', value: '720h' },
  ];

  const sortModes = [
    { value: 'recent', label: 'Recent' },
    { value: 'relevance', label: 'Relevance' },
    { value: 'started', label: 'Started' },
    { value: 'oldest', label: 'Oldest' },
  ];

  return html`
    <div>
      <div class="search-bar">
        <input ref=${searchRef} class="search-input" type="text" placeholder="search sessions..."
          value=${query} onInput=${e => setQuery(e.target.value)} autofocus />
        <span class="search-kbd">/</span>
      </div>
      <div class="filters">
        <div class="filter-chips">
          ${timePresets.map(t => html`
            <button class="filter-chip ${since === t.value ? 'active' : ''}"
              onClick=${() => setSince(since === t.value ? '' : t.value)}>${t.label}</button>
          `)}
        </div>
        <input class="filter-input" placeholder="agent" value=${agent}
          onInput=${e => setAgent(e.target.value)} style="width:100px" />
        <input class="filter-input" placeholder="workspace" value=${workspace}
          onInput=${e => setWorkspace(e.target.value)} />
        <input class="filter-input" placeholder="team" value=${team}
          onInput=${e => setTeam(e.target.value)} style="width:100px" />
        <span class="sort-group">
          ${sortModes.map(m => html`
            <button class="sort-pill ${effectiveSort === m.value ? 'active' : ''}"
              onClick=${() => setSort(sort === m.value ? '' : m.value)}>${m.label}</button>
          `)}
        </span>
      </div>

      ${loading && !results && html`<div class="loading">searching...</div>`}
      ${results && html`<div class="result-count" style="text-align:right;padding:0 0 8px">${results.total_count || 0} results</div>`}
      ${results && results.hits && results.hits.length > 0 && html`
        <ul class="results">
          ${results.hits.map((h, i) => html`
            <${HitItem} key=${h.session_id} hit=${h} num=${i + 1}
              isSelected=${selected?.session_id === h.session_id}
              isFocused=${i === selectedIdx}
              onClick=${() => { setSelected(h); setSelectedIdx(i); }}
              onTeamClick=${onNavigate ? (name) => onNavigate('teams', { name }) : null} />
          `)}
        </ul>
      `}
      ${results && (!results.hits || results.hits.length === 0) && !loading && html`
        <div class="empty">no results</div>
      `}

      <div class="detail-overlay ${selected ? 'open' : ''}" onClick=${() => setSelected(null)}></div>
      <${SessionDetailPanel} hit=${selected} onClose=${() => setSelected(null)} />
    </div>
  `;
}

// --- Hit Item ---

function HitItem({ hit: h, num, onClick, isSelected, isFocused, onTeamClick }) {
  const stats = [];
  if (h.tool_calls) stats.push(h.tool_calls + ' tools');
  if (h.turns > 1) stats.push(h.turns + ' turns');
  if (h.files_edited) stats.push(h.files_edited + ' files');
  if (h.lines_written) stats.push(h.lines_written + ' lines');
  const tok = (h.input_tokens || 0) + (h.output_tokens || 0);
  if (tok >= 1000) stats.push(fmtNum(tok) + ' tok');
  if (h.duration_secs) stats.push(fmtDuration(h.duration_secs));

  const it2 = [];
  if (h.it2_splits) it2.push(h.it2_splits + ' splits');
  if (h.it2_sends) it2.push(h.it2_sends + ' msgs');
  if (h.it2_screens) it2.push(h.it2_screens + ' reads');

  return html`
    <li class="hit ${isSelected ? 'selected' : ''}" onClick=${onClick} tabindex="0">
      <div class="hit-header">
        <span class="hit-num">${num}.</span>
        <span class="hit-agent">[${h.agent}]</span>
        ${h.team_name && html`<span class="hit-team" onClick=${(e) => { e.stopPropagation(); onTeamClick && onTeamClick(h.team_name); }}>${h.team_name}${h.agent_name ? ':' + h.agent_name : ''}</span>`}
        <span class="hit-title">${h.title || 'Untitled'}</span>
        ${h.sparkline && html`<span class="hit-sparkline">${h.sparkline}</span>`}
      </div>
      ${h.snippet && html`<div class="hit-snippet">${h.snippet}</div>`}
      <div class="hit-meta">
        ${h.workspace && html`<span class="hit-workspace">${shortProject(h.workspace)}</span>`}
        ${h.started_at && html`<span class="hit-time">${relTime(h.started_at)}${h.ended_at && relTime(h.ended_at) !== relTime(h.started_at) ? ' → ' + relTime(h.ended_at) : ''}</span>`}
        ${stats.length > 0 && html`<span class="hit-stats">${stats.join(' | ')}</span>`}
        ${h.compactions > 0 && html`<span class="hit-compactions">${h.compactions} compaction${h.compactions > 1 ? 's' : ''}</span>`}
        ${it2.length > 0 && html`<span class="hit-it2">it2: ${it2.join(', ')}</span>`}
      </div>
      <${ToolMicroBar} breakdown=${h.tool_breakdown} />
    </li>
  `;
}

// --- Session Detail Panel (slide-in, SSE streaming, conversation view) ---

function SessionDetailPanel({ hit, onClose }) {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(false);
  const [streaming, setStreaming] = useState(false);
  const [entryCount, setEntryCount] = useState(0);
  const [expanded, setExpanded] = useState({});
  const bodyRef = useRef(null);

  useEffect(() => {
    if (!hit) { setEntries([]); setEntryCount(0); return; }
    setLoading(true);
    setStreaming(true);
    setEntries([]);
    setEntryCount(0);
    setExpanded({});

    const controller = new AbortController();

    fetch('/api/session/' + hit.session_id, {
      headers: { 'Accept': 'text/event-stream' },
      signal: controller.signal,
    }).then(res => {
      if (!res.ok) throw new Error('failed');
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      function read() {
        reader.read().then(({ done, value }) => {
          if (done) { setLoading(false); setStreaming(false); return; }
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          const batch = [];
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') { setLoading(false); setStreaming(false); return; }
              try { batch.push(JSON.parse(data)); } catch {}
            }
          }
          if (batch.length > 0) {
            setEntries(prev => [...prev, ...batch]);
            setEntryCount(c => c + batch.length);
          }
          read();
        }).catch(() => { setLoading(false); setStreaming(false); });
      }
      read();
    }).catch(err => {
      if (err.name === 'AbortError') return;
      // Fallback to JSON.
      api('session/' + hit.session_id).then(e => {
        setEntries(Array.isArray(e) ? e : []);
        setEntryCount(Array.isArray(e) ? e.length : 0);
      }).catch(() => {}).finally(() => { setLoading(false); setStreaming(false); });
    });

    return () => controller.abort();
  }, [hit?.session_id]);

  // Auto-scroll during streaming.
  useEffect(() => {
    if (streaming && bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [entries.length, streaming]);

  function toggleExpand(key) {
    setExpanded(prev => ({ ...prev, [key]: !prev[key] }));
  }

  function renderConversation() {
    return entries.map((entry, idx) => {
      // Compact boundary: horizontal divider with metadata badge.
      if (entry.type === 'system' && entry.subtype === 'compact_boundary') {
        const meta = entry.compactMetadata;
        const label = meta
          ? (meta.trigger || 'auto') + (meta.preTokens ? ' | ' + fmtNum(meta.preTokens) + ' tok' : '')
          : 'compacted';
        return html`
          <div class="conv-compact-boundary" key=${idx}>
            <span class="conv-compact-badge">compacted (${label})</span>
          </div>
        `;
      }

      // Compact summary: collapsible italic summary text.
      if (entry.isCompactSummary) {
        const summaryText = entry.summary
          || (entry.message && typeof entry.message.content === 'string' ? entry.message.content : '')
          || '';
        if (summaryText) {
          const key = 'cs-' + idx;
          const isExp = expanded[key];
          return html`
            <div class="conv-compact-summary" key=${idx} onClick=${() => toggleExpand(key)}>
              <div class="conv-role">
                <span>compact summary</span>
                <span class="conv-tool-toggle">${isExp ? '[-]' : '[+]'}</span>
              </div>
              <div class="conv-content ${isExp ? '' : 'collapsed'}">${summaryText.slice(0, isExp ? 5000 : 200)}</div>
            </div>
          `;
        }
      }

      // Custom title rename.
      if (entry.type === 'custom-title' && entry.customTitle) {
        return html`<div class="conv-custom-title" key=${idx}>renamed: ${entry.customTitle}</div>`;
      }

      // System entries (non-compact).
      if (entry.type === 'system' && !entry.message) {
        const text = entry.content || entry.summary || '';
        if (!text) return null;
        return html`
          <div class="conv-entry role-system" key=${idx}>
            <div class="conv-role">system</div>
            <div class="conv-content">${text.slice(0, 500)}</div>
          </div>
        `;
      }

      const msg = entry.message;
      if (!msg) return null;
      const role = msg.role || entry.type || 'unknown';
      const content = msg.content;

      if (Array.isArray(content)) {
        return content.map((block, bi) => {
          const key = idx + '-' + bi;
          if (block.type === 'tool_use') {
            const isExp = expanded[key];
            return html`
              <div class="conv-entry role-tool_use" key=${key} onClick=${() => toggleExpand(key)}>
                <div class="conv-role">
                  <span class="conv-tool-name">${block.name || 'tool'}</span>
                  <span class="conv-tool-toggle">${isExp ? '[-]' : '[+]'}</span>
                </div>
                ${isExp && html`<div class="conv-content" style="font-size:11px">${typeof block.input === 'string' ? block.input : JSON.stringify(block.input, null, 2)}</div>`}
              </div>
            `;
          }
          if (block.type === 'tool_result') {
            const isErr = block.is_error;
            const text = typeof block.content === 'string' ? block.content
              : Array.isArray(block.content) ? block.content.map(c => c.text || '').join('\n')
              : JSON.stringify(block.content);
            const isExp = expanded[key];
            return html`
              <div class="conv-entry role-tool_result" key=${key} onClick=${() => toggleExpand(key)}>
                <div class="conv-role">
                  <span class="${isErr ? 'conv-error' : 'conv-success'}">${isErr ? 'error' : 'result'}</span>
                  <span class="conv-tool-toggle">${isExp ? '[-]' : '[+]'}</span>
                </div>
                <div class="conv-content ${isExp ? '' : 'collapsed'}">${text.slice(0, isExp ? 5000 : 200)}</div>
              </div>
            `;
          }
          if (block.type === 'text' || block.text) {
            return html`
              <div class="conv-entry role-${role}" key=${key}>
                <div class="conv-role">${role}</div>
                <div class="conv-content">${(block.text || '').slice(0, 2000)}</div>
              </div>
            `;
          }
          return null;
        });
      }

      if (typeof content === 'string' && content.length > 0) {
        return html`
          <div class="conv-entry role-${role}" key=${idx}>
            <div class="conv-role">${role}</div>
            <div class="conv-content">${content.slice(0, 2000)}</div>
          </div>
        `;
      }
      return null;
    });
  }

  return html`
    <div class="detail-panel ${hit ? 'open' : ''}" role="complementary" aria-label="Session detail">
      ${hit && html`
        <div class="detail-header">
          <div class="detail-header-top">
            <div class="detail-title">${hit.title || 'Untitled'}</div>
            <button class="detail-close" onClick=${onClose}>close</button>
          </div>
          <div class="detail-badges">
            <span class="hit-agent">[${hit.agent}]</span>
            ${hit.team_name && html`<span class="hit-team">${hit.team_name}${hit.agent_name ? ':' + hit.agent_name : ''}</span>`}
            ${hit.workspace && html`<span class="hit-workspace">${shortProject(hit.workspace)}</span>`}
            ${hit.started_at && html`<span class="hit-time">${relTime(hit.started_at)}${hit.ended_at ? ' → ' + relTime(hit.ended_at) : ''}</span>`}
          </div>
          <div class="detail-stat-row">
            ${hit.tool_calls && html`<span>${hit.tool_calls} tools</span>`}
            ${hit.turns > 1 && html`<span>${hit.turns} turns</span>`}
            ${hit.files_edited && html`<span>${hit.files_edited} files</span>`}
            ${hit.duration_secs && html`<span>${fmtDuration(hit.duration_secs)}</span>`}
            ${(hit.input_tokens || hit.output_tokens) && html`<span>${fmtNum((hit.input_tokens||0)+(hit.output_tokens||0))} tok</span>`}
            ${hit.compactions > 0 && html`<span class="hit-compactions">${hit.compactions} compaction${hit.compactions > 1 ? 's' : ''}</span>`}
          </div>
        </div>
        ${hit.team_name && html`
          <div class="detail-team-context">
            <div class="detail-team-context-title">team context</div>
            <span style="color:var(--magenta);font-weight:600">${hit.team_name}</span>
            ${hit.agent_name && html`<span style="color:var(--dim)"> / ${hit.agent_name}</span>`}
          </div>
        `}
        ${streaming && html`
          <div class="detail-streaming">
            <div class="streaming-dot"></div>
            streaming... ${entryCount} entries
          </div>
        `}
        <div class="detail-body" ref=${bodyRef}>
          ${loading && entries.length === 0 && html`<div class="loading">loading session...</div>`}
          <div class="conversation">${renderConversation()}</div>
        </div>
      `}
    </div>
  `;
}

// --- Graph Panel ---

function GraphPanel({ urlParams, updateParams, navVersion }) {
  const [allLinks, setAllLinks] = useState([]);
  const [nodeData, setNodeData] = useState({});  // id -> {workspace, title, started_at, ended_at, tool_calls, turns, tokens, is_active}
  const [timeRange, setTimeRange] = useState({ min: 0, max: 0 });
  const [since, setSinceRaw] = useState(urlParams.since || '24h');
  const [loading, setLoading] = useState(true);
  const [zoom, setZoom] = useState(1);
  const [graphQuery, setGraphQueryRaw] = useState(urlParams.q || '');
  const [wsFilter, setWsFilterRaw] = useState(urlParams.ws || '');

  function setGraphQuery(v) { setGraphQueryRaw(v); updateParams({ since, q: v, ws: wsFilter }); }
  function setSince(v) { setSinceRaw(v); updateParams({ since: v, q: graphQuery, ws: wsFilter }); }
  function setWsFilter(v) { setWsFilterRaw(v); updateParams({ since, q: graphQuery, ws: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSinceRaw(urlParams.since || '24h');
    setGraphQueryRaw(urlParams.q || '');
    setWsFilterRaw(urlParams.ws || '');
  }, [navVersion]);

  // Scrubber state.
  const [scrubberPos, setScrubberPos] = useState(1);  // 0..1 normalized
  const [playing, setPlaying] = useState(false);
  const playRef = useRef(null);

  // Tooltip state.
  const [tooltip, setTooltip] = useState(null);  // {id, x, y}
  const containerRef = useRef(null);

  // Track which links just appeared for animation.
  const prevVisibleCount = useRef(0);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      // Normalize link: ensure .source and .target are short IDs.
      function normLink(lk) {
        return {
          source: (lk.source || lk.source_session || '?').slice(0, 8),
          target: (lk.target || lk.target_session || '?').slice(0, 8),
          kind: lk.kind, action: lk.action, text: lk.text, timestamp: lk.timestamp,
        };
      }

      let nodes = [], links = [], tRange = null;
      try {
        const g = await api('graph?' + qs({ since }));
        nodes = g.nodes || [];
        links = (g.links || []).map(normLink);
        tRange = g.time_range;
      } catch {
        // Fallback to old 2-call pattern.
        const l = await api('links?' + qs({ since }));
        links = (l || []).map(normLink);
        const ids = new Set();
        links.forEach(lk => { ids.add(lk.source); ids.add(lk.target); });
        if (ids.size > 0) {
          const lb = await api('labels?' + qs({ ids: [...ids].join(',') }));
          nodes = [...ids].map(id => {
            const info = (lb || {})[id] || {};
            return { id, workspace: info.workspace || '', title: info.title || '' };
          });
        }
      }

      // Build node lookup.
      const nd = {};
      nodes.forEach(n => { nd[n.id] = n; });

      // Ensure all link endpoints have a node entry.
      links.forEach(l => {
        if (!nd[l.source]) nd[l.source] = { id: l.source };
        if (!nd[l.target]) nd[l.target] = { id: l.target };
      });

      // Compute time range from link timestamps.
      let tMin = Infinity, tMax = -Infinity;
      if (tRange) {
        tMin = new Date(tRange.min).getTime();
        tMax = new Date(tRange.max).getTime();
      } else {
        links.forEach(l => {
          if (l.timestamp) {
            const t = new Date(l.timestamp).getTime();
            if (t < tMin) tMin = t;
            if (t > tMax) tMax = t;
          }
        });
      }
      if (!isFinite(tMin)) tMin = Date.now() - 3600000;
      if (!isFinite(tMax)) tMax = Date.now();
      // Add a small buffer so the last link is visible at max.
      if (tMax <= tMin) tMax = tMin + 1000;

      setAllLinks(links);
      setNodeData(nd);
      setTimeRange({ min: tMin, max: tMax });
      setScrubberPos(1);
      prevVisibleCount.current = links.length;
    } catch (e) { console.error('graph:', e); }
    setLoading(false);
  }, [since]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  // Playback timer.
  useEffect(() => {
    if (!playing) { if (playRef.current) cancelAnimationFrame(playRef.current); return; }
    const duration = 5000; // 5s real time for full playback
    const start = performance.now();
    const startPos = 0;
    function tick(now) {
      const elapsed = now - start;
      const pos = Math.min(1, startPos + elapsed / duration);
      setScrubberPos(pos);
      if (pos < 1) { playRef.current = requestAnimationFrame(tick); }
      else { setPlaying(false); }
    }
    setScrubberPos(0);
    playRef.current = requestAnimationFrame(tick);
    return () => { if (playRef.current) cancelAnimationFrame(playRef.current); };
  }, [playing]);

  function onWheel(e) {
    e.preventDefault();
    setZoom(z => Math.max(0.3, Math.min(3, z + (e.deltaY > 0 ? -0.1 : 0.1))));
  }

  // Unique workspaces from node data for filter chips.
  const workspaces = useMemo(() => {
    const ws = new Set();
    Object.values(nodeData).forEach(n => { if (n.workspace) ws.add(n.workspace); });
    return [...ws].sort();
  }, [nodeData]);

  // Filter nodes by search query and workspace.
  const filteredNodeIds = useMemo(() => {
    const all = Object.keys(nodeData);
    const q = graphQuery.toLowerCase();
    return all.filter(id => {
      const n = nodeData[id];
      if (wsFilter && (!n.workspace || n.workspace !== wsFilter)) return false;
      if (q) {
        const haystack = [id, n.title || '', n.workspace || ''].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });
  }, [nodeData, graphQuery, wsFilter]);

  // Only show links where both endpoints are visible.
  const filteredNodeSet = useMemo(() => new Set(filteredNodeIds), [filteredNodeIds]);

  // Compute scrubber cutoff time.
  const cutoffTime = timeRange.min + (timeRange.max - timeRange.min) * scrubberPos;

  // Filter links by scrubber position and node visibility.
  const visibleLinks = useMemo(() => {
    return allLinks.filter(l => {
      if (!filteredNodeSet.has(l.source) || !filteredNodeSet.has(l.target)) return false;
      if (scrubberPos < 1 && l.timestamp) {
        if (new Date(l.timestamp).getTime() > cutoffTime) return false;
      }
      return true;
    });
  }, [allLinks, cutoffTime, scrubberPos, filteredNodeSet]);

  // Track newly appearing links for animation.
  const newLinkIndices = useMemo(() => {
    const prev = prevVisibleCount.current;
    const curr = visibleLinks.length;
    const indices = new Set();
    if (curr > prev && playing) {
      for (let i = prev; i < curr; i++) indices.add(i);
    }
    prevVisibleCount.current = curr;
    return indices;
  }, [visibleLinks.length, playing]);

  // Count links per node for sizing.
  const nodeLinkCount = useMemo(() => {
    const counts = {};
    visibleLinks.forEach(l => {
      counts[l.source] = (counts[l.source] || 0) + 1;
      counts[l.target] = (counts[l.target] || 0) + 1;
    });
    return counts;
  }, [visibleLinks]);

  if (loading) return html`<div class="loading">loading graph...</div>`;

  const allNodeIds = Object.keys(nodeData);
  if (allNodeIds.length === 0) return html`<div class="empty">no inter-session links found</div>`;

  // Group nodes by workspace for clustered layout.
  const wsGroups = useMemo(() => {
    const groups = {};
    filteredNodeIds.forEach(id => {
      const ws = (nodeData[id] && nodeData[id].workspace) || '(unknown)';
      if (!groups[ws]) groups[ws] = [];
      groups[ws].push(id);
    });
    return groups;
  }, [filteredNodeIds, nodeData]);

  // Group nodes by team_name for team cluster overlays.
  const teamGroups = useMemo(() => {
    const groups = {};
    filteredNodeIds.forEach(id => {
      const tn = nodeData[id] && nodeData[id].team_name;
      if (tn) {
        if (!groups[tn]) groups[tn] = [];
        groups[tn].push(id);
      }
    });
    return groups;
  }, [filteredNodeIds, nodeData]);

  // Layout: workspace clusters arranged in a circle, nodes within each cluster in a sub-circle.
  const cx = 400, cy = 260;
  const nodePos = {};
  const wsRegions = []; // {ws, x, y, r, nodes} for drawing group outlines.

  const wsKeys = Object.keys(wsGroups);
  const clusterRadius = wsKeys.length <= 1 ? 0 : Math.min(190, 100 + wsKeys.length * 20);

  wsKeys.forEach((ws, gi) => {
    const group = wsGroups[ws];
    const clusterAngle = wsKeys.length <= 1 ? 0 : (2 * Math.PI * gi) / wsKeys.length - Math.PI / 2;
    const gcx = cx + clusterRadius * Math.cos(clusterAngle);
    const gcy = cy + clusterRadius * Math.sin(clusterAngle);

    if (group.length === 1) {
      nodePos[group[0]] = { x: gcx, y: gcy };
      wsRegions.push({ ws, x: gcx, y: gcy, r: 50, nodes: group });
    } else {
      const subR = Math.min(70, 25 + group.length * 12);
      group.forEach((id, ni) => {
        const a = (2 * Math.PI * ni) / group.length - Math.PI / 2;
        nodePos[id] = { x: gcx + subR * Math.cos(a), y: gcy + subR * Math.sin(a) };
      });
      wsRegions.push({ ws, x: gcx, y: gcy, r: subR + 45, nodes: group });
    }
  });

  // Node label: short ID + project.
  function nodeLabel(id) {
    const n = nodeData[id];
    if (n && n.workspace) return id.slice(0, 8) + ' ' + shortProject(n.workspace);
    return id.slice(0, 8);
  }

  // Node sub-info: tool_calls + last activity.
  function nodeInfo(id) {
    const n = nodeData[id];
    if (!n) return '';
    const parts = [];
    if (n.tool_calls) parts.push(n.tool_calls + ' tools');
    if (n.turns) parts.push(n.turns + ' turns');
    if (n.started_at) {
      // started_at may be unix seconds (number) or RFC3339 string.
      const ts = typeof n.started_at === 'number' ? new Date(n.started_at * 1000).toISOString() : n.started_at;
      parts.push(relTime(ts));
    }
    return parts.join(' · ');
  }

  function isActive(id) {
    const n = nodeData[id];
    if (!n) return false;
    return !!n.is_active;
  }

  // Node box size scales with link count.
  function nodeWidth(id) {
    const label = nodeLabel(id);
    const base = Math.max(90, label.length * 7 + 16);
    const links = nodeLinkCount[id] || 0;
    return base + Math.min(links * 4, 40);
  }
  function nodeHeight(id) {
    const info = nodeInfo(id);
    return info ? 40 : 28;
  }

  function onNodeEnter(id, e) {
    const n = nodeData[id];
    if (!n) return;
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    setTooltip({
      id,
      x: e.clientX - rect.left + 12,
      y: e.clientY - rect.top - 8,
    });
  }
  function onNodeLeave() { setTooltip(null); }

  function renderTooltip() {
    if (!tooltip) return null;
    const n = nodeData[tooltip.id];
    if (!n) return null;
    const tok = (n.tokens || 0);
    const startTs = n.started_at
      ? (typeof n.started_at === 'number' ? new Date(n.started_at * 1000).toISOString() : n.started_at)
      : null;
    return html`
      <div class="graph-tooltip visible"
        style="left:${tooltip.x}px;top:${tooltip.y}px">
        <div class="graph-tooltip-title">${n.title || tooltip.id}</div>
        ${n.workspace && html`<div class="graph-tooltip-stat">${shortProject(n.workspace)}</div>`}
        <div class="graph-tooltip-stat">
          ${[
            n.tool_calls && n.tool_calls + ' tools',
            n.turns && n.turns + ' turns',
            tok >= 1000 && fmtNum(tok) + ' tok',
          ].filter(Boolean).join(' · ') || 'no stats'}
        </div>
        ${startTs && html`<div class="graph-tooltip-stat">${relTime(startTs)}</div>`}
        ${isActive(tooltip.id) && html`<div style="color:var(--green);margin-top:2px">active</div>`}
      </div>
    `;
  }

  // Format scrubber time display.
  const scrubberLabel = new Date(cutoffTime).toLocaleString(undefined, {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
  });

  const timePresets = [
    { label: '1h', value: '1h' }, { label: '24h', value: '24h' },
    { label: '7d', value: '168h' }, { label: '30d', value: '720h' },
  ];

  return html`
    <div>
      <div class="filters" style="margin-bottom:4px">
        <input class="filter-input" placeholder="search graph..." value=${graphQuery}
          onInput=${e => setGraphQuery(e.target.value)} style="width:180px" />
        <div class="filter-chips">
          ${timePresets.map(t => html`
            <button class="filter-chip ${since === t.value ? 'active' : ''}"
              onClick=${() => setSince(t.value)}>${t.label}</button>
          `)}
        </div>
        <button class="btn btn-sm" onClick=${load}>refresh</button>
      </div>
      ${workspaces.length > 1 && html`
        <div class="filters" style="margin-bottom:8px">
          <span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">workspace</span>
          <div class="filter-chips">
            <button class="filter-chip ${wsFilter === '' ? 'active' : ''}"
              onClick=${() => setWsFilter('')}>all</button>
            ${workspaces.map(ws => html`
              <button class="filter-chip ${wsFilter === ws ? 'active' : ''}"
                onClick=${() => setWsFilter(wsFilter === ws ? '' : ws)}
                title=${ws}>${shortProject(ws)}</button>
            `)}
          </div>
        </div>
      `}
      <div class="graph-container" onWheel=${onWheel} ref=${containerRef} style="position:relative">
        <div class="graph-inner" style="transform:scale(${zoom})">
          <svg viewBox="0 0 800 540" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arrowMsg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--accent)" />
              </marker>
              <marker id="arrowObs" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--faint)" />
              </marker>
              <marker id="arrowSplit" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--green)" />
              </marker>
            </defs>
            ${wsRegions.length > 1 && wsRegions.map((r, i) => html`
              <g key=${'ws' + i} class="graph-ws-group">
                <rect x=${r.x - r.r} y=${r.y - r.r} width=${r.r * 2} height=${r.r * 2}
                  rx="4" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4" />
                <text x=${r.x} y=${r.y - r.r + 12} text-anchor="middle"
                  font-size="9" fill="var(--faint)" font-family="var(--mono)">${shortProject(r.ws)}</text>
              </g>
            `)}
            ${Object.entries(teamGroups).map(([tn, ids]) => {
              if (ids.length < 2) return null;
              // Compute bounding box of team nodes + padding.
              let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
              ids.forEach(id => {
                const p = nodePos[id];
                if (!p) return;
                const w2 = nodeWidth(id) / 2 + 8;
                const h2 = nodeHeight(id) / 2 + 8;
                if (p.x - w2 < minX) minX = p.x - w2;
                if (p.y - h2 < minY) minY = p.y - h2;
                if (p.x + w2 > maxX) maxX = p.x + w2;
                if (p.y + h2 > maxY) maxY = p.y + h2;
              });
              if (!isFinite(minX)) return null;
              const pad = 12;
              return html`
                <g key=${'tm-' + tn} class="graph-team-group">
                  <rect x=${minX - pad} y=${minY - pad} width=${maxX - minX + pad * 2} height=${maxY - minY + pad * 2}
                    rx="3" fill="none" stroke="var(--magenta)" stroke-width="1" stroke-dasharray="6,3" opacity="0.6" />
                  <text x=${(minX + maxX) / 2} y=${minY - pad + 10} text-anchor="middle"
                    font-size="9" fill="var(--magenta)" font-family="var(--mono)" opacity="0.8">${tn}</text>
                </g>
              `;
            })}
            ${visibleLinks.map((l, i) => {
              const src = l.source || '?';
              const dst = l.target || '?';
              const p1 = nodePos[src] || { x: cx, y: cy };
              const p2 = nodePos[dst] || { x: cx, y: cy };
              // Determine edge class and arrow by action type.
              const act = l.action || '';
              let cls, marker, dotColor;
              if (act === 'get-screen' || act === 'get-buffer') {
                cls = 'graph-edge-obs';
                marker = 'url(#arrowObs)';
                dotColor = 'var(--faint)';
              } else if (act === 'split') {
                cls = 'graph-edge-split';
                marker = 'url(#arrowSplit)';
                dotColor = 'var(--green)';
              } else {
                // send-text, send-key, and default.
                cls = 'graph-edge-msg';
                marker = 'url(#arrowMsg)';
                dotColor = 'var(--accent)';
              }
              if (newLinkIndices.has(i)) cls += ' graph-edge-new';
              const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
              const dx = p2.x - p1.x, dy = p2.y - p1.y;
              const len = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
              const cpx = mx - dy * 30 / len, cpy = my + dx * 30 / len;
              const pathId = 'lp' + i;
              return html`
                <g key=${i}>
                  <path id=${pathId} d="M${p1.x},${p1.y} Q${cpx},${cpy} ${p2.x},${p2.y}"
                    class=${cls} marker-end=${marker} />
                  ${newLinkIndices.has(i) && html`
                    <circle r="3" fill=${dotColor}>
                      <animateMotion dur="0.8s" fill="freeze" begin="0s">
                        <mpath href=${'#' + pathId} />
                      </animateMotion>
                    </circle>
                  `}
                </g>
              `;
            })}
            ${filteredNodeIds.map(n => {
              const p = nodePos[n];
              if (!p) return null;
              const w = nodeWidth(n);
              const h = nodeHeight(n);
              const label = nodeLabel(n);
              const info = nodeInfo(n);
              const active = isActive(n);
              return html`
                <g class="graph-node ${active ? 'active' : ''}" transform="translate(${p.x - w/2},${p.y - h/2})" key=${n}
                  onMouseEnter=${(e) => onNodeEnter(n, e)} onMouseLeave=${onNodeLeave}>
                  <rect width=${w} height=${h} />
                  ${active && html`<rect class="node-dot" x="2" y=${h/2 - 3} width="3" height="6" rx="1" />`}
                  <text x=${w/2} y=${info ? 14 : 18} text-anchor="middle">${label}</text>
                  ${info && html`<text class="node-info" x=${w/2} y="28" text-anchor="middle">${info}</text>`}
                </g>
              `;
            })}
          </svg>
        </div>
        ${renderTooltip()}
        <div class="graph-zoom">
          <button onClick=${() => setZoom(z => Math.min(3, z + 0.2))}>+</button>
          <button onClick=${() => setZoom(1)}>1:1</button>
          <button onClick=${() => setZoom(z => Math.max(0.3, z - 0.2))}>-</button>
        </div>
      </div>
      <div class="graph-scrubber">
        <button class="graph-play-btn ${playing ? 'active' : ''}"
          onClick=${() => setPlaying(p => !p)}>${playing ? '||' : '>'}</button>
        <input type="range" min="0" max="1000" value=${Math.round(scrubberPos * 1000)}
          onInput=${e => { setScrubberPos(parseInt(e.target.value) / 1000); setPlaying(false); }} />
        <span class="graph-scrubber-time">${scrubberLabel}</span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--dim);padding:4px 0">
        <span>${filteredNodeIds.length}${filteredNodeIds.length !== allNodeIds.length ? '/' + allNodeIds.length : ''} nodes, ${visibleLinks.length}/${allLinks.length} links</span>
        <span style="display:flex;gap:12px">
          <span><span style="color:var(--accent)">——</span> message</span>
          <span><span style="color:var(--faint)">- - -</span> screen/buffer</span>
          <span><span style="color:var(--green)">··</span> split</span>
          <span><span style="color:var(--green)">●</span> active</span>
          ${Object.keys(teamGroups).length > 0 && html`<span><span style="color:var(--magenta)">- -</span> team</span>`}
        </span>
      </div>
    </div>
  `;
}

// --- Teams Panel ---

const MEMBER_COLORS = {
  blue: 'var(--cyan)', green: 'var(--green)', yellow: 'var(--yellow)',
  red: 'var(--danger)', purple: 'var(--magenta)', orange: 'var(--orange)',
};

function memberColor(m) {
  return MEMBER_COLORS[m.color] || 'var(--accent)';
}

function TeamsPanel({ urlParams, updateParams, navVersion }) {
  const [teams, setTeams] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedName, setSelectedNameRaw] = useState(urlParams.name || '');
  const [detail, setDetail] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);

  function setSelectedName(v) { setSelectedNameRaw(v); updateParams(v ? { name: v } : {}); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSelectedNameRaw(urlParams.name || '');
  }, [navVersion]);

  const load = useCallback(async (soft) => {
    if (!soft) setLoading(true);
    try {
      const t = await api('teams');
      setTeams(Array.isArray(t) ? t : []);
    } catch (e) { console.error('teams:', e); }
    if (!soft) setLoading(false);
  }, []);

  useEffect(() => { load(false); }, [load]);
  useEffect(() => {
    const softRefresh = () => load(true);
    window.addEventListener('cass:refresh', softRefresh);
    return () => window.removeEventListener('cass:refresh', softRefresh);
  }, [load]);

  // Load detail when team selected.
  useEffect(() => {
    if (!selectedName) { setDetail(null); return; }
    setDetailLoading(true);
    api('teams/' + encodeURIComponent(selectedName)).then(d => {
      setDetail(d);
    }).catch(e => {
      console.error('team detail:', e);
      setDetail(null);
    }).finally(() => setDetailLoading(false));
  }, [selectedName]);

  // SSE: reload on team_message events.
  useEffect(() => {
    function handler(e) {
      if (selectedName) {
        api('teams/' + encodeURIComponent(selectedName)).then(d => setDetail(d)).catch(() => {});
      }
    }
    window.addEventListener('cass:team_message', handler);
    return () => window.removeEventListener('cass:team_message', handler);
  }, [selectedName]);

  if (loading) return html`<div class="loading">loading teams...</div>`;
  if (teams.length === 0) return html`<div class="empty">no agent teams found</div>`;

  // Detail view.
  if (selectedName) {
    const team = teams.find(t => t.name === selectedName);
    if (detailLoading) return html`<div class="loading">loading ${selectedName}...</div>`;
    if (!detail) return html`
      <div>
        <button class="team-detail-back" onClick=${() => setSelectedName('')}>back</button>
        <div class="empty">team not found: ${selectedName}</div>
      </div>
    `;

    const config = detail.config || {};
    const members = config.members || (team && team.members) || [];
    const lead = config.leadAgentId || (team && team.lead) || '';

    return html`
      <div>
        <div class="team-detail-header">
          <button class="team-detail-back" onClick=${() => setSelectedName('')}>back</button>
          <span class="team-detail-name">${selectedName}</span>
          <span class="team-detail-desc">${config.description || ''}</span>
        </div>
        <div class="team-detail-body">
          <div>
            <${TopologySVG} members=${members} lead=${lead} />
            ${detail.sessions && detail.sessions.length > 0 && html`
              <div class="team-sessions">
                <div class="stat-label">${detail.sessions.length} session${detail.sessions.length !== 1 ? 's' : ''}</div>
                ${detail.sessions.map(s => html`
                  <div class="team-session-item" key=${s.session_id}>
                    <div style="font-weight:600">${s.title ? s.title.slice(0, 60) : 'Untitled'}</div>
                    <div style="font-size:11px;color:var(--dim)">${s.agent_name || ''} ${s.started_at ? relTime(s.started_at) : ''}</div>
                  </div>
                `)}
              </div>
            `}
          </div>
          <${InboxViewer} teamName=${selectedName} inboxes=${detail.inboxes || {}} members=${members} />
        </div>
      </div>
    `;
  }

  // List view.
  return html`
    <div>
      <div class="teams-list">
        ${teams.map(t => html`
          <div class="team-card" key=${t.name} onClick=${() => setSelectedName(t.name)}>
            <div class="team-card-header">
              <span class="team-card-name">${t.name}</span>
              <span class="team-card-count">${t.member_count} member${t.member_count !== 1 ? 's' : ''}</span>
            </div>
            ${t.description && html`<div class="team-card-desc">${t.description}</div>`}
            <div class="team-card-members">
              ${(t.members || []).map(m => html`
                <span class="team-member ${m.is_active ? 'active' : ''}" key=${m.name}>
                  <span class="team-member-dot" style="background:${memberColor(m)}"></span>
                  <span class="team-member-name">${m.name}</span>
                  ${m.agent_type && m.agent_type !== m.name && html`<span class="team-member-role">${m.agent_type}</span>`}
                </span>
              `)}
            </div>
          </div>
        `)}
      </div>
    </div>
  `;
}

// --- Topology SVG ---

function TopologySVG({ members, lead }) {
  if (!members || members.length === 0) return html`<div class="team-topology"><div class="empty">no members</div></div>`;

  const leadName = (lead || '').split('@')[0];
  const leadMember = members.find(m => m.name === leadName);
  const others = members.filter(m => m.name !== leadName);

  const w = 260, h = 40 + others.length * 50 + 40;
  const cx = w / 2;
  const leadY = 30;
  const startY = 80;
  const spacing = 50;

  return html`
    <div class="team-topology">
      <svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
        ${others.map((m, i) => {
          const my = startY + i * spacing;
          return html`<line key=${'l' + i} class="team-topo-link" x1=${cx} y1=${leadY + 10} x2=${cx} y2=${my - 10} />`;
        })}
        ${leadMember && html`
          <g class="team-topo-node" transform="translate(${cx}, ${leadY})">
            <circle r="10" fill="${memberColor(leadMember)}" opacity="0.8" />
            <text class="topo-label" x="16" y="4">${leadMember.name}</text>
            <text class="topo-role" x="16" y="14">lead · ${leadMember.model || ''}</text>
          </g>
        `}
        ${others.map((m, i) => {
          const my = startY + i * spacing;
          return html`
            <g class="team-topo-node" key=${m.name} transform="translate(${cx}, ${my})">
              <circle r="8" fill="${memberColor(m)}" opacity="0.8" />
              <text class="topo-label" x="14" y="4">${m.name}</text>
              <text class="topo-role" x="14" y="14">${m.agentType || m.agent_type || ''} · ${m.model || ''}</text>
            </g>
          `;
        })}
      </svg>
    </div>
  `;
}

// --- Inbox Viewer ---

function InboxViewer({ teamName, inboxes, members }) {
  const agentNames = Object.keys(inboxes || {}).sort();
  const [selectedAgent, setSelectedAgent] = useState(agentNames[0] || '');
  const [msgText, setMsgText] = useState('');
  const [sending, setSending] = useState(false);
  const msgsRef = useRef(null);

  // Reset agent selection when team changes.
  useEffect(() => {
    const names = Object.keys(inboxes || {}).sort();
    if (names.length > 0 && !names.includes(selectedAgent)) {
      setSelectedAgent(names[0]);
    }
  }, [inboxes]);

  const messages = (inboxes && inboxes[selectedAgent]) || [];

  // Auto-scroll to bottom on new messages.
  useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [messages.length, selectedAgent]);

  async function send() {
    if (!msgText.trim() || sending) return;
    setSending(true);
    try {
      await fetch('/api/teams/' + encodeURIComponent(teamName) + '/inbox/' + encodeURIComponent(selectedAgent), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: 'web-ui', text: msgText.trim() }),
      });
      setMsgText('');
    } catch (e) { console.error('send:', e); }
    setSending(false);
  }

  function renderMessage(msg, idx) {
    // Detect structured message type from text patterns.
    let msgType = '';
    let subject = '';
    if (msg.text) {
      if (msg.text.includes('idle_notification') || msg.text.includes('idle notification') || msg.text.includes("I'm idle") || msg.text.includes("ready for work")) {
        msgType = 'idle_notification';
      } else if (msg.text.includes('TASK:') || msg.text.includes('task_assignment') || msg.text.includes('Task:')) {
        msgType = 'task_assignment';
        const m = msg.text.match(/(?:TASK:|Task:)\s*(.+?)(?:\n|$)/);
        if (m) subject = m[1];
      } else if (msg.text.includes('shutdown') || msg.text.includes('SHUTDOWN')) {
        msgType = 'shutdown_request';
      } else if (msg.text.includes('permission') || msg.text.includes('Permission')) {
        msgType = 'permission_request';
      }
    }

    const cls = 'inbox-msg' + (msgType ? ' msg-' + msgType : '');

    return html`
      <div class=${cls} key=${idx}>
        <div>
          <span class="inbox-msg-from">${msg.from || 'unknown'}</span>
          ${msg.timestamp && html`<span class="inbox-msg-time">${relTime(msg.timestamp)}</span>`}
        </div>
        ${msgType === 'task_assignment' && subject && html`<div class="msg-subject">${subject}</div>`}
        ${msgType && html`<span class="msg-badge">${msgType.replace(/_/g, ' ')}</span>`}
        <div class="inbox-msg-text">${(msg.text || '').slice(0, 2000)}</div>
      </div>
    `;
  }

  return html`
    <div class="inbox-container">
      <div class="inbox-header">
        <span>inbox</span>
        <select class="inbox-select" value=${selectedAgent} onChange=${e => setSelectedAgent(e.target.value)}>
          ${agentNames.map(a => html`<option value=${a} key=${a}>${a} (${(inboxes[a] || []).length})</option>`)}
        </select>
      </div>
      <div class="inbox-messages" ref=${msgsRef}>
        ${messages.length === 0 && html`<div class="empty" style="padding:16px">no messages</div>`}
        ${messages.map(renderMessage)}
      </div>
      <div class="inbox-compose">
        <input placeholder="send message to ${selectedAgent}..." value=${msgText}
          onInput=${e => setMsgText(e.target.value)}
          onKeyDown=${e => { if (e.key === 'Enter') send(); }} />
        <button onClick=${send} disabled=${sending}>${sending ? '...' : 'send'}</button>
      </div>
    </div>
  `;
}

// --- Map Panel ---

function MapPanel({ urlParams, updateParams, navVersion }) {
  const [filter, setFilterRaw] = useState(urlParams.filter || '');
  const [mappings, setMappings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sortCol, setSortCol] = useState('');
  const [sortDir, setSortDir] = useState('asc');

  function setFilter(v) { setFilterRaw(v); updateParams({ filter: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setFilterRaw(urlParams.filter || '');
  }, [navVersion]);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const m = await api('mappings?' + qs({ filter }));
      setMappings(m || []);
    } catch (e) { console.error('mappings:', e); }
    setLoading(false);
  }, [filter]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  function toggleSort(col) {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  }

  const sorted = useMemo(() => {
    if (!sortCol || mappings.length === 0) return mappings;
    return [...mappings].sort((a, b) => {
      const va = a[sortCol] || '', vb = b[sortCol] || '';
      const cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb));
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }, [mappings, sortCol, sortDir]);

  const columns = [
    { key: 'iterm_session', label: 'iTerm2' },
    { key: 'cass_session', label: 'CASS' },
    { key: 'workspace', label: 'Project' },
    { key: 'title', label: 'Title' },
  ];

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <input class="filter-input" placeholder="filter..." value=${filter}
          onInput=${e => setFilter(e.target.value)} style="width:240px" />
      </div>
      ${loading && html`<div class="loading">loading mappings...</div>`}
      ${!loading && mappings.length === 0 && html`<div class="empty">no session mappings found</div>`}
      ${sorted.length > 0 && html`
        <table class="map-table">
          <thead>
            <tr>
              ${columns.map(c => html`
                <th class="${sortCol === c.key ? 'sorted' : ''}" onClick=${() => toggleSort(c.key)}>
                  ${c.label} <span class="sort-arrow">${sortCol === c.key ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}</span>
                </th>
              `)}
            </tr>
          </thead>
          <tbody>
            ${sorted.map(m => html`
              <tr key=${m.iterm_session}>
                <td>${m.iterm_session ? m.iterm_session.slice(0, 8) : ''}</td>
                <td>${m.cass_session ? m.cass_session.slice(0, 8) : ''}</td>
                <td style="color:var(--green)">${shortProject(m.workspace)}</td>
                <td>${m.title && m.title.length > 50 ? m.title.slice(0, 50) + '...' : m.title}</td>
              </tr>
            `)}
          </tbody>
        </table>
        <div class="result-count">${sorted.length} mappings</div>
      `}
    </div>
  `;
}

// --- Stats Panel ---

function StatsPanel({ urlParams, updateParams, navVersion }) {
  const [basic, setBasic] = useState(null);
  const [agg, setAgg] = useState(null);
  const [since, setSinceRaw] = useState(urlParams.since || '');
  const [indexing, setIndexing] = useState(false);

  function setSince(v) { setSinceRaw(v); updateParams({ since: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSinceRaw(urlParams.since || '');
  }, [navVersion]);

  const load = useCallback(async () => {
    try {
      const [b, a] = await Promise.all([
        api('stats'),
        api('stats?aggregate=true' + (since ? '&since=' + since : '')),
      ]);
      setBasic(b);
      setAgg(a);
    } catch (e) { console.error('stats:', e); }
  }, [since]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  async function reindex(force) {
    setIndexing(true);
    try { await api('index?force=' + force, { method: 'POST' }); load(); }
    catch (e) { alert('Index error: ' + e.message); }
    setIndexing(false);
  }

  if (!basic || !agg) return html`<div class="loading">loading stats...</div>`;

  const lastIdx = basic.last_indexed
    ? new Date(parseInt(basic.last_indexed) * 1000).toLocaleString()
    : 'never';

  const card = (label, value, sub) => html`
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
      ${sub && html`<div class="stat-sub">${sub}</div>`}
    </div>
  `;

  // Sessions per day SVG bar chart.
  const daily = agg.sessions_per_day || {};
  const days = Object.keys(daily).sort();
  const dayVals = days.map(d => daily[d]);
  const maxDay = Math.max(...dayVals, 1);

  // Workspace leaderboard.
  const wsEntries = agg.workspace_top
    ? Object.entries(agg.workspace_top).sort((a, b) => b[1] - a[1])
    : [];
  const wsMax = wsEntries.length > 0 ? wsEntries[0][1] : 1;

  const timePresets = [
    { label: 'All', value: '' }, { label: '24h', value: '24h' },
    { label: '7d', value: '168h' }, { label: '30d', value: '720h' },
  ];

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <div class="filter-chips">
          ${timePresets.map(t => html`
            <button class="filter-chip ${since === t.value ? 'active' : ''}"
              onClick=${() => setSince(t.value)}>${t.label}</button>
          `)}
        </div>
        <button class="btn btn-sm" onClick=${() => reindex(false)} disabled=${indexing}>
          ${indexing ? 'indexing...' : 're-index'}
        </button>
        <button class="btn btn-sm" onClick=${() => reindex(true)} disabled=${indexing}>full</button>
      </div>

      <div class="stats-grid">
        ${card('sessions', fmtNum(agg.sessions), agg.agents + ' agents, ' + agg.workspaces + ' workspaces')}
        ${card('tool calls', fmtNum(agg.tool_calls))}
        ${card('total tokens', fmtNum(agg.total_tokens), fmtNum(agg.input_tokens) + ' in / ' + fmtNum(agg.output_tokens) + ' out')}
        ${card('turns', fmtNum(agg.turns))}
        ${card('files edited', fmtNum(agg.files_edited), fmtNum(agg.files_read) + ' read / ' + fmtNum(agg.files_written) + ' written')}
        ${card('lines written', fmtNum(agg.lines_written))}
        ${card('total time', fmtDuration(agg.duration_secs))}
        ${card('subagent spawns', fmtNum(agg.subagent_spawns))}
        ${card('it2 interactions', fmtNum(agg.it2_sends + agg.it2_screens),
          agg.it2_splits + ' splits, ' + agg.it2_sends + ' sends, ' + agg.it2_screens + ' screens')}
        ${card('team ops', fmtNum(agg.team_inbox_reads + agg.team_inbox_sends + agg.team_task_ops + agg.team_spawns),
          agg.team_inbox_sends + ' msgs, ' + agg.team_task_ops + ' tasks, ' + agg.team_spawns + ' spawns')}
        ${card('last indexed', lastIdx)}
      </div>

      ${days.length > 0 && html`
        <div class="chart-section">
          <div class="stat-label" style="margin-bottom:8px">sessions per day (30d)</div>
          <svg viewBox="0 0 ${Math.max(days.length * 16, 100)} 80" preserveAspectRatio="none" style="height:60px">
            ${dayVals.map((v, i) => {
              const barH = Math.max(1, (v / maxDay) * 60);
              const x = i * (100 / days.length);
              const w = Math.max(1, (100 / days.length) - 1);
              return html`<rect x="${x}%" y=${65 - barH} width="${w}%" height=${barH} fill="var(--accent)" opacity="0.7"><title>${days[i]}: ${v}</title></rect>`;
            })}
          </svg>
          <div style="font-size:10px;color:var(--faint);margin-top:4px">
            ${days[0]} — ${days[days.length - 1]} (peak: ${Math.max(...dayVals)}/day)
          </div>
        </div>
      `}

      ${wsEntries.length > 0 && html`
        <div class="chart-section">
          <div class="stat-label" style="margin-bottom:8px">top workspaces</div>
          ${wsEntries.map(([ws, cnt]) => html`
            <div class="ws-row" key=${ws}>
              <span class="ws-label" title=${ws}>${shortProject(ws)}</span>
              <div class="ws-track"><div class="ws-fill" style="width:${(cnt/wsMax*100).toFixed(1)}%"></div></div>
              <span class="ws-count">${cnt}</span>
            </div>
          `)}
        </div>
      `}
    </div>
  `;
}

// --- Mount ---
render(html`<${App} />`, document.getElementById('app'));
</script>
