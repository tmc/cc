              onClick=${() => setEdgeFilter(f => ({ ...f, workflow: !f.workflow }))}>
              <span style="color:var(--accent)">—</span> workflow <span style="color:var(--cyan);opacity:0.8">··</span> spawn</button>
          `}
        </div>
        <button class="filter-chip ${activeOnly ? 'active' : ''}"
          onClick=${() => setActiveOnly(a => !a)} style="margin-left:8px">
          <span style="color:var(--green)">●</span> active only</button>
      </div>
      <div class="graph-container" onWheel=${onWheel} ref=${containerRef}
        onPointerDown=${onPointerDown} onPointerMove=${onPointerMove} onPointerUp=${onPointerUp}
        style=${"position:relative" + (dragging ? ";cursor:grabbing" : ";cursor:grab")}>
        <div class="graph-inner" style="transform:translate(${panOffset.x}px,${panOffset.y}px) scale(${zoom});transform-origin:0 0">
          <svg viewBox="${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arrowMsg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--accent)" />
              </marker>
              <marker id="arrowObs" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--faint)" />
              </marker>
              <marker id="arrowSplit" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--green)" />
              </marker>
              <marker id="arrowTeam" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--magenta)" />
              </marker>
            </defs>
            ${effectiveMode !== 'workflow' && wsRegions.length > 1 && wsRegions.map((r, i) => html`
              <g key=${'ws' + i} class="graph-ws-group">
                <rect x=${r.x - r.r} y=${r.y - r.r} width=${r.r * 2} height=${r.r * 2}
                  rx="4" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4" />
                <text x=${r.x} y=${r.y - r.r + 12} text-anchor="middle"
                  font-size="9" fill="var(--faint)" font-family="var(--mono)">${shortProject(r.ws)}</text>
              </g>
            `)}
            ${effectiveMode !== 'workflow' && Object.entries(teamGroups).map(([tn, ids]) => {
              if (ids.length < 2) return null;
              // Compute bounding box of team nodes + padding.
              let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
              ids.forEach(id => {
                const p = nodePos[id];
                if (!p) return;
                const w2 = nodeWidth(id) / 2 + 8;
                const h2 = nodeHeight(id) / 2 + 8;
                if (p.x - w2 < minX) minX = p.x - w2;
                if (p.y - h2 < minY) minY = p.y - h2;
                if (p.x + w2 > maxX) maxX = p.x + w2;
                if (p.y + h2 > maxY) maxY = p.y + h2;
              });
              if (!isFinite(minX)) return null;
              const pad = 12;
              return html`
                <g key=${'tm-' + tn} class="graph-team-group">
                  <rect x=${minX - pad} y=${minY - pad} width=${maxX - minX + pad * 2} height=${maxY - minY + pad * 2}
                    rx="3" fill="none" stroke="var(--magenta)" stroke-width="1" stroke-dasharray="6,3" opacity="0.6" />
                  <text x=${(minX + maxX) / 2} y=${minY - pad + 10} text-anchor="middle"
                    font-size="9" fill="var(--magenta)" font-family="var(--mono)" opacity="0.8">${tn}</text>
                </g>
              `;
            })}
            ${visibleLinks.map((l, i) => {
              const src = l.source || '?';
              const dst = l.target || '?';
              const fallback = { x: viewBox.x + viewBox.w / 2, y: viewBox.y + viewBox.h / 2 };
              const p1 = nodePos[src] || fallback;
              const p2 = nodePos[dst] || fallback;
              // Determine edge class and arrow by edge_type, then action/kind.
              const act = l.action || '';
              const kind = l.kind || '';
              const et = l.edge_type || '';
              let cls, marker, dotColor, isObs = false;
              if (et === 'workflow_contains') {
                cls = 'graph-edge-workflow';
                marker = 'url(#arrowMsg)';
                dotColor = 'var(--accent)';
              } else if (et === 'workflow_spawn') {
                cls = 'graph-edge-spawn';
                marker = 'url(#arrowSplit)';
                dotColor = 'var(--cyan)';
              } else if (et === 'subagent_spawn') {
                cls = 'graph-edge-subagent';
                marker = 'url(#arrowSplit)';
                dotColor = 'var(--yellow)';
              } else if (act === 'team-spawn') {
                cls = 'graph-edge-team-spawn';
                marker = 'url(#arrowTeam)';
                dotColor = 'var(--magenta)';
              } else if (kind === 'team' || act === 'team-message') {
                cls = 'graph-edge-team';
                marker = 'url(#arrowTeam)';
                dotColor = 'var(--magenta)';
              } else if (act === 'get-screen' || act === 'get-buffer') {
                cls = 'graph-edge-obs';
                marker = 'url(#arrowObs)';
                dotColor = 'var(--faint)';
                isObs = true;
              } else if (act === 'split') {
                cls = 'graph-edge-split';
                marker = 'url(#arrowSplit)';
                dotColor = 'var(--green)';
              } else {
                cls = 'graph-edge-msg';
                marker = 'url(#arrowMsg)';
                dotColor = 'var(--accent)';
              }
              if (newLinkIndices.has(i)) cls += ' graph-edge-new';
              // Edge highlighting: boost connected edges, dim others when a node is hovered.
              const isConnected = hoveredNode && (src === hoveredNode || dst === hoveredNode);
              if (hoveredNode) cls += isConnected ? ' graph-edge-highlight' : ' graph-edge-dimmed';
              const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
              const dx = p2.x - p1.x, dy = p2.y - p1.y;
              const len = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
              // Adaptive curve: offset based on edge pair index for parallel edges.
              const pair = edgePairIndex[i] || { idx: 0, total: 1 };
              const baseOffset = Math.min(30, len * 0.15);
              const spread = pair.total > 1 ? (pair.idx - (pair.total - 1) / 2) * 12 : 0;
              const offset = baseOffset + spread;
              const cpx = mx - dy * offset / len, cpy = my + dx * offset / len;
              const pathId = 'lp' + i;
              const opacity = isObs && !isConnected ? 0.35 : undefined;
              return html`
                <g key=${i}
                  onMouseEnter=${(e) => onEdgeEnter(l, e)} onMouseLeave=${onEdgeLeave}>
                  <path d="M${p1.x},${p1.y} Q${cpx},${cpy} ${p2.x},${p2.y}"
                    stroke="transparent" stroke-width="12" fill="none" style="cursor:pointer" />
                  <path id=${pathId} d="M${p1.x},${p1.y} Q${cpx},${cpy} ${p2.x},${p2.y}"
                    class=${cls} marker-end=${marker} opacity=${opacity} pointer-events="none" />
                  ${newLinkIndices.has(i) && html`
                    <circle r="3" fill=${dotColor}>
                      <animateMotion dur="0.8s" fill="freeze" begin="0s">
                        <mpath href=${'#' + pathId} />
                      </animateMotion>
                    </circle>
                  `}
                </g>
              `;
            })}
            ${filteredNodeIds.map(n => {
              const p = nodePos[n];
              if (!p) return null;
              const nn = nodeData[n];
              const nt = nn && nn.node_type;
              const w = nodeWidth(n);
              const h = nodeHeight(n);
              const label = nodeLabel(n);
              const info = nodeInfo(n);
              const active = isActive(n);
              const typeCls = nt === 'workflow' ? 'node-workflow'
                : nt === 'workflow_agent' ? 'node-workflow-agent'
                : nt === 'subagent' ? 'node-subagent'
                : nt === 'session' ? 'node-session' : '';
              const statusCls = (nt === 'workflow' || nt === 'subagent') && nn.status ? 'node-status-' + normalizedAgentStatus(nn.status) : '';
              const isWf = nt === 'workflow';
              const expanded = isWf && isExpanded(nn.full_id || n);
              const showDot = active || (isWf && nn.status) || (nt === 'subagent' && nn.status);
              return html`
                <g class="graph-node ${typeCls} ${statusCls} ${n.includes('@') && !nt ? 'team-agent' : ''} ${active ? 'active' : ''} ${hoveredNode === n ? 'hovered' : ''}" transform="translate(${p.x - w/2},${p.y - h/2})" key=${n}
                  onMouseEnter=${(e) => onNodeEnter(n, e)} onMouseLeave=${onNodeLeave}
                  onClick=${() => onNodeClick(n)} style="cursor:pointer">
                  <rect width=${w} height=${h} />
                  ${showDot && html`<circle class="node-dot" cx="6" cy="6" r="3" />`}
                  <text x=${w/2} y=${info ? 12 : 15} text-anchor="middle" font-size="9">${label}</text>
                  ${info && html`<text class="node-info" x=${w/2} y="24" text-anchor="middle">${info}</text>`}
                  ${isWf && (nn.agent_count > 0) && html`
                    <text x=${w - 9} y=${h - 6} text-anchor="middle" font-size="10" fill="var(--dim)">${expanded ? '−' : '+'}</text>
                  `}
                </g>
              `;
            })}
          </svg>
        </div>
        ${html`<${GraphTooltip} tooltip=${tooltip} edgeTooltip=${edgeTooltip} nodeData=${nodeData}
          onNavigate=${onNavigate} isExpanded=${isExpanded} isActive=${isActive} />`}
        <div class="graph-zoom">
          <button onClick=${() => setZoom(z => Math.min(3, z + 0.2))}>+</button>
          <button onClick=${resetView} title="Reset zoom and pan">1:1</button>
          <button onClick=${() => setZoom(z => Math.max(0.3, z - 0.2))}>-</button>
          <button onClick=${fitView} title="Fit all nodes" style="margin-left:2px;font-size:10px">fit</button>
        </div>
      </div>
      <div class="graph-legend">
        ${effectiveMode === 'workflow' ? html`
          <span class="graph-legend-item"><span class="graph-legend-node node-session"></span>session</span>
          <span class="graph-legend-item"><span class="graph-legend-node node-workflow"></span>workflow</span>
          <span class="graph-legend-item"><span class="graph-legend-node node-workflow-agent"></span>agent</span>
          <span class="graph-legend-item"><span class="graph-legend-node node-subagent"></span>subagent</span>
          <span class="graph-legend-sep"></span>
          <span class="graph-legend-item"><span class="graph-legend-line" style="background:var(--accent)"></span>contains</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--cyan)"></span>spawn</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--yellow)"></span>subagent</span>
          <span class="graph-legend-sep"></span>
          <span class="graph-legend-item"><span class="graph-legend-dot" style="background:var(--green)"></span>completed</span>
          <span class="graph-legend-item"><span class="graph-legend-dot" style="background:var(--cyan)"></span>running</span>
          <span class="graph-legend-item"><span class="graph-legend-dot" style="background:var(--yellow)"></span>async</span>
        ` : html`
          <span class="graph-legend-item"><span class="graph-legend-line" style="background:var(--accent)"></span>it2 msg</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--faint)"></span>observe</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--green)"></span>split</span>
          <span class="graph-legend-item"><span class="graph-legend-line" style="background:var(--magenta)"></span>team msg</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--magenta)"></span>team spawn</span>
        `}
      </div>
      <div class="graph-scrubber">
        <button class="graph-play-btn ${playing ? 'active' : ''}"
          onClick=${() => setPlaying(p => !p)}>${playing ? '||' : '>'}</button>
        <input type="range" min="0" max="1000" value=${Math.round(scrubberPos * 1000)}
          onInput=${e => { setScrubberPos(parseInt(e.target.value) / 1000); setPlaying(false); }} />
        <span class="graph-scrubber-time">${scrubberLabel}</span>
      </div>
      <div class="graph-status">
        <span>${filteredNodeIds.length}${filteredNodeIds.length !== allNodeIds.length ? '/' + allNodeIds.length : ''} nodes, ${visibleLinks.length}/${allLinks.length} links</span>
        ${scrubberPos < 1 && html`<span style="color:var(--yellow)">timeline: ${scrubberLabel}</span>`}
      </div>
    </div>
  `;
}

// --- Teams Panel ---

const MEMBER_COLORS = {
  blue: 'var(--cyan)', green: 'var(--green)', yellow: 'var(--yellow)',
  red: 'var(--danger)', purple: 'var(--magenta)', orange: 'var(--orange)',
};

function memberColor(m) {
  return MEMBER_COLORS[m.color] || 'var(--accent)';
}

function TeamsPanel({ urlParams, updateParams, navVersion }) {
  const [teams, setTeams] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedName, setSelectedNameRaw] = useState(urlParams.name || '');
  const [detail, setDetail] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [teamSearch, setTeamSearch] = useState('');
  const [teamSearchResults, setTeamSearchResults] = useState(null);
  const [teamSearchLoading, setTeamSearchLoading] = useState(false);

  function setSelectedName(v) { setSelectedNameRaw(v); updateParams(v ? { name: v } : {}); setTeamSearch(''); setTeamSearchResults(null); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSelectedNameRaw(urlParams.name || '');
  }, [navVersion]);

  const load = useCallback(async (soft) => {
    if (!soft) setLoading(true);
    try {
      const t = await api('teams');
      setTeams(Array.isArray(t) ? t : []);
    } catch (e) { console.error('teams:', e); }
    if (!soft) setLoading(false);
  }, []);

  useEffect(() => { load(false); }, [load]);
  useEffect(() => {
    const softRefresh = () => load(true);
    window.addEventListener('cass:refresh', softRefresh);
    return () => window.removeEventListener('cass:refresh', softRefresh);
  }, [load]);

  // Load detail when team selected.
  useEffect(() => {
    if (!selectedName) { setDetail(null); return; }
    setDetailLoading(true);
    api('teams/' + encodeURIComponent(selectedName)).then(d => {
      setDetail(d);
    }).catch(e => {
      console.error('team detail:', e);
      setDetail(null);
    }).finally(() => setDetailLoading(false));
  }, [selectedName]);

  // SSE: reload on team_message events.
  useEffect(() => {
    function handler(e) {
      if (selectedName) {
        api('teams/' + encodeURIComponent(selectedName)).then(d => setDetail(d)).catch(() => {});
      }
    }
    window.addEventListener('cass:team_message', handler);
    return () => window.removeEventListener('cass:team_message', handler);
  }, [selectedName]);

  // Debounced search within team sessions.
  useEffect(() => {
    if (!teamSearch || !selectedName) { setTeamSearchResults(null); return; }
    setTeamSearchLoading(true);
    const id = setTimeout(async () => {
      try {
        const r = await api('search?' + qs({ q: teamSearch, team: selectedName, limit: '50', summary: 'true', count: 'false' }));
        setTeamSearchResults(r);
      } catch (e) { console.error('team search:', e); }
      setTeamSearchLoading(false);
    }, 300);
    return () => clearTimeout(id);
  }, [teamSearch, selectedName]);

  if (loading) return html`<div class="loading">loading teams...</div>`;
  if (teams.length === 0) return html`<div class="empty">no agent teams found</div>`;

  // Detail view.
  if (selectedName) {
    const team = teams.find(t => t.name === selectedName);
    if (detailLoading) return html`<div class="loading">loading ${selectedName}...</div>`;
    if (!detail) return html`
      <div>
        <button class="team-detail-back" onClick=${() => setSelectedName('')}>back</button>
        <div class="empty">team not found: ${selectedName}</div>
      </div>
    `;

    const config = detail.config || {};
    const members = config.members || (team && team.members) || [];
    const lead = config.leadAgentId || (team && team.lead) || '';

    // Sessions to display: search results if searching, otherwise detail.sessions.
    const displaySessions = teamSearch && teamSearchResults
      ? (teamSearchResults.hits || [])
      : (detail.sessions && detail.sessions.hits ? detail.sessions.hits : detail.sessions || []);
    const sessionCount = teamSearch && teamSearchResults
      ? (teamSearchResults.total_count || 0)
      : (detail.sessions && detail.sessions.total_count != null ? detail.sessions.total_count : (detail.sessions || []).length);

    return html`
      <div>
        <div class="team-detail-header">
          <button class="team-detail-back" onClick=${() => setSelectedName('')}>back</button>
          <span class="team-detail-name">${selectedName}</span>
          <span class="team-detail-desc">${config.description || ''}</span>
        </div>
        <div class="team-detail-body">
          <div>
            <${TopologySVG} members=${members} lead=${lead} />
            <div class="team-sessions">
              <div class="team-search-bar">
                <input class="team-search-input" type="text"
                  placeholder="search in team..."
                  value=${teamSearch}
                  onInput=${e => setTeamSearch(e.target.value)}
                  onKeyDown=${e => { if (e.key === 'Escape') { setTeamSearch(''); e.target.blur(); } }} />
                ${teamSearch && html`<span class="detail-search-count">${teamSearchLoading ? '...' : resultCountLabel(teamSearchResults, 'hit')}</span>`}
              </div>
              <div class="stat-label">${teamSearch && teamSearchResults ? resultCountLabel(teamSearchResults, 'session') : sessionCount + ' session' + (sessionCount !== 1 ? 's' : '')}</div>
              ${displaySessions.map(s => html`
                <div class="team-session-item" key=${s.session_id}>
                  <div style="font-weight:600">${s.title ? s.title.slice(0, 60) : 'Untitled'}</div>
                  <div style="font-size:11px;color:var(--dim)">${s.agent_name || ''} ${s.started_at ? relTime(s.started_at) : ''}</div>
                  ${teamSearch && s.snippet && html`<div class="team-session-snippet">${s.snippet}</div>`}
                </div>
              `)}
              ${displaySessions.length === 0 && !teamSearchLoading && html`<div class="empty" style="padding:8px">no matches</div>`}
            </div>
          </div>
          <${InboxViewer} teamName=${selectedName} inboxes=${detail.inboxes || {}} members=${members} />
        </div>
      </div>
    `;
  }

  // List view.
  return html`
    <div>
      <div class="teams-list">
        ${teams.map(t => html`
          <div class="team-card" key=${t.name} onClick=${() => setSelectedName(t.name)}>
            <div class="team-card-header">
              <span class="team-card-name">${t.name}</span>
              <span class="team-card-count">${t.member_count} member${t.member_count !== 1 ? 's' : ''}</span>
            </div>
            ${t.description && html`<div class="team-card-desc">${t.description}</div>`}
            <div class="team-card-members">
              ${(t.members || []).map(m => html`
                <span class="team-member ${m.is_active ? 'active' : ''}" key=${m.name}>
                  <span class="team-member-dot" style="background:${memberColor(m)}"></span>
                  <span class="team-member-name">${m.name}</span>
                  ${m.agent_type && m.agent_type !== m.name && html`<span class="team-member-role">${m.agent_type}</span>`}
                </span>
              `)}
            </div>
          </div>
        `)}
      </div>
    </div>
  `;
}

// --- Topology SVG ---

function TopologySVG({ members, lead }) {
  if (!members || members.length === 0) return html`<div class="team-topology"><div class="empty">no members</div></div>`;

  const leadName = (lead || '').split('@')[0];
  const leadMember = members.find(m => m.name === leadName);
  const others = members.filter(m => m.name !== leadName);

  const w = 260, h = 40 + others.length * 50 + 40;
  const cx = w / 2;
  const leadY = 30;
  const startY = 80;
  const spacing = 50;

  return html`
    <div class="team-topology">
      <svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
        ${others.map((m, i) => {
          const my = startY + i * spacing;
          return html`<line key=${'l' + i} class="team-topo-link" x1=${cx} y1=${leadY + 10} x2=${cx} y2=${my - 10} />`;
        })}
        ${leadMember && html`
          <g class="team-topo-node" transform="translate(${cx}, ${leadY})">
            <circle r="10" fill="${memberColor(leadMember)}" opacity="0.8" />
            <text class="topo-label" x="16" y="4">${leadMember.name}</text>
            <text class="topo-role" x="16" y="14">lead · ${leadMember.model || ''}</text>
          </g>
        `}
        ${others.map((m, i) => {
          const my = startY + i * spacing;
          return html`
            <g class="team-topo-node" key=${m.name} transform="translate(${cx}, ${my})">
              <circle r="8" fill="${memberColor(m)}" opacity="0.8" />
              <text class="topo-label" x="14" y="4">${m.name}</text>
              <text class="topo-role" x="14" y="14">${m.agentType || m.agent_type || ''} · ${m.model || ''}</text>
            </g>
          `;
        })}
      </svg>
    </div>
  `;
}

// --- Inbox Viewer ---

function InboxViewer({ teamName, inboxes, members }) {
  const agentNames = Object.keys(inboxes || {}).sort();
  const [selectedAgent, setSelectedAgent] = useState(agentNames[0] || '');
  const [msgText, setMsgText] = useState('');
  const [sending, setSending] = useState(false);
  const msgsRef = useRef(null);

  // Reset agent selection when team changes.
  useEffect(() => {
    const names = Object.keys(inboxes || {}).sort();
    if (names.length > 0 && !names.includes(selectedAgent)) {
      setSelectedAgent(names[0]);
    }
  }, [inboxes]);

  const messages = (inboxes && inboxes[selectedAgent]) || [];

  // Auto-scroll to bottom on new messages.
  useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [messages.length, selectedAgent]);

  async function send() {
    if (!msgText.trim() || sending) return;
    setSending(true);
    try {
      await fetch('api/teams/' + encodeURIComponent(teamName) + '/inbox/' + encodeURIComponent(selectedAgent), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: 'web-ui', text: msgText.trim() }),
      });
      setMsgText('');
    } catch (e) { console.error('send:', e); }
    setSending(false);
  }

  function renderMessage(msg, idx) {
    // Detect structured message type from text patterns.
    let msgType = '';
    let subject = '';
    if (msg.text) {
      if (msg.text.includes('idle_notification') || msg.text.includes('idle notification') || msg.text.includes("I'm idle") || msg.text.includes("ready for work")) {
        msgType = 'idle_notification';
      } else if (msg.text.includes('TASK:') || msg.text.includes('task_assignment') || msg.text.includes('Task:')) {
        msgType = 'task_assignment';
        const m = msg.text.match(/(?:TASK:|Task:)\s*(.+?)(?:\n|$)/);
        if (m) subject = m[1];
      } else if (msg.text.includes('shutdown') || msg.text.includes('SHUTDOWN')) {
        msgType = 'shutdown_request';
      } else if (msg.text.includes('permission') || msg.text.includes('Permission')) {
        msgType = 'permission_request';
      }
    }

    const cls = 'inbox-msg' + (msgType ? ' msg-' + msgType : '');

    return html`
      <div class=${cls} key=${idx}>
        <div>
          <span class="inbox-msg-from">${msg.from || 'unknown'}</span>
          ${msg.timestamp && html`<span class="inbox-msg-time">${relTime(msg.timestamp)}</span>`}
        </div>
        ${msgType === 'task_assignment' && subject && html`<div class="msg-subject">${subject}</div>`}
        ${msgType && html`<span class="msg-badge">${msgType.replace(/_/g, ' ')}</span>`}
        <div class="inbox-msg-text">${(msg.text || '').slice(0, 2000)}</div>
      </div>
    `;
  }

  return html`
    <div class="inbox-container">
      <div class="inbox-header">
        <span>inbox</span>
        <select class="inbox-select" value=${selectedAgent} onChange=${e => setSelectedAgent(e.target.value)}>
          ${agentNames.map(a => html`<option value=${a} key=${a}>${a} (${(inboxes[a] || []).length})</option>`)}
        </select>
      </div>
      <div class="inbox-messages" ref=${msgsRef}>
        ${messages.length === 0 && html`<div class="empty" style="padding:16px">no messages</div>`}
        ${messages.map(renderMessage)}
      </div>
      <div class="inbox-compose">
        <input placeholder="send message to ${selectedAgent}..." value=${msgText}
          onInput=${e => setMsgText(e.target.value)}
          onKeyDown=${e => { if (e.key === 'Enter') send(); }} />
        <button onClick=${send} disabled=${sending}>${sending ? '...' : 'send'}</button>
      </div>
    </div>
  `;
}

// --- Map Panel ---

function MapPanel({ urlParams, updateParams, navVersion }) {
  const [filter, setFilterRaw] = useState(urlParams.filter || '');
  const [mappings, setMappings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sortCol, setSortCol] = useState('');
  const [sortDir, setSortDir] = useState('asc');

  function setFilter(v) { setFilterRaw(v); updateParams({ filter: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setFilterRaw(urlParams.filter || '');
  }, [navVersion]);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const m = await api('mappings?' + qs({ filter }));
      setMappings(m || []);
    } catch (e) { console.error('mappings:', e); }
    setLoading(false);
  }, [filter]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  function toggleSort(col) {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  }

  const sorted = useMemo(() => {
    if (!sortCol || mappings.length === 0) return mappings;
    return [...mappings].sort((a, b) => {
      const va = a[sortCol] || '', vb = b[sortCol] || '';
      const cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb));
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }, [mappings, sortCol, sortDir]);

  const columns = [
    { key: 'iterm_session', label: 'iTerm2' },
    { key: 'cass_session', label: 'CASS' },
    { key: 'workspace', label: 'Project' },
    { key: 'title', label: 'Title' },
  ];

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <input class="filter-input" placeholder="filter..." value=${filter}
          onInput=${e => setFilter(e.target.value)} style="width:240px" />
      </div>
      ${loading && html`<div class="loading">loading mappings...</div>`}
      ${!loading && mappings.length === 0 && html`<div class="empty">no session mappings found</div>`}
      ${sorted.length > 0 && html`
        <table class="map-table">
          <thead>
            <tr>
              ${columns.map(c => html`
                <th class="${sortCol === c.key ? 'sorted' : ''}" onClick=${() => toggleSort(c.key)}>
                  ${c.label} <span class="sort-arrow">${sortCol === c.key ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}</span>
                </th>
              `)}
            </tr>
          </thead>
          <tbody>
            ${sorted.map(m => html`
              <tr key=${m.iterm_session}>
                <td>${m.iterm_session ? m.iterm_session.slice(0, 8) : ''}</td>
                <td>${m.cass_session ? m.cass_session.slice(0, 8) : ''}</td>
                <td style="color:var(--green)">${shortProject(m.workspace)}</td>
                <td>${m.title && m.title.length > 50 ? m.title.slice(0, 50) + '...' : m.title}</td>
              </tr>
            `)}
          </tbody>
        </table>
        <div class="result-count">${sorted.length} mappings</div>
      `}
    </div>
  `;
}

// --- Usage Panel ---

function fmtTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return '' + n;
}

function fmtResetCountdown(resetAt) {
  if (!resetAt) return '';
  const now = Math.floor(Date.now() / 1000);
  const diff = resetAt - now;
  if (diff <= 0) return 'resetting…';
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  if (h > 0) return 'resets in ' + h + 'h ' + m + 'm';
  return 'resets in ' + m + 'm';
}

function RateLimitGauges({ latestLimits }) {
  if (!latestLimits || latestLimits.length === 0) {
    return html`
      <div class="rl-no-data">
        no rate-limit data — run <code>cass index --har-dir &lt;proxyman-har-export-dir&gt;</code>
        or ensure proxyman artifact files exist at <code>~/.it2/sessions/*/proxy-traffic.*.jsonl</code>
      </div>
    `;
  }

  // Find binding constraint bucket (representative_claim is per-snapshot; here check max utilization).
  const maxUtil = Math.max(...latestLimits.map(l => l.utilization));

  return html`
    <div class="rl-gauges">
      ${latestLimits.map(gauge => {
        const pct = Math.round(gauge.utilization * 100);
        const fillClass = pct >= 80 ? 'high' : pct >= 50 ? 'medium' : 'low';
        const isBinding = gauge.utilization === maxUtil && maxUtil > 0;
        const label = gauge.bucket === '5h' ? '5-hour window' :
                      gauge.bucket === '7d' ? '7-day global' :
                      '7-day ' + gauge.bucket.replace('7d_', '');
        return html`
          <div class="rl-gauge ${isBinding ? 'binding' : ''}">
            <div class="rl-gauge-label">${label}</div>
            <div class="rl-gauge-track">
              <div class="rl-gauge-fill ${fillClass}" style="width:${pct}%"></div>
            </div>
            <div class="rl-gauge-pct">${pct}%</div>
            <div class="rl-gauge-reset">${fmtResetCountdown(gauge.reset_at)}</div>
            ${isBinding && maxUtil > 0 && html`<div class="rl-gauge-binding">binding constraint</div>`}
          </div>
        `;
      })}
    </div>
  `;
}

function TokenTimeline({ daily }) {
  if (!daily || daily.length === 0) {
    return html`
      <div class="rl-no-data">
        no token usage data — index HAR files or proxyman artifacts to populate
      </div>
    `;
  }

  const W = 700, H = 80, padL = 0, padR = 0, padT = 4, padB = 0;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const colors = {
    input: '#7ab8d4',
    cache_creation: '#d4a017',
    cache_read: '#6ab04c',
    output: '#e87d3e',
  };

  // Compute stacked max.
  const maxStack = Math.max(...daily.map(d =>
    d.input_tokens + d.output_tokens + d.cache_read_tokens + d.cache_creation_tokens
  ), 1);

  const n = daily.length;
  const barW = Math.max(1, chartW / n - 1);

  const [tooltip, setTooltip] = useState(null);

  function barX(i) { return padL + i * (chartW / n); }
  function barH(v) { return Math.max(1, (v / maxStack) * chartH); }

  // Build stacked bars.
  const bars = daily.map((d, i) => {
    const total = d.input_tokens + d.output_tokens + d.cache_read_tokens + d.cache_creation_tokens;
    if (total === 0) return null;
    const x = barX(i);
    let y = H - padB;
    const segs = [];
    for (const [key, color] of [
      ['input_tokens', colors.input],
      ['cache_creation_tokens', colors.cache_creation],
      ['cache_read_tokens', colors.cache_read],
      ['output_tokens', colors.output],
    ]) {
      const h = barH(d[key]);
      y -= h;
      segs.push(html`<rect key=${key} x=${x} y=${y} width=${barW} height=${h} fill=${color} />`);
    }
    return html`
      <g key=${d.day}
        onMouseEnter=${(e) => {
          const rect = e.currentTarget.closest('svg').getBoundingClientRect();
          setTooltip({ day: d.day, data: d, x: e.clientX - rect.left, y: e.clientY - rect.top });
        }}
        onMouseLeave=${() => setTooltip(null)}
        style="cursor:default"
      >${segs}</g>
    `;
  });

  // X-axis labels: first, middle, last.
  const labelIdxs = [0, Math.floor(n / 2), n - 1].filter((v, i, a) => a.indexOf(v) === i);

  return html`
    <div class="token-chart">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:80px">
        ${bars}
      </svg>
      <div class="token-chart-xaxis">
        ${labelIdxs.map(i => html`<span key=${i}>${daily[i]?.day || ''}</span>`)}
      </div>
      <div class="token-chart-legend">
        ${[
          ['input', colors.input, 'input tokens'],
          ['cache_creation', colors.cache_creation, 'cache creation (1.25×)'],
          ['cache_read', colors.cache_read, 'cache read (~0.1×)'],
          ['output', colors.output, 'output tokens ⚠'],
        ].map(([k, c, label]) => html`
          <span key=${k}>
            <span class="legend-swatch" style="background:${c}"></span>${label}
          </span>
        `)}
      </div>
      <div class="undercount-note">
        ⚠ output tokens from session JSONL files are undercounted (streaming-start snapshot);
        accurate values require HAR proxy data.
      </div>
      ${tooltip && html`
        <div class="token-chart-tooltip" style="left:${tooltip.x + 12}px;top:${tooltip.y - 20}px">
          <div class="token-chart-tooltip-title">${tooltip.day}</div>
          <div class="token-chart-tooltip-row"><span>input</span><span>${fmtTokens(tooltip.data.input_tokens)}</span></div>
          <div class="token-chart-tooltip-row"><span>cache creation</span><span>${fmtTokens(tooltip.data.cache_creation_tokens)}</span></div>
          <div class="token-chart-tooltip-row"><span>cache read</span><span>${fmtTokens(tooltip.data.cache_read_tokens)}</span></div>
          <div class="token-chart-tooltip-row"><span>output ⚠</span><span>${fmtTokens(tooltip.data.output_tokens)}</span></div>
          <div class="token-chart-tooltip-row"><span>requests</span><span>${tooltip.data.requests}</span></div>
        </div>
      `}
    </div>
  `;
}

function ContextCompositionBar({ daily }) {
  // Aggregate context bytes across all days.
  if (!daily || daily.length === 0) return html`
    <div class="rl-no-data">
      no context breakdown data — requires HAR proxy capture with request bodies
    </div>
  `;

  // daily rows have system_prompt_bytes, tool_definition_bytes, conversation_bytes from api_requests.
  // Check if any are non-zero.
  const totalSys = daily.reduce((s, d) => s + (d.system_prompt_bytes || 0), 0);
  const totalTool = daily.reduce((s, d) => s + (d.tool_definition_bytes || 0), 0);
  const totalConv = daily.reduce((s, d) => s + (d.conversation_bytes || 0), 0);
  const totalBytes = totalSys + totalTool + totalConv;

  if (totalBytes === 0) return html`
    <div class="rl-no-data">
      no context breakdown — requires HAR files with request body capture
    </div>
  `;

  const segs = [
    { key: 'tools', label: 'tool definitions', bytes: totalTool, color: '#e87d3e' },
    { key: 'system', label: 'system prompt', bytes: totalSys, color: '#7ab8d4' },
    { key: 'convo', label: 'conversation', bytes: totalConv, color: '#6ab04c' },
  ].filter(s => s.bytes > 0);

  return html`
    <div class="ctx-bar-wrap">
      <div class="ctx-stacked">
        ${segs.map(s => {
          const pct = (s.bytes / totalBytes * 100).toFixed(1);
          return html`
            <div key=${s.key} class="ctx-seg" style="width:${pct}%;background:${s.color}" title="${s.label}: ${pct}%">
              ${parseFloat(pct) > 8 && html`<span class="ctx-seg-label">${pct}%</span>`}
            </div>
          `;
        })}
      </div>
      <div class="ctx-legend">
        ${segs.map(s => {
          const pct = (s.bytes / totalBytes * 100).toFixed(1);
          return html`
            <span key=${s.key} class="ctx-legend-item">
              <span class="legend-swatch" style="background:${s.color}"></span>
              ${s.label} ${pct}%
            </span>
          `;
        })}
      </div>
    </div>
  `;
}

function UsagePanel({ urlParams, updateParams, navVersion }) {
  const [data, setData] = useState(null);
  const [since, setSinceRaw] = useState(urlParams.since || '720h');

  function setSince(v) { setSinceRaw(v); updateParams({ since: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSinceRaw(urlParams.since || '720h');
  }, [navVersion]);

  const load = useCallback(async () => {
    try {
      const d = await api('usage' + (since ? '?since=' + since : ''));
      setData(d);
    } catch (e) { console.error('usage:', e); }
  }, [since]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  const timePresets = [
    { label: '7d', value: '168h' },
    { label: '30d', value: '720h' },
    { label: '90d', value: '2160h' },
    { label: 'All', value: '0s' },
  ];

  const card = (label, value, sub) => html`
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
      ${sub && html`<div class="stat-sub">${sub}</div>`}
    </div>
  `;

  // Aggregate daily totals for summary cards.
  const daily = data?.daily || [];
  const totalInput = daily.reduce((s, d) => s + d.input_tokens, 0);
  const totalOutput = daily.reduce((s, d) => s + d.output_tokens, 0);
  const totalCacheCreate = daily.reduce((s, d) => s + d.cache_creation_tokens, 0);
  const totalCacheRead = daily.reduce((s, d) => s + d.cache_read_tokens, 0);
  const totalRequests = daily.reduce((s, d) => s + d.requests, 0);

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <div class="filter-chips">
          ${timePresets.map(t => html`
            <button class="filter-chip ${since === t.value ? 'active' : ''}"
              onClick=${() => setSince(t.value)}>${t.label}</button>
          `)}
        </div>
      </div>

      ${!data && html`<div class="loading">loading usage...</div>`}

      ${data && html`
        <div class="usage-section">
          <div class="stats-grid" style="margin-bottom:0">
            ${card('api requests', fmtNum(data.api_request_count))}
            ${card('input tokens', fmtTokens(totalInput), 'selected window')}
            ${card('output tokens ⚠', fmtTokens(totalOutput), 'undercounted from JSONL')}
            ${card('cache creation', fmtTokens(totalCacheCreate), '1.25× cost')}
            ${card('cache read', fmtTokens(totalCacheRead), '~0.1× cost')}
          </div>
        </div>

        <div class="usage-section">
          <div class="usage-section-title">rate limit utilization</div>
          <${RateLimitGauges} latestLimits=${data.latest_limits} />
        </div>

        <div class="usage-section">
          <div class="usage-section-title">token usage over time</div>
          <${TokenTimeline} daily=${daily} />
        </div>

        <div class="usage-section">
          <div class="usage-section-title">context composition (aggregate)</div>
          <${ContextCompositionBar} daily=${daily} />
        </div>
      `}
    </div>
  `;
}

// --- Stats Panel ---

function StatsPanel({ urlParams, updateParams, navVersion }) {
  const [basic, setBasic] = useState(null);
  const [agg, setAgg] = useState(null);
  const [since, setSinceRaw] = useState(urlParams.since || '');
  const [indexing, setIndexing] = useState(false);

  function setSince(v) { setSinceRaw(v); updateParams({ since: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSinceRaw(urlParams.since || '');
  }, [navVersion]);

  const load = useCallback(async () => {
    try {
      const [b, a] = await Promise.all([
        api('stats'),
        api('stats?aggregate=true' + (since ? '&since=' + since : '')),
      ]);
      setBasic(b);
      setAgg(a);
    } catch (e) { console.error('stats:', e); }
  }, [since]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  async function reindex(force) {
    setIndexing(true);
    try { await api('index?force=' + force, { method: 'POST' }); load(); }
    catch (e) { alert('Index error: ' + e.message); }
    setIndexing(false);
  }

  if (!basic || !agg) return html`<div class="loading">loading stats...</div>`;

  const lastIdx = basic.last_indexed
    ? new Date(parseInt(basic.last_indexed) * 1000).toLocaleString()
    : 'never';

  const card = (label, value, sub) => html`
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
      ${sub && html`<div class="stat-sub">${sub}</div>`}
    </div>
  `;

  // Sessions per day SVG bar chart.
  const daily = agg.sessions_per_day || {};
  const days = Object.keys(daily).sort();
  const dayVals = days.map(d => daily[d]);
  const maxDay = Math.max(...dayVals, 1);

  // Workspace leaderboard.
  const wsEntries = agg.workspace_top
    ? Object.entries(agg.workspace_top).sort((a, b) => b[1] - a[1])
    : [];
  const wsMax = wsEntries.length > 0 ? wsEntries[0][1] : 1;
  const skillEntries = agg.top_skills
    ? Object.entries(agg.top_skills).sort((a, b) => b[1] - a[1]).slice(0, 10)
    : [];
  const skillMax = skillEntries.length > 0 ? skillEntries[0][1] : 1;

  const timePresets = [
    { label: 'All', value: '' }, { label: '24h', value: '24h' },
    { label: '7d', value: '168h' }, { label: '30d', value: '720h' },
  ];

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <div class="filter-chips">
          ${timePresets.map(t => html`
            <button class="filter-chip ${since === t.value ? 'active' : ''}"
              onClick=${() => setSince(t.value)}>${t.label}</button>
          `)}
        </div>
        <button class="btn btn-sm" onClick=${() => reindex(false)} disabled=${indexing}>
          ${indexing ? 'indexing...' : 're-index'}
        </button>
        <button class="btn btn-sm" onClick=${() => reindex(true)} disabled=${indexing}>full</button>
      </div>

      <div class="stats-grid">
        ${card('sessions', fmtNum(agg.sessions), agg.agents + (agg.agents === 1 ? ' agent' : ' agents') + ', ' + agg.workspaces + (agg.workspaces === 1 ? ' workspace' : ' workspaces'))}
        ${card('tool calls', fmtNum(agg.tool_calls))}
        ${card('total tokens', fmtNum(agg.total_tokens), fmtNum(agg.input_tokens) + ' in / ' + fmtNum(agg.output_tokens) + ' out')}
        ${card('turns', fmtNum(agg.turns))}
        ${card('files', fmtNum(agg.files_read + agg.files_written + agg.files_edited), fmtNum(agg.files_read) + ' read · ' + fmtNum(agg.files_edited) + ' edited · ' + fmtNum(agg.files_written) + ' written')}
        ${card('lines written', fmtNum(agg.lines_written))}
        ${card('total time', fmtDuration(agg.duration_secs))}
        ${card('subagent spawns', fmtNum(agg.subagent_spawns))}
        ${card('workflows', fmtNum(agg.workflows || 0), (agg.workflow_agents || 0) + ' agents · ' + (agg.workflow_task_ops || 0) + ' task ops')}
        ${card('goals', fmtNum(agg.goals || 0), (agg.active_goals || 0) + ' active · ' + (agg.completed_goals || 0) + ' complete')}
        ${card('skill use', fmtNum((agg.selected_skills || 0) + (agg.loaded_skills || 0)),
          (agg.selected_skills || 0) + ' selected · ' + (agg.loaded_skills || 0) + ' loaded' +
          ((agg.context_skills || 0) ? ' · ' + (agg.context_skills || 0) + ' context' : '') +
          ((agg.skills || 0) > ((agg.selected_skills || 0) + (agg.loaded_skills || 0) + (agg.context_skills || 0))
            ? ' · ' + ((agg.skills || 0) - ((agg.selected_skills || 0) + (agg.loaded_skills || 0) + (agg.context_skills || 0))) + ' available hidden'
            : ''))}
        ${card('it2 interactions', fmtNum(agg.it2_splits + agg.it2_sends + agg.it2_screens),
          agg.it2_splits + ' splits · ' + agg.it2_sends + ' sends · ' + agg.it2_screens + ' screens')}
        ${card('team ops', fmtNum(agg.team_inbox_reads + agg.team_inbox_sends + agg.team_task_ops + agg.team_spawns),
          agg.team_inbox_reads + ' reads · ' + agg.team_inbox_sends + ' msgs · ' + agg.team_task_ops + ' tasks · ' + agg.team_spawns + ' spawns')}
        ${card('last indexed', lastIdx)}
      </div>

      ${days.length > 0 && html`
        <div class="chart-section">
          <div class="stat-label" style="margin-bottom:8px">sessions per day (30d)</div>
          <svg viewBox="0 0 ${Math.max(days.length * 16, 100)} 80" preserveAspectRatio="none" style="height:60px">
            ${dayVals.map((v, i) => {
              const barH = Math.max(1, (v / maxDay) * 60);
              const x = i * (100 / days.length);
              const w = Math.max(1, (100 / days.length) - 1);
              return html`<rect x="${x}%" y=${65 - barH} width="${w}%" height=${barH} fill="var(--accent)" opacity="0.7"><title>${days[i]}: ${v}</title></rect>`;
            })}
          </svg>
          <div style="font-size:10px;color:var(--faint);margin-top:4px">
            ${days[0]} — ${days[days.length - 1]} (peak: ${Math.max(...dayVals)}/day)
          </div>
        </div>
      `}

      ${wsEntries.length > 0 && html`
        <div class="chart-section">
          <div class="stat-label" style="margin-bottom:8px">top workspaces</div>
          ${wsEntries.map(([ws, cnt]) => html`
            <div class="ws-row" key=${ws}>
              <span class="ws-label" title=${ws}>${shortProject(ws)}</span>
              <div class="ws-track"><div class="ws-fill" style="width:${(cnt/wsMax*100).toFixed(1)}%"></div></div>
              <span class="ws-count">${cnt}</span>
            </div>
          `)}
        </div>
      `}

      ${skillEntries.length > 0 && html`
        <div class="chart-section">
          <div class="stat-label" style="margin-bottom:8px">top skills</div>
          ${skillEntries.map(([skill, cnt]) => html`
            <div class="ws-row" key=${skill}>
              <span class="ws-label" title=${skill}>${skill}</span>
              <div class="ws-track"><div class="ws-fill" style="width:${(cnt/skillMax*100).toFixed(1)}%"></div></div>
              <span class="ws-count">${cnt}</span>
            </div>
          `)}
        </div>
      `}
    </div>
  `;
}

// --- Mount ---
render(html`<${App} />`, document.getElementById('app'));
</script>
