<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CASS — Coding Agent Session Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app"></div>
<script type="module">
import { html, render } from 'https://esm.sh/htm@3/preact?deps=preact@10';
import { useState, useEffect, useCallback, useRef, useMemo } from 'https://esm.sh/preact@10/hooks';
import { AnsiUp } from 'https://esm.sh/ansi_up@6.0.2';

// Shared ansi_up instance for ANSI → HTML conversion.
const ansiUp = new AnsiUp();
ansiUp.use_classes = true;

// --- API helpers ---

// Global DB status for UI feedback.
let dbBusyListeners = new Set();
let dbBusy = false;
function setDbBusy(busy) {
  dbBusy = busy;
  dbBusyListeners.forEach(fn => fn(busy));
}

// In-flight GET requests, keyed by path, so concurrent identical reads (e.g.
// the header and stats panel both refreshing 'stats?aggregate=true') share one
// fetch instead of stacking. GET params are already encoded in path via qs().
const inflightGets = new Map();
const workflowAgentCache = new Map();
const sessionEntryPageSize = 80;
const workflowAgentPageSize = 40;

const refreshMinInterval = 2500;
const headerStatsRefreshMinInterval = 30000;
let refreshLast = 0;
let refreshTimer = null;
let refreshDetail = null;

function dispatchRefresh() {
  refreshLast = Date.now();
  refreshTimer = null;
  const pending = refreshDetail;
  refreshDetail = null;
  const detail = pending ? { ...pending, paths: Array.from(pending.paths || []) } : {};
  const paths = refreshPaths(detail);
  if (paths.length === 0) {
    workflowAgentCache.clear();
  } else {
    for (const sourcePath of Array.from(workflowAgentCache.keys())) {
      if (refreshTouchesPath(detail, sourcePath)) workflowAgentCache.delete(sourcePath);
    }
  }
  window.dispatchEvent(new CustomEvent('cass:refresh', { detail }));
}

function scheduleAppRefresh(delay = 300, detail) {
  mergeRefreshDetail(detail);
  const now = Date.now();
  const next = Math.max(refreshLast + refreshMinInterval, now + delay);
  const wait = Math.max(0, next - now);
  if (refreshTimer !== null) {
    clearTimeout(refreshTimer);
  }
  refreshTimer = setTimeout(dispatchRefresh, wait);
}

function mergeRefreshDetail(detail) {
  if (!detail) return;
  if (!refreshDetail) refreshDetail = { paths: new Set(), indexed: 0 };
  for (const p of refreshPaths(detail)) {
    if (p) refreshDetail.paths.add(p);
  }
  if (detail.indexed) refreshDetail.indexed += detail.indexed;
}

function refreshPaths(detail) {
  if (!detail) return [];
  const paths = detail.paths || detail.changed_paths || [];
  if (paths instanceof Set) return Array.from(paths);
  return Array.isArray(paths) ? paths : [];
}

function refreshTouchesPath(detail, sourcePath) {
  if (!sourcePath) return true;
  const paths = refreshPaths(detail);
  if (paths.length === 0) return true;
  return paths.some(p => p === sourcePath);
}

function refreshTouchesSession(detail, hit) {
  if (!hit || !hit.source_path) return true;
  const paths = refreshPaths(detail);
  if (paths.length === 0) return true;
  const sourcePath = hit.source_path;
  const sessionDir = sourcePath.endsWith('.jsonl') ? sourcePath.slice(0, -'.jsonl'.length) + '/' : '';
  return paths.some(p => p === sourcePath || (sessionDir && p.startsWith(sessionDir)));
}

async function fetchJSON(path, opts) {
  const maxRetries = 3;
  for (let attempt = 0; attempt <= maxRetries; attempt++) {
    const r = await fetch('api/' + path, opts);
    if (r.status === 503) {
      setDbBusy(true);
      if (attempt < maxRetries) {
        await new Promise(ok => setTimeout(ok, 500 * (attempt + 1)));
        continue;
      }
      const body = await r.text();
      throw new Error(body || 'database busy');
    }
    setDbBusy(false);
    if (!r.ok) throw new Error(await r.text());
    return r.json();
  }
}

function api(path, opts) {
  // Only coalesce idempotent GETs; never share a mutating request.
  const method = opts && opts.method ? opts.method.toUpperCase() : 'GET';
  if (method !== 'GET') return fetchJSON(path, opts);
  const existing = inflightGets.get(path);
  if (existing) return existing;
  // Delete on settle (success or error) so a failure does not poison the cache.
  const p = fetchJSON(path, opts).finally(() => inflightGets.delete(path));
  inflightGets.set(path, p);
  return p;
}

function errorMessage(err, fallback) {
  if (!err || !err.message) return fallback;
  try {
    const body = JSON.parse(err.message);
    return body.error || fallback;
  } catch {
    return err.message || fallback;
  }
}

function qs(params) {
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) {
    if (v) p.set(k, v);
  }
  return p.toString();
}

function entryContentKey(e) {
  const msg = e?.message || {};
  const content = msg.content;
  if (typeof content === 'string') return content.slice(0, 240);
  if (Array.isArray(content)) {
    return content.map(block => {
      if (!block) return '';
      if (block.type === 'tool_use') return ['tool_use', block.id || '', block.name || ''].join(':');
      if (block.type === 'tool_result') return ['tool_result', block.tool_use_id || '', block.is_error ? 'error' : 'ok'].join(':');
      return String(block.text || block.type || '').slice(0, 80);
    }).join('|').slice(0, 240);
  }
  if (e?.content) return String(e.content).slice(0, 240);
  if (e?.summary) return String(e.summary).slice(0, 240);
  return '';
}

function entryKey(e) {
  if (!e) return '';
  if (e.uuid) return 'uuid:' + e.uuid;
  const msg = e.message || {};
  const parts = [
    e.timestamp || '',
    e.type || '',
    e.subtype || '',
    e.agentId || '',
    msg.id || '',
    msg.role || '',
    entryContentKey(e),
  ];
  const key = parts.join('|');
  return key === '||||||' ? '' : 'entry:' + key;
}

function mergeNewestEntries(page, existing) {
  const seen = new Set();
  const next = [];
  for (const e of (page || []).concat(existing || [])) {
    const key = entryKey(e);
    if (key && seen.has(key)) continue;
    if (key) seen.add(key);
    next.push(e);
  }
  return next;
}

function shellQuote(s) {
  if (!s) return "''";
  if (/^[A-Za-z0-9_./:@%+=,-]+$/.test(s)) return s;
  return "'" + s.replace(/'/g, "'\\''") + "'";
}

function shortSessionID(id) {
  return id && id.length > 8 ? id.slice(0, 8) : (id || '');
}

function normalizeDetailTab(tab) {
  return tab === 'agents' || tab === 'requests' || tab === 'workflows' ? tab : 'conversation';
}

// claudeResumeID extracts the Claude session UUID a `claude --resume <id>`
// needs from a session's source_path. The cass session_id is a sha256 of the
// path, not resumable; the real id is the JSONL filename
// (~/.claude/projects/<encoded>/<uuid>.jsonl). Returns '' for a subagent or
// workflow-agent transcript (agent-*.jsonl), which is not independently
// resumable.
function claudeResumeID(hit) {
  const p = hit && hit.source_path;
  if (!p || !p.endsWith('.jsonl')) return '';
  const base = p.slice(p.lastIndexOf('/') + 1, -'.jsonl'.length);
  if (base.startsWith('agent-')) return ''; // subagent/workflow-agent file.
  return base;
}

function resumeCommand(hit) {
  if (!hit || !hit.agent) return '';
  const prefix = hit.workspace ? 'cd ' + shellQuote(hit.workspace) + ' && ' : '';
  if (hit.agent === 'codex-cli' || hit.agent === 'codex-app') {
    return prefix + 'codex resume' + (hit.session_id ? ' ' + shellQuote(hit.session_id) : '');
  }
  // gemini --resume takes a session index or "latest", not a UUID, so resume
  // interactively rather than guess an id.
  if (hit.agent === 'gemini-cli') return prefix + 'gemini --resume';
  const id = claudeResumeID(hit);
  return prefix + 'claude --resume' + (id ? ' ' + shellQuote(id) : '');
}

async function copyText(text) {
  if (!text) return;
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
}

// --- Utilities ---

function relTime(ts) {
  if (!ts) return '';
  const d = Date.now() - new Date(ts).getTime();
  const s = Math.floor(d / 1000);
  if (s < 5) return 'now';
  if (s < 60) return s + 's ago';
  const m = Math.floor(s / 60);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const days = Math.floor(h / 24);
  if (days < 7) return days + 'd ago';
  return ts.slice(0, 10);
}

function shortProject(ws) {
  if (!ws) return '';
  const idx = ws.indexOf('github.com/');
  if (idx >= 0) {
    const after = ws.slice(idx + 11);
    const parts = after.split('/');
    return parts.length >= 2 ? parts[0] + '/' + parts[1] : after;
  }
  const parts = ws.split('/');
  return parts.slice(-2).join('/');
}

function fmtDuration(secs) {
  if (!secs) return '';
  if (secs < 60) return secs + 's';
  const m = Math.floor(secs / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
  return '' + n;
}

function goalGateSummary(gates) {
  const summary = { total: 0, unresolved: 0, complete: 0, required: 0, missing: 0, blocked: 0 };
  for (const gate of gates || []) {
    const status = gate.status || 'required';
    summary.total++;
    if (status === 'complete') summary.complete++;
    if (status === 'required') summary.required++;
    if (status === 'missing') summary.missing++;
    if (status === 'blocked') summary.blocked++;
    if (status === 'missing' || status === 'blocked' || status === 'required') summary.unresolved++;
  }
  return summary;
}

// Format number with locale separators for hover titles (e.g. 1,234,567).
function exactNum(n) {
  if (n == null || isNaN(n)) return '0';
  return Number(n).toLocaleString('en-US');
}

// --- Rolling number animation ---

function RollingNum({ value, format, label }) {
  const ref = useRef(null);
  const prevRef = useRef(value);
  const display = format ? format(value) : fmtNum(value);
  const exact = format ? format(value) : exactNum(value);
  const tip = label ? exact + ' ' + label : exact;

  useEffect(() => {
    if (!ref.current) return;
    if (prevRef.current !== value) {
      ref.current.classList.remove('roll-tick');
      void ref.current.offsetWidth;
      ref.current.classList.add('roll-tick');
      prevRef.current = value;
    }
  }, [value]);

  return html`<span class="rolling-num" ref=${ref} title=${tip}>${display}</span>`;
}

// --- Agent data extraction ---

function useAgentData(entries, workflows) {
  return useMemo(() => {
    const spawns = [];     // Task tool_use blocks from parent
    const results = {};    // tool_use_id -> completion data
    const agentMap = {};   // agentId -> stats
    const workflowAliases = workflowAgentAliases(workflows);

    for (const entry of entries) {
      // Pass 1: Collect Task tool_use spawns from parent assistant messages.
      if (!entry.isSidechain && entry.message?.role === 'assistant' && Array.isArray(entry.message.content)) {
        for (const block of entry.message.content) {
          if (block.type === 'tool_use' && block.name === 'Task') {
            const input = block.input || {};
            spawns.push({
              toolUseId: block.id,
              description: input.description || '',
              subagentType: input.subagent_type || input.subagentType || '',
              model: input.model || '',
              prompt: (input.prompt || '').slice(0, 200),
              timestamp: entry.timestamp,
              teamName: input.team_name || '',
              agentName: input.name || '',
            });
          }
        }
      }

      // Pass 1: Collect tool_result completions for Task spawns.
      // These appear in user messages as tool_result blocks, or as top-level toolUseResult.
      if (!entry.isSidechain && entry.message?.role === 'user' && Array.isArray(entry.message.content)) {
        for (const block of entry.message.content) {
          if (block.type === 'tool_result' && block.tool_use_id) {
            results[block.tool_use_id] = {
              timestamp: entry.timestamp,
              isError: block.is_error || false,
              content: typeof block.content === 'string' ? block.content.slice(0, 300) : '',
            };
          }
        }
      }
      // Also check top-level toolUseResult (has aggregated metrics).
      if (!entry.isSidechain && entry.toolUseResult) {
        const r = entry.toolUseResult;
        // Match by finding the most recent unmatched spawn.
        // toolUseResult entries don't carry tool_use_id directly, but they
        // appear in order after the corresponding spawn.
        if (r.totalTokens || r.totalToolUseCount || r.totalDurationMs) {
          // Store for later matching — we'll match by order.
          if (!results._pending) results._pending = [];
          results._pending.push({
            timestamp: entry.timestamp,
            totalTokens: r.totalTokens || 0,
            totalToolUseCount: r.totalToolUseCount || 0,
            totalDurationMs: r.totalDurationMs || 0,
            success: r.success !== false,
          });
        }
      }

      // Pass 1: Aggregate sidechain entries by agentId.
      if (entry.isSidechain && entry.agentId) {
        const id = entry.agentId;
        if (!agentMap[id]) {
          agentMap[id] = {
            id,
            inputTokens: 0,
            outputTokens: 0,
            cacheReads: 0,
            toolUses: 0,
            toolBreakdown: {},
            turns: 0,
            firstSeen: entry.timestamp,
            lastSeen: entry.timestamp,
            lastActivity: '',
          };
        }
        const a = agentMap[id];
        if (entry.timestamp && entry.timestamp < a.firstSeen) a.firstSeen = entry.timestamp;
        if (entry.timestamp && entry.timestamp > a.lastSeen) a.lastSeen = entry.timestamp;

        // Count tokens from assistant messages.
        if (entry.message?.role === 'assistant' && entry.message?.usage) {
          a.inputTokens += entry.message.usage.input_tokens || 0;
          a.outputTokens += entry.message.usage.output_tokens || 0;
          a.cacheReads += entry.message.usage.cache_read_input_tokens || 0;
        }

        // Count tool uses.
        if (entry.message?.role === 'assistant' && Array.isArray(entry.message?.content)) {
          for (const block of entry.message.content) {
            if (block.type === 'tool_use') {
              a.toolUses++;
              a.toolBreakdown[block.name] = (a.toolBreakdown[block.name] || 0) + 1;
            }
          }
        }

        // Count user turns.
        if (entry.message?.role === 'user') {
          a.turns++;
        }

        // Extract progress/status.
        if (entry.type === 'progress' && entry.content) {
          a.lastActivity = entry.content;
        }
      }
    }

    // Match spawns to agents by spawn order (stable, doesn't race).
    // First, pair each spawn with the closest-matching agentId.
    const pairedAgentIds = new Set();
    const spawnToAgent = new Map(); // spawnIndex -> agentId

    // Sort agentIds by firstSeen to match against spawns in order.
    const agentIdsByTime = Object.keys(agentMap).sort((a, b) => {
      const ta = agentMap[a].firstSeen || '';
      const tb = agentMap[b].firstSeen || '';
      return ta < tb ? -1 : ta > tb ? 1 : 0;
    });

    for (let si = 0; si < spawns.length; si++) {
      // Find the next unpaired agent closest in time to this spawn.
      for (const aid of agentIdsByTime) {
        if (!pairedAgentIds.has(aid)) {
          spawnToAgent.set(si, aid);
          pairedAgentIds.add(aid);
          break;
        }
      }
    }

    // Final order: spawns in order, then any unmatched agents at the end.
    const orderedAgentIds = [];
    for (let si = 0; si < spawns.length; si++) {
      const aid = spawnToAgent.get(si);
      if (aid) orderedAgentIds.push(aid);
    }
    for (const aid of agentIdsByTime) {
      if (!pairedAgentIds.has(aid)) orderedAgentIds.push(aid);
    }

    // Pending ToolUseResult entries (matched by order).
    const pendingResults = results._pending || [];

    const agents = orderedAgentIds.map((id, i) => {
      const a = agentMap[id];
      const spawn = spawns[i] || {};
      const meta = workflowAliases.byID[id] || {};

      // Determine completion status.
      // 1. Check tool_result by tool_use_id.
      const resultByToolUse = spawn.toolUseId ? results[spawn.toolUseId] : null;
      // 2. Check pending ToolUseResult by order.
      const pendingResult = pendingResults[i] || null;
      // 3. Workflow fan-out agents do not have parent Task results; their
      // journal-derived status is folded into hit.workflows[].agents[].
      const workflowStatus = meta.status || '';

      const isFinished = !!(resultByToolUse || pendingResult || workflowStatus === 'completed' || workflowStatus === 'error');
      const isError = resultByToolUse?.isError || (pendingResult && !pendingResult.success) || workflowStatus === 'error' || false;

      // Prefer ToolUseResult metrics if available (more accurate).
      let durationSecs;
      if (pendingResult?.totalDurationMs) {
        durationSecs = Math.round(pendingResult.totalDurationMs / 1000);
      } else {
        const firstMs = new Date(a.firstSeen).getTime();
        const lastMs = new Date(a.lastSeen).getTime();
        durationSecs = Math.max(0, Math.round((lastMs - firstMs) / 1000));
      }

      // Status: running, completed, error.
      let status = 'running';
      if (isFinished) status = isError ? 'error' : 'completed';
      if (workflowStatus === 'running' || workflowStatus === 'starting' || workflowStatus === 'unknown') {
        status = workflowStatus;
      }

      return {
        ...a,
        description: spawn.description || '',
        subagentType: spawn.subagentType || '',
        model: spawn.model || '',
        promptPreview: spawn.prompt || '',
        teamName: spawn.teamName || '',
        agentName: spawn.agentName || '',
        durationSecs,
        status,
        isFinished,
        isError,
        spawnedAt: spawn.timestamp || a.firstSeen,
        finishedAt: resultByToolUse?.timestamp || pendingResult?.timestamp || (isFinished ? a.lastSeen : null),
        reportedTokens: pendingResult?.totalTokens || 0,
        reportedToolUses: pendingResult?.totalToolUseCount || 0,
      };
    });

    // Also include spawns without sidechain data (agents that may still be starting).
    // These are spawns beyond the orderedAgentIds count.
    for (let i = orderedAgentIds.length; i < spawns.length; i++) {
      const spawn = spawns[i];
      const resultByToolUse = spawn.toolUseId ? results[spawn.toolUseId] : null;
      const pendingResult = pendingResults[i] || null;
      const isFinished = !!(resultByToolUse || pendingResult);
      const isError = resultByToolUse?.isError || false;
      agents.push({
        id: 'pending-' + i,
        description: spawn.description || '',
        subagentType: spawn.subagentType || '',
        model: spawn.model || '',
        promptPreview: spawn.prompt || '',
        teamName: spawn.teamName || '',
        agentName: spawn.agentName || '',
        inputTokens: 0, outputTokens: 0, cacheReads: 0,
        toolUses: 0, toolBreakdown: {}, turns: 0,
        firstSeen: spawn.timestamp, lastSeen: spawn.timestamp,
        lastActivity: '',
        durationSecs: 0,
        status: isFinished ? (isError ? 'error' : 'completed') : 'starting',
        isFinished, isError,
        spawnedAt: spawn.timestamp,
        finishedAt: resultByToolUse?.timestamp || null,
        reportedTokens: 0, reportedToolUses: 0,
      });
    }

    const totalTokens = agents.reduce((s, a) => s + a.inputTokens + a.outputTokens, 0);
    const totalToolUses = agents.reduce((s, a) => s + a.toolUses, 0);
    const finishedCount = agents.filter(a => a.isFinished).length;
    const runningCount = agents.filter(agentIsRunning).length;

    return {
      agents,
      hasAgents: agents.length > 0,
      totalAgents: agents.length,
      totalTokens,
      totalToolUses,
      finishedCount,
      runningCount,
      spawns,
    };
  }, [entries, workflows]);
}

function agentTimeValue(v) {
  if (!v || String(v).startsWith('0001-')) return '';
  return v;
}

function firstAgentTime(...vals) {
  for (const v of vals) {
    const t = agentTimeValue(v);
    if (t) return t;
  }
  return '';
}

function agentDataFromSubagentRuns(runs) {
  if (!runs || runs.length === 0) return null;
  const agents = runs
    .filter(run => run && !run.is_compaction)
    .map((run, i) => {
      const status = run.status || 'unknown';
      const normalized = normalizedAgentStatus(status);
      const started = firstAgentTime(run.enqueued_at, run.started_at, run.dequeued_at, run.ended_at);
      const ended = firstAgentTime(run.ended_at, run.dequeued_at);
      const tokens = run.total_tokens || 0;
      return {
        id: run.agent_id || ('agent-' + i),
        description: run.description || run.agent_def_description || '',
        subagentType: run.agent_type || run.agent_def_name || '',
        model: run.model || '',
        promptPreview: '',
        inputTokens: tokens,
        outputTokens: 0,
        cacheReads: 0,
        toolUses: run.tool_uses || 0,
        toolBreakdown: {},
        turns: 0,
        entryCount: run.entry_count || 0,
        firstSeen: firstAgentTime(run.started_at, started),
        lastSeen: firstAgentTime(run.ended_at, ended, started),
        lastActivity: '',
        durationSecs: Math.round((run.duration_ms || 0) / 1000),
        status,
        isFinished: normalized === 'completed' || normalized === 'error',
        isError: normalized === 'error',
        spawnedAt: started,
        finishedAt: normalized === 'completed' || normalized === 'error' ? ended : '',
        reportedTokens: tokens,
        reportedToolUses: run.tool_uses || 0,
        sourcePath: run.source_path || '',
      };
    })
    .sort((a, b) => {
      const ta = a.spawnedAt || a.firstSeen || '';
      const tb = b.spawnedAt || b.firstSeen || '';
      if (ta !== tb) return ta < tb ? -1 : 1;
      return a.id < b.id ? -1 : a.id > b.id ? 1 : 0;
    });
  if (agents.length === 0) return null;
  const totalTokens = agents.reduce((s, a) => s + a.inputTokens + a.outputTokens, 0);
  const totalToolUses = agents.reduce((s, a) => s + a.toolUses, 0);
  const finishedCount = agents.filter(a => a.isFinished).length;
  const runningCount = agents.filter(agentIsRunning).length;
  return {
    agents,
    hasAgents: true,
    totalAgents: agents.length,
    totalTokens,
    totalToolUses,
    finishedCount,
    runningCount,
    spawns: [],
  };
}

// --- URL state ---

const TABS = ['search', 'graph', 'map', 'teams', 'stats', 'usage'];

function tabFromPath() {
  const p = location.pathname.replace(/^\/+|\/+$/g, '');
  return TABS.includes(p) ? p : 'search';
}

function paramsFromURL() {
  return Object.fromEntries(new URLSearchParams(location.search));
}

function pushURL(tab, params) {
  const path = tab === 'search' ? '/' : '/' + tab;
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(params || {})) {
    if (v) p.set(k, v);
  }
  const search = p.toString();
  const url = path + (search ? '?' + search : '');
  if (url !== location.pathname + location.search) {
    history.pushState(null, '', url);
  }
  // Update document title.
  const q = params?.q;
  document.title = q ? `${q} — cass ${tab}` : `cass — ${tab}`;
}

// Tool color map for micro-bars.
const TOOL_COLORS = {
  Bash: 'var(--cyan)', Read: 'var(--green)', Write: 'var(--yellow)',
  Edit: 'var(--orange)', Grep: 'var(--magenta)', Glob: 'var(--accent)',
  Task: 'var(--dim)', WebFetch: 'var(--faint)', WebSearch: 'var(--accent)',
  LSP: '#8b5cf6', NotebookEdit: 'var(--yellow)',
};

// Tool descriptions for hover tooltips.
const TOOL_DESCRIPTIONS = {
  Bash: 'shell commands',
  Read: 'file reads',
  Write: 'file writes',
  Edit: 'file edits',
  Grep: 'content search',
  Glob: 'file search',
  Task: 'subagent spawns',
  WebFetch: 'web fetches',
  WebSearch: 'web searches',
  LSP: 'code intelligence',
  NotebookEdit: 'notebook edits',
};

// --- Tool micro-bar ---
function ToolMicroBar({ breakdown, position, onToolClick }) {
  if (!breakdown || Object.keys(breakdown).length === 0) return null;
  const total = Object.values(breakdown).reduce((a, b) => a + b, 0);
  if (total === 0) return null;
  const sorted = Object.entries(breakdown).sort((a, b) => b[1] - a[1]);
  const isInline = position === 'inline';
  const flyoutRef = useRef(null);
  const topTools = sorted.slice(0, 3).map(([name, count]) => `${name} ${count}`).join(' · ');
  const pct = count => (count / total * 100).toFixed(count / total >= 0.095 ? 0 : 1) + '%';

  function onEnter(e) {
    if (flyoutRef.current) {
      flyoutRef.current.closest('.hit')?.classList.add('tool-hovering');
      flyoutRef.current.classList.add('visible');
      moveFlyout(e);
    }
  }
  function onLeave() {
    if (flyoutRef.current) {
      flyoutRef.current.classList.remove('visible');
      flyoutRef.current.closest('.hit')?.classList.remove('tool-hovering');
    }
  }
  function moveFlyout(e) {
    if (!flyoutRef.current) return;
    const gap = 12;
    const pad = 8;
    const rect = flyoutRef.current.getBoundingClientRect();
    const width = rect.width || 260;
    const height = rect.height || Math.min(360, 96 + sorted.length * 34);
    let left = e.clientX + gap;
    let top = e.clientY + gap;
    if (left + width + pad > window.innerWidth) {
      left = e.clientX - width - gap;
    }
    if (top + height + pad > window.innerHeight) {
      top = e.clientY - height - gap;
    }
    const parent = flyoutRef.current.offsetParent;
    const parentRect = parent ? parent.getBoundingClientRect() : { left: 0, top: 0 };
    flyoutRef.current.style.left = (Math.max(pad, left) - parentRect.left) + 'px';
    flyoutRef.current.style.top = (Math.max(pad, top) - parentRect.top) + 'px';
  }
  function onSegClick(e, name) {
    e.stopPropagation();
    if (onToolClick) onToolClick(name);
  }

  return html`
    <div class="tool-bar-container ${isInline ? 'inline' : ''} ${onToolClick ? 'clickable' : ''}"
         onMouseEnter=${onEnter} onMouseLeave=${onLeave} onMouseMove=${moveFlyout}>
      <div class="tool-bar">
        ${sorted.map(([name, count]) => html`
          <div class="tool-bar-seg" key=${name}
               style="width:${(count/total*100).toFixed(1)}%;background:${TOOL_COLORS[name]||'var(--faint)'}"
               title=${`${name}: ${count} calls (${pct(count)})`}
               onClick=${onToolClick ? (e) => onSegClick(e, name) : undefined}>
            ${count/total >= 0.10 ? html`<span class="tool-bar-label">${name} ${count}</span>` : null}
          </div>
        `)}
      </div>
      <div class="tool-bar-flyout" ref=${flyoutRef}>
        <div class="tool-bar-flyout-head">
          <span>Tool calls</span>
          <strong>${total}</strong>
        </div>
        ${topTools && html`<div class="tool-bar-flyout-top">${topTools}</div>`}
        ${sorted.map(([name, count]) => html`
          <div class="tool-bar-flyout-row" key=${name}>
            <span class="tool-bar-flyout-swatch" style="background:${TOOL_COLORS[name]||'var(--faint)'}"></span>
            <span class="tool-bar-flyout-name">
              <span>${name}</span>
              <small>${TOOL_DESCRIPTIONS[name] || 'tool calls'}</small>
            </span>
            <span class="tool-bar-flyout-count">${count}</span>
            <span class="tool-bar-flyout-pct">${pct(count)}</span>
          </div>
        `)}
        <div class="tool-bar-flyout-total">${sorted.length} tool type${sorted.length === 1 ? '' : 's'}</div>
      </div>
    </div>
  `;
}

// --- App ---

function App() {
  const [tab, setTabRaw] = useState(tabFromPath);
  const [urlParams, setUrlParams] = useState(paramsFromURL);
  const [navVersion, setNavVersion] = useState(0);  // Incremented on popstate to signal panels.
  const [connected, setConnected] = useState(false);
  const [toasts, setToasts] = useState([]);
  const [paletteOpen, setPaletteOpen] = useState(false);
  const [headerStats, setHeaderStats] = useState(null);
  const [busy, setBusy] = useState(false);
  const searchRef = useRef(null);
  const toastId = useRef(0);
  const headerStatsLoadedAt = useRef(0);
  const headerStatsLoading = useRef(false);

  // Track global DB busy state.
  useEffect(() => {
    dbBusyListeners.add(setBusy);
    return () => dbBusyListeners.delete(setBusy);
  }, []);

  function setTab(t, params) {
    setTabRaw(t);
    const p = params || {};
    setUrlParams(p);
    pushURL(t, p);
    document.body.classList.toggle('graph-active', t === 'graph');
  }

  function updateParams(params) {
    setUrlParams(params || {});
    pushURL(tab, params);
  }

  // Sync body class for graph full-viewport mode.
  useEffect(() => {
    document.body.classList.toggle('graph-active', tab === 'graph');
  }, [tab]);

  // Browser back/forward.
  useEffect(() => {
    function onPop() {
      setTabRaw(tabFromPath());
      setUrlParams(paramsFromURL());
      setNavVersion(v => v + 1);
    }
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  // Header stats.
  useEffect(() => {
    const load = (force = false) => {
      const now = Date.now();
      if (!force && headerStatsLoadedAt.current && now - headerStatsLoadedAt.current < headerStatsRefreshMinInterval) {
        return;
      }
      if (headerStatsLoading.current) return;
      headerStatsLoading.current = true;
      api('stats?aggregate=true')
        .then(stats => {
          headerStatsLoadedAt.current = Date.now();
          setHeaderStats(stats);
        })
        .catch(() => {})
        .finally(() => {
          headerStatsLoading.current = false;
        });
    };
    const refresh = () => load(false);
    const refreshNow = () => load(true);
    load(true);
    window.addEventListener('cass:refresh', refresh);
    window.addEventListener('cass:index_complete', refreshNow);
    return () => {
      window.removeEventListener('cass:refresh', refresh);
      window.removeEventListener('cass:index_complete', refreshNow);
    };
  }, []);

  // SSE connection.
  useEffect(() => {
    const es = new EventSource('events');
    es.onopen = () => setConnected(true);
    es.onerror = () => setConnected(false);
    // Collapse a burst of file-change events into one refresh: every panel
    // listens for cass:refresh, so an undebounced dispatch fans a single
    // server event out into ~6 fetches and a burst stacks them.
    es.addEventListener('session_change', (e) => {
      let detail = {};
      try { detail = JSON.parse(e.data); } catch {}
      scheduleAppRefresh(300, detail);
    });
    es.addEventListener('index_complete', (e) => {
      const data = JSON.parse(e.data);
      showToast('Indexed ' + data.indexed + ' sessions');
      window.dispatchEvent(new CustomEvent('cass:index_complete', { detail: data }));
      scheduleAppRefresh(300, data);
    });
    // Team messages are direct human input, not file-change amplification.
    es.addEventListener('team_message', (e) => {
      window.dispatchEvent(new CustomEvent('cass:team_message', { detail: JSON.parse(e.data) }));
    });
    return () => {
      if (refreshTimer !== null) clearTimeout(refreshTimer);
      refreshTimer = null;
      es.close();
    };
  }, []);

  function showToast(msg) {
    const id = ++toastId.current;
    setToasts(prev => [...prev.slice(-2), { id, msg, show: true }]);
    setTimeout(() => {
      setToasts(prev => prev.map(t => t.id === id ? { ...t, show: false } : t));
      setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 300);
    }, 3000);
  }

  // Global keyboard shortcuts.
  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setPaletteOpen(p => !p);
        return;
      }
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        if (e.key === 'Escape') { e.target.blur(); setPaletteOpen(false); }
        return;
      }
      if (e.key === '/') { e.preventDefault(); setTab('search'); setTimeout(() => searchRef.current?.focus(), 50); return; }
      if (e.key === 'Escape') { setPaletteOpen(false); return; }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  return html`
    <div class="app">
      <div class="header">
        <h1>cass <span>session search</span></h1>
        ${headerStats ? html`
          <div class="header-stats">
            <span title="${exactNum(headerStats.sessions)} sessions">${fmtNum(headerStats.sessions)} sessions</span>
            <span title="${exactNum(headerStats.turns)} turns">${fmtNum(headerStats.turns)} turns</span>
            <span title="${exactNum((headerStats.input_tokens || 0) + (headerStats.output_tokens || 0))} total tokens (${exactNum(headerStats.input_tokens || 0)} in + ${exactNum(headerStats.output_tokens || 0)} out)">${fmtNum((headerStats.input_tokens || 0) + (headerStats.output_tokens || 0))} tokens</span>
          </div>
        ` : null}
        ${busy && html`<span class="db-busy-badge">db busy</span>`}
        <div class="live-badge">
          <div class="live-dot ${connected ? 'connected' : ''}"></div>
          ${connected ? 'live' : 'disconnected'}
        </div>
      </div>
      <div class="tabs" role="tablist">
        ${TABS.map(t => html`
          <button class="tab ${tab === t ? 'active' : ''}" onClick=${() => setTab(t)}
            role="tab" aria-selected=${tab === t}>${t}</button>
        `)}
      </div>
      ${tab === 'search' && html`<${SearchPanel} searchRef=${searchRef} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} onNavigate=${setTab} />`}
      ${tab === 'graph' && html`<${GraphPanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} onNavigate=${setTab} />`}
      ${tab === 'map' && html`<${MapPanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} />`}
      ${tab === 'teams' && html`<${TeamsPanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} />`}
      ${tab === 'stats' && html`<${StatsPanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} />`}
      ${tab === 'usage' && html`<${UsagePanel} urlParams=${urlParams} updateParams=${updateParams} navVersion=${navVersion} />`}

      <div class="toast-container" aria-live="polite">
        ${toasts.map(t => html`<div class="toast ${t.show ? 'show' : ''}" key=${t.id}>${t.msg}</div>`)}
      </div>

      <${CommandPalette} open=${paletteOpen} onClose=${() => setPaletteOpen(false)}
        onNavigate=${(id) => { setTab(id, {}); setPaletteOpen(false); }}
        onFocusSearch=${() => { setTab('search', urlParams); setPaletteOpen(false); setTimeout(() => searchRef.current?.focus(), 50); }} />
    </div>
  `;
}

// --- Command Palette ---

function CommandPalette({ open, onClose, onNavigate, onFocusSearch }) {
  const [query, setQuery] = useState('');
  const [focused, setFocused] = useState(0);
  const inputRef = useRef(null);

  useEffect(() => {
    if (open) { setQuery(''); setFocused(0); setTimeout(() => inputRef.current?.focus(), 50); }
  }, [open]);

  const actions = [
    { label: 'Search sessions', hint: '/', action: onFocusSearch },
    { label: 'View graph', hint: '', action: () => onNavigate('graph') },
    { label: 'View map', hint: '', action: () => onNavigate('map') },
    { label: 'View teams', hint: '', action: () => onNavigate('teams') },
    { label: 'View stats', hint: '', action: () => onNavigate('stats') },
  ];

  const filtered = query
    ? actions.filter(a => a.label.toLowerCase().includes(query.toLowerCase()))
    : actions;

  function onKeyDown(e) {
    if (e.key === 'ArrowDown') { e.preventDefault(); setFocused(f => Math.min(f + 1, filtered.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setFocused(f => Math.max(f - 1, 0)); }
    else if (e.key === 'Enter' && filtered[focused]) { filtered[focused].action(); }
    else if (e.key === 'Escape') { onClose(); }
  }

  return html`
    <div class="palette-backdrop ${open ? 'open' : ''}" onClick=${onClose}></div>
    <div class="palette ${open ? 'open' : ''}" role="dialog" aria-label="Command palette">
      <input ref=${inputRef} class="palette-input" type="text" placeholder="Type a command..."
        value=${query} onInput=${e => { setQuery(e.target.value); setFocused(0); }} onKeyDown=${onKeyDown} />
      <div class="palette-section">
        <div class="palette-section-title">Actions</div>
        ${filtered.map((a, i) => html`
          <div class="palette-item ${i === focused ? 'focused' : ''}" onClick=${a.action}
            onMouseEnter=${() => setFocused(i)}>
            <span>${a.label}</span>
            ${a.hint && html`<span class="palette-item-hint">${a.hint}</span>`}
          </div>
        `)}
      </div>
    </div>
  `;
}

// --- Search Panel ---

function SearchPanel({ searchRef, urlParams, updateParams, navVersion, onNavigate }) {
  const [query, setQueryRaw] = useState(urlParams.q || '');
  const [agent, setAgentRaw] = useState(urlParams.agent || '');
  const [workspace, setWorkspaceRaw] = useState(urlParams.workspace || '');
  const [since, setSinceRaw] = useState(urlParams.since || '');
  const [sort, setSortRaw] = useState(urlParams.sort || '');
  const [team, setTeamRaw] = useState(urlParams.team || '');
  const [goalStatus, setGoalStatusRaw] = useState(urlParams.goal_status || '');
  const [skill, setSkillRaw] = useState(urlParams.skill || '');
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(urlParams.session_id ? { session_id: urlParams.session_id } : null);
  const [toolFilter, setToolFilter] = useState(urlParams.detail_filter || '');
  const [detailTab, setDetailTabRaw] = useState(normalizeDetailTab(urlParams.detail_tab));
  const [workflowAgentFocus, setWorkflowAgentFocus] = useState(urlParams.workflow_agent || '');
  const [selectedIdx, setSelectedIdx] = useState(-1);
  const searchAbortRef = useRef(null);
  const searchSeqRef = useRef(0);
  const searchTimerRef = useRef(null);

  function setQuery(v) { setQueryRaw(v); }
  function setAgent(v) { setAgentRaw(v); }
  function setWorkspace(v) { setWorkspaceRaw(v); }
  function setSince(v) { setSinceRaw(v); }
  function setSort(v) { setSortRaw(v); }
  function setTeam(v) { setTeamRaw(v); }
  function setGoalStatus(v) { setGoalStatusRaw(v); }
  function setSkill(v) { setSkillRaw(v); }
  function setDetailTab(v) { setDetailTabRaw(normalizeDetailTab(v)); }

  useEffect(() => {
    document.body.classList.toggle('detail-open', !!selected);
    return () => document.body.classList.remove('detail-open');
  }, [selected]);

  // Push URL on state changes (debounced with the search).
  const urlRef = useRef(null);
  useEffect(() => {
    clearTimeout(urlRef.current);
    urlRef.current = setTimeout(() => updateParams({
      q: query,
      agent,
      workspace,
      since,
      sort,
      team,
      goal_status: goalStatus,
      skill,
      session_id: selected?.session_id || '',
      detail_filter: selected?.session_id ? toolFilter : '',
      detail_tab: selected?.session_id && detailTab !== 'conversation' ? detailTab : '',
      workflow_agent: selected?.session_id && detailTab === 'workflows' ? workflowAgentFocus : '',
    }), 300);
    return () => clearTimeout(urlRef.current);
  }, [query, agent, workspace, since, sort, team, goalStatus, skill, selected?.session_id, toolFilter, detailTab, workflowAgentFocus]);

  // Restore state from URL on browser navigation.
  useEffect(() => {
    if (navVersion === 0) return;
    setQueryRaw(urlParams.q || '');
    setAgentRaw(urlParams.agent || '');
    setWorkspaceRaw(urlParams.workspace || '');
    setSinceRaw(urlParams.since || '');
    setSortRaw(urlParams.sort || '');
    setTeamRaw(urlParams.team || '');
    setGoalStatusRaw(urlParams.goal_status || '');
    setSkillRaw(urlParams.skill || '');
    setToolFilter(urlParams.detail_filter || '');
    setDetailTab(urlParams.detail_tab);
    setWorkflowAgentFocus(urlParams.workflow_agent || '');
    setSelected(urlParams.session_id ? { session_id: urlParams.session_id } : null);
  }, [navVersion]);

  const effectiveSort = sort || (query ? 'relevance' : 'recent');

  const searchPath = useCallback(() => {
    const params = { q: query, agent, workspace, since, sort: sort || '', team, goal_status: goalStatus, skill, limit: '30', summary: 'true', count: 'false' };
    return 'search?' + qs(params);
  }, [query, agent, workspace, since, sort, team, goalStatus, skill]);

  const doSearch = useCallback(async (opts = {}) => {
    const seq = ++searchSeqRef.current;
    if (searchAbortRef.current) searchAbortRef.current.abort();
    const controller = new AbortController();
    searchAbortRef.current = controller;
    if (!opts.silent) setLoading(true);
    try {
      const r = await fetchJSON(searchPath(), { signal: controller.signal });
      if (seq !== searchSeqRef.current) return;
      setResults(r);
    } catch (e) {
      if (e && e.name === 'AbortError') return;
      console.error('search:', e);
    } finally {
      if (seq === searchSeqRef.current) {
        if (searchAbortRef.current === controller) searchAbortRef.current = null;
        setLoading(false);
      }
    }
  }, [searchPath]);

  const scheduleSearch = useCallback((delay, opts) => {
    clearTimeout(searchTimerRef.current);
    searchTimerRef.current = setTimeout(() => doSearch(opts), delay);
  }, [doSearch]);

  // Debounced live search.
  useEffect(() => {
    scheduleSearch(250);
    return () => clearTimeout(searchTimerRef.current);
  }, [scheduleSearch]);

  useEffect(() => {
    return () => {
      searchSeqRef.current++;
      clearTimeout(searchTimerRef.current);
      if (searchAbortRef.current) searchAbortRef.current.abort();
    };
  }, []);

  useEffect(() => {
    if (!selected?.session_id || !results?.hits) return;
    const i = results.hits.findIndex(h => h.session_id === selected.session_id);
    if (i < 0) return;
    const next = results.hits[i];
    if (selected !== next && (!selected.agent || !next.summary_only)) setSelected(next);
    if (selectedIdx !== i) setSelectedIdx(i);
  }, [results, selected?.session_id]);

  useEffect(() => {
    if (!selected?.session_id || (selected.agent && !selected.summary_only)) return;
    let cancelled = false;
    api('session/' + selected.session_id + '/meta')
      .then(h => { if (!cancelled) setSelected(h); })
      .catch(e => {
        if (cancelled) return;
        const message = errorMessage(e, 'session unavailable');
        setSelected(prev => {
          if (!prev || prev.session_id !== selected.session_id) return prev;
          return {
            ...prev,
            agent: 'unknown',
            title: 'Session unavailable',
            meta_error: message,
          };
        });
      });
    return () => { cancelled = true; };
  }, [selected?.session_id, selected?.agent, selected?.summary_only]);

  // Auto-refresh on SSE.
  useEffect(() => {
    const handler = () => scheduleSearch(250, { silent: true });
    window.addEventListener('cass:refresh', handler);
    return () => window.removeEventListener('cass:refresh', handler);
  }, [scheduleSearch]);

  // j/k keyboard navigation.
  useEffect(() => {
    function onKey(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const hits = results?.hits;
      if (!hits || hits.length === 0) return;
      if (e.key === 'j') { e.preventDefault(); setSelectedIdx(i => Math.min(i + 1, hits.length - 1)); }
      else if (e.key === 'k') { e.preventDefault(); setSelectedIdx(i => Math.max(i - 1, 0)); }
      else if (e.key === 'Enter' && selectedIdx >= 0) {
        e.preventDefault();
        setSelected(hits[selectedIdx]);
        setToolFilter('');
        setDetailTab('conversation');
        setWorkflowAgentFocus('');
      }
      else if (e.key === 'Escape' && selected) { e.preventDefault(); setSelected(null); }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [results, selectedIdx, selected]);

  const timePresets = [
    { label: '1h', value: '1h' },
    { label: '24h', value: '24h' },
    { label: '7d', value: '168h' },
    { label: '30d', value: '720h' },
  ];

  const sortModes = [
    { value: 'recent', label: 'Recent' },
    { value: 'relevance', label: 'Relevance' },
    { value: 'started', label: 'Started' },
    { value: 'oldest', label: 'Oldest' },
  ];

  return html`
    <div class="search-workspace ${selected ? 'has-detail' : ''}">
      <section class="search-list-pane" aria-label="Sessions">
      <div class="search-bar">
        <input ref=${searchRef} class="search-input" type="text" placeholder="search sessions..."
          value=${query} onInput=${e => setQuery(e.target.value)} autofocus />
        <span class="search-kbd">/</span>
      </div>
      <div class="filters">
        <div class="filter-chips">
          ${timePresets.map(t => html`
            <button class="filter-chip ${since === t.value ? 'active' : ''}"
              onClick=${() => setSince(since === t.value ? '' : t.value)}>${t.label}</button>
          `)}
        </div>
        <input class="filter-input" placeholder="agent" value=${agent}
          onInput=${e => setAgent(e.target.value)} style="width:100px" />
        <input class="filter-input" placeholder="workspace" value=${workspace}
          onInput=${e => setWorkspace(e.target.value)} />
        <input class="filter-input" placeholder="team" value=${team}
          onInput=${e => setTeam(e.target.value)} style="width:100px" />
        <input class="filter-input" placeholder="used skill" value=${skill}
          onInput=${e => setSkill(e.target.value)} style="width:110px" />
        <span class="filter-chips">
          <button class="filter-chip ${goalStatus === 'active' ? 'active' : ''}"
            onClick=${() => setGoalStatus(goalStatus === 'active' ? '' : 'active')}>active goals</button>
          <button class="filter-chip ${goalStatus === 'complete' ? 'active' : ''}"
            onClick=${() => setGoalStatus(goalStatus === 'complete' ? '' : 'complete')}>complete goals</button>
        </span>
        <span class="sort-group">
          ${sortModes.map(m => html`
            <button class="sort-pill ${effectiveSort === m.value ? 'active' : ''}"
              onClick=${() => setSort(sort === m.value ? '' : m.value)}>${m.label}</button>
          `)}
        </span>
      </div>

      ${loading && !results && html`<div class="loading">searching...</div>`}
      ${results && html`<div class="result-count" style="text-align:right;padding:0 0 8px">${resultCountLabel(results)}</div>`}
      ${results && results.hits && results.hits.length > 0 && html`
        <ul class="results">
          ${results.hits.map((h, i) => html`
            <${HitItem} key=${h.session_id} hit=${h} num=${i + 1}
              isSelected=${selected?.session_id === h.session_id}
              isFocused=${i === selectedIdx}
              onClick=${() => { setSelected(h); setSelectedIdx(i); setToolFilter(''); setDetailTab('conversation'); setWorkflowAgentFocus(''); }}
              onTeamClick=${onNavigate ? (name) => onNavigate('teams', { name }) : null}
              onToolClick=${(toolName) => { setSelected(h); setSelectedIdx(i); setToolFilter(toolName); setDetailTab('conversation'); setWorkflowAgentFocus(''); }} />
          `)}
        </ul>
      `}
      ${results && (!results.hits || results.hits.length === 0) && !loading && html`
        <div class="empty">no results</div>
      `}

      </section>
      <div class="detail-overlay ${selected ? 'open' : ''}" onClick=${() => { setSelected(null); setToolFilter(''); setDetailTab('conversation'); setWorkflowAgentFocus(''); }}></div>
      <${SessionDetailPanel}
        hit=${selected}
        onClose=${() => { setSelected(null); setToolFilter(''); setDetailTab('conversation'); setWorkflowAgentFocus(''); }}
        initialFilter=${toolFilter}
        initialTab=${detailTab}
        workflowAgentFocus=${workflowAgentFocus}
        onFilterChange=${setToolFilter}
        onTabChange=${setDetailTab} />
    </div>
  `;
}

// --- Hit Item ---

function cleanSessionTitle(title) {
  let t = (title || '').trim();
  if (!t) return '';
  const commandMessage = t.match(/<command-message>([\s\S]*?)<\/command-message>/i);
  if (commandMessage && commandMessage[1].trim()) return commandMessage[1].replace(/\s+/g, ' ').trim();
  const commandName = t.match(/<command-name>([\s\S]*?)<\/command-name>/i);
  if (commandName && commandName[1].trim()) return commandName[1].replace(/\s+/g, ' ').trim();
  const goalObjective = t.match(/<goal_context>[\s\S]*?<objective>([\s\S]*?)<\/objective>[\s\S]*?<\/goal_context>/i);
  if (goalObjective && goalObjective[1].trim()) return 'goal: ' + goalObjective[1].replace(/\s+/g, ' ').trim();
  const untrustedObjective = t.match(/<untrusted_objective>\s*([\s\S]*?)\s*<\/untrusted_objective>/i);
  if (untrustedObjective && untrustedObjective[1].trim()) return 'goal: ' + untrustedObjective[1].replace(/\s+/g, ' ').trim();
  const hadImage = /<image[^>]*>/i.test(t) || /\binput_image\s+data:image\//i.test(t);
  t = t
    .replace(/<image[^>]*>/gi, ' ')
    .replace(/\binput_image\s+data:image\/\S+/gi, ' ')
    .replace(/<\/?goal_context>/gi, ' ')
    .replace(/<\/?[a-z][^>]*>/gi, ' ')
    .replace(/\s+/g, ' ')
    .trim();
  if (!t && hadImage) return 'image input';
  return t;
}

function displaySessionTitle(hit) {
  return cleanSessionTitle(hit?.title) || hit?.title || 'Untitled';
}

function resultCountLabel(result, noun = 'result') {
  const n = result?.total_count || 0;
  const suffix = result?.total_count_exact === false ? '+' : '';
  const plural = n === 1 && suffix === '' ? '' : 's';
  return n + suffix + ' ' + noun + plural;
}

function importantSkills(skills) {
  const used = skills || [];
  const selected = used.filter(s => s.kind === 'selected' || s.kind === 'tool');
  return selected.length ? selected : used.filter(s => s.kind === 'loaded');
}

function skillKindLabel(kind) {
  if (kind === 'expanded') return 'context';
  if (kind === 'available') return 'available';
  if (kind === 'selected') return 'selected';
  if (kind === 'loaded') return 'loaded';
  return kind || 'skill';
}

function HitItem({ hit: h, num, onClick, isSelected, isFocused, onTeamClick, onToolClick }) {

  if (h.tool_calls) stats.push(h.tool_calls + ' tools');
  if (h.turns > 1) stats.push(h.turns + ' turns');
  if (h.files_edited) stats.push(h.files_edited + ' files');
  if (h.lines_written) stats.push(h.lines_written + ' lines');
  if (h.workflow_count) stats.push(h.workflow_count + ' workflow' + (h.workflow_count === 1 ? '' : 's'));
  if (h.subagent_entries) stats.push('mirrors ' + (h.subagent_mirrored_entries || 0) + '/' + h.subagent_entries);
  if (h.duration_secs) stats.push(fmtDuration(h.duration_secs));

  const inTok = h.input_tokens || 0;
  const outTok = h.output_tokens || 0;

  const it2 = [];

  const primaryGoalStatus = primaryGoal?.effective_status || primaryGoal?.status || 'active';
  const primaryGoalBlocked = primaryGoalStatus === 'blocked' || primaryGoalGates.unresolved > 0;
  const primaryGoalBadgeClass = primaryGoal
    ? 'hit-goal-badge ' + primaryGoalStatus + (primaryGoalBlocked ? ' blocked' : '')
    : '';

    ? primaryGoalGates.unresolved + ' gate' + (primaryGoalGates.unresolved === 1 ? '' : 's')
    : primaryGoalStatus + ' goal';
  const primarySkills = importantSkills(h.skills);
  const primarySkill = primarySkills.length ? primarySkills[primarySkills.length - 1] : null;

      \u2442 ${h.it2_splits}
    </span>
  ` : null;

  return html`
    <li class="hit ${isSelected ? 'selected' : ''} ${h.team_name ? 'has-team' : ''}" onClick=${onClick} tabindex="0">
      <div class="hit-header">
        <span class="hit-num">${num}.</span>
        <span class="hit-agent">[${h.agent}]</span>
        <span class="hit-session-id" title=${h.session_id}>${shortSessionID(h.session_id)}</span>
        ${teamBadge}
        ${adHocBadge}
        ${primaryGoal && html`
          <span class=${primaryGoalBadgeClass}
            title=${primaryGoal.objective}>
            ${primaryGoalBadgeText}
          </span>
        `}
        ${primarySkill && html`
          <span class="hit-skill-badge ${primarySkill.kind || 'skill'}"
            title=${(primarySkill.evidence || []).join('; ') || primarySkill.path || primarySkill.name}>

          </span>
        `}
        ${h.collapsed_children && (h.matched_workflow_ids || []).length > 0 && html`
          <span class="hit-match-badge"
            title=${'matched workflows: ' + (h.matched_workflow_ids || []).join(', ')}>
            matched ${h.workflow_match_count || (h.matched_workflow_ids || []).length} agent${(h.workflow_match_count || 1) === 1 ? '' : 's'}

        <span class="hit-title" title=${h.title && h.title !== title ? h.title : ''}>${title}</span>
        ${h.sparkline && html`<span class="hit-sparkline">${h.sparkline}</span>`}

        ${totalTok > 0 && html`<span class="hit-tokens" title=${'in: ' + fmtNum(inTok) + ' | out: ' + fmtNum(outTok) + (cacheTok ? ' | cache: ' + fmtNum(cacheTok) : '')}>

        ${h.goal_count > 0 && html`<span class="hit-goals">${h.active_goal_count || 0} active / ${h.completed_goal_count || 0} complete</span>`}

        ${it2.length > 0 && html`<span class="hit-it2">it2: ${it2.join(', ')}</span>`}
      </div>
      <${ToolMicroBar} breakdown=${h.tool_breakdown} onToolClick=${onToolClick} />
    </li>
  `;
}

// Convert text to HTML with ANSI codes rendered via ansi_up.
function ansiHtml(text) {
  if (!text) return '';
  return ansiUp.ansi_to_html(text);
}

// Escape HTML entities for safe insertion.
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// AnsiContent: renders text with ANSI codes as HTML using a ref.
// This avoids dangerouslySetInnerHTML issues with htm/preact.
function AnsiContent({ text, maxLen, cls, searchQuery }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !text) return;
    const truncated = text.slice(0, maxLen || 2000);
    let rendered = ansiHtml(truncated);
    if (searchQuery) rendered = highlightHtml(rendered, searchQuery);
    ref.current.innerHTML = rendered;
  }, [text, maxLen, searchQuery]);
  if (!text) return null;
  return html`<div ref=${ref} class="conv-content ${cls || ''}"></div>`;
}

// Render search snippet: convert >>>match<<< markers to highlighted spans.
// Returns array of preact vnodes (no dangerouslySetInnerHTML).
function renderSnippet(text) {
  if (!text) return [];
  const parts = [];
  let rest = text;
  while (rest) {
    const start = rest.indexOf('>>>');
    if (start === -1) { parts.push(rest); break; }
    if (start > 0) parts.push(rest.slice(0, start));
    const end = rest.indexOf('<<<', start + 3);
    if (end === -1) { parts.push(rest.slice(start)); break; }
    parts.push(html`<mark class="search-hl">${rest.slice(start + 3, end)}</mark>`);
    rest = rest.slice(end + 3);
  }
  return parts;
}

function isImageBlock(block) {
  return block && (block.type === 'image' || block.type === 'input_image' || block.type === 'local_image');
}

function imageBlockSource(block) {
  if (!block) return '';
  const imageURL = (block.image_url || '').trim();
  if (/^data:image\//i.test(imageURL)) return imageURL;
  const url = (block.url || '').trim();
  if (/^data:image\//i.test(url)) return url;
  const data = (block.data || '').trim();
  if (!data) return '';
  if (/^data:image\//i.test(data)) return data;
  const mime = block.mime_type || block.media_type || 'image/png';
  return 'data:' + mime + ';base64,' + data.replace(/\s+/g, '');
}

function imageBlockHref(block) {
  if (!block) return '';
  return imageBlockSource(block) || block.image_url || block.url || '';
}

function imageBlockLabel(block) {
  if (!block) return 'image';
  const path = block.path || block.file_path;
  if (path) return path;
  if (block.image_url && /^data:image\//i.test(block.image_url)) {
    return (block.media_type || block.mime_type || 'image') + ' data url';
  }
  if (block.image_url) return block.image_url;
  if (block.url) return block.url;
  if (block.data) return (block.media_type || block.mime_type || 'image') + ' base64';
  return block.type || 'image';
}

function ImageBlockPreview({ block }) {
  const src = imageBlockSource(block);
  const href = imageBlockHref(block);
  const label = imageBlockLabel(block);
  return html`
    <div class="conv-image">
      ${src ? html`
        <a class="conv-image-frame" href=${src} target="_blank" rel="noreferrer" title=${label}>
          <img src=${src} alt=${label || 'image'} loading="lazy" decoding="async" />
        </a>
      ` : href ? html`
        <a class="conv-image-placeholder" href=${href} target="_blank" rel="noreferrer" title=${label}>image link</a>
      ` : html`
        <div class="conv-image-placeholder" title=${label}>image file</div>
      `}
      <div class="conv-image-meta">${label}</div>
    </div>
  `;
}

function renderImageEntry(block, key, role) {
  return html`
    <div class="conv-entry role-image" key=${key}>
      <div class="conv-role">${block?.type || role || 'image'}</div>
      <${ImageBlockPreview} block=${block} />
    </div>
  `;
}

// Highlight search query matches in plain text (returns HTML string).
function highlightText(text, query) {
  if (!query || !text) return escHtml(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('(' + escaped + ')', 'gi');
  return escHtml(text).replace(re, '<mark class="search-hl">$1</mark>');
}

// Highlight matches in already-rendered HTML (ansi_up output).
function highlightHtml(html, query) {
  if (!query || !html) return html;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  // Only highlight text outside HTML tags.
  const re = new RegExp('(' + escaped + ')(?=[^<]*(?:<|$))', 'gi');
  return html.replace(re, '<mark class="search-hl">$1</mark>');
}

// Check if an entry's text content matches a query (case-insensitive).
function entryMatchesQuery(entry, query) {
  if (!query) return true;
  const q = query.toLowerCase();

  // Check system/compact entries.
  if (entry.type === 'system' || entry.isCompactSummary) {
    const text = entry.content || entry.summary || '';
    if (text.toLowerCase().includes(q)) return true;
    if (entry.subtype && entry.subtype.toLowerCase().includes(q)) return true;
  }
  if (entry.customTitle && entry.customTitle.toLowerCase().includes(q)) return true;

  const msg = entry.message;
  if (!msg) return false;
  const content = msg.content;

  if (typeof content === 'string') {
    return content.toLowerCase().includes(q);
  }
  if (Array.isArray(content)) {
    return content.some(block => {
      if (block.text && block.text.toLowerCase().includes(q)) return true;
      if (block.name && block.name.toLowerCase().includes(q)) return true;
      if (block.type === 'tool_result') {
        const text = typeof block.content === 'string' ? block.content
          : Array.isArray(block.content) ? block.content.map(c => c.text || '').join('\n')
          : JSON.stringify(block.content);
        return text.toLowerCase().includes(q);
      }
      if (block.type === 'tool_use' && block.input) {
        const inputStr = typeof block.input === 'string' ? block.input : JSON.stringify(block.input);
        return inputStr.toLowerCase().includes(q);
      }
      return false;
    });
  }
  return false;
}

// --- Agents Tab ---

function AgentStatusIcon({ status }) {
  const s = normalizedAgentStatus(status);
  if (s === 'completed') return html`<span class="agent-status completed" title=${status || 'completed'}>\u2713</span>`;
  if (s === 'error') return html`<span class="agent-status error" title=${status || 'error'}>\u2717</span>`;
  if (s === 'starting') return html`<span class="agent-status starting" title=${status || 'starting'}>\u2026</span>`;
  if (s === 'running') return html`<span class="agent-status running" title=${status || 'running'}><span class="streaming-dot"></span></span>`;
  return html`<span class="agent-status unknown" title=${status || 'unknown'}>?</span>`;
}

function normalizedAgentStatus(status) {
  const s = (status || '').toLowerCase();
  if (s === 'completed' || s === 'complete' || s === 'succeeded' || s === 'success') return 'completed';
  if (s === 'error' || s === 'failed' || s === 'killed' || s === 'cancelled' || s === 'canceled') return 'error';
  if (s === 'starting' || s === 'pending' || s === 'queued' || s === 'async_launched') return 'starting';
  if (s === 'running' || s === 'active') return 'running';
  return 'unknown';
}

function agentIsRunning(a) {
  return normalizedAgentStatus(a?.status) === 'running';
}

function agentIsTerminal(a) {
  const s = normalizedAgentStatus(a?.status);
  return s === 'completed' || s === 'error';
}

function agentIsErrored(a) {
  return normalizedAgentStatus(a?.status) === 'error';
}

function workflowAgentAliases(workflows) {
  const aliases = { byID: {}, byIndex: [] };
  for (const wf of workflows || []) {
    for (const a of wf.agents || []) {
      if (!a || !a.id) continue;
      const meta = {
        label: a.label || '',
        phase: a.phase || '',
        agentType: a.agent_type || '',
        title: a.title || '',
        status: a.status || '',
      };
      aliases.byID[a.id] = meta;
      aliases.byIndex.push(meta);
    }
  }
  return aliases;
}

function numberedAgentName(index) {
  return 'agent ' + String((index || 0) + 1).padStart(2, '0');
}

function looksLikePromptTitle(title) {
  const t = (title || '').trim();
  if (!t) return false;
  return t.length > 72 || /^you are\b/i.test(t) || /\bREAD THESE FILES FIRST\b/i.test(t);
}

function agentAliasFor(a, aliases, index) {
  return aliases.byID[a.id] || aliases.byIndex[index] || {};
}

function agentDisplayName(a, aliases, index) {
  const meta = agentAliasFor(a, aliases, index);
  if (meta.label) return meta.label;
  if (a.agentName) return a.agentName;
  const candidate = a.description || meta.title || '';
  if (candidate && !looksLikePromptTitle(candidate)) return candidate;
  return numberedAgentName(index);
}

function agentDisplayType(a, aliases, index) {
  const meta = agentAliasFor(a, aliases, index);
  return meta.phase || meta.agentType || a.subagentType || '';
}

  function renderTable() {
    return html`
      <div class="agent-table-wrap">

              <th>Agent</th>
              <th>Type</th>

              <th style="text-align:right">Tokens</th>

          <tbody>
            ${agents.map((a, i) => {

              const display = agentDisplayName(a, aliases, i);

              return html`
                <tr key=${a.id} class=${expandedAgent === a.id ? 'expanded' : ''} onClick=${() => toggleAgent(a.id)}>
                  <td style="width:16px"><${AgentStatusIcon} status=${a.status} /></td>
                  <td class="agent-table-name">@${display}</td>
                  <td>${type || '\u2014'}</td>
                  <td style="text-align:right"><${RollingNum} value=${a.toolUses} /></td>
                  <td style="text-align:right"><${RollingNum} value=${totalTok} /></td>
                  <td style="text-align:right"><${RollingNum} value=${a.durationSecs} format=${fmtDuration} /></td>
                  <td><span class="agent-status-text ${a.status}">${a.status}</span></td>
                </tr>
                ${expandedAgent === a.id && html`
                  <tr class="agent-table-detail"><td colspan="7">
                    <div class="agent-detail-grid">
                      ${a.model && html`<div class="agent-detail-item"><span class="label">model</span><span class="val">${a.model}</span></div>`}
                      <div class="agent-detail-item"><span class="label">in/out</span><span class="val"><${RollingNum} value=${a.inputTokens} /> / <${RollingNum} value=${a.outputTokens} /></span></div>
                      <div class="agent-detail-item"><span class="label">turns</span><span class="val"><${RollingNum} value=${a.turns} /></span></div>
                      ${a.spawnedAt && html`<div class="agent-detail-item"><span class="label">spawned</span><span class="val">${relTime(a.spawnedAt)}</span></div>`}
                      ${a.finishedAt && html`<div class="agent-detail-item"><span class="label">finished</span><span class="val">${relTime(a.finishedAt)}</span></div>`}
                    </div>
                    ${Object.keys(a.toolBreakdown).length > 0 && html`
                      <div style="margin-top:4px;display:flex;flex-wrap:wrap;gap:4px">
                        ${Object.entries(a.toolBreakdown).sort((x,y) => y[1] - x[1]).map(([name, count]) => html`
                          <span class="tool-chip" key=${name} style="border-left: 2px solid ${TOOL_COLORS[name]||'var(--faint)'}" title="${TOOL_DESCRIPTIONS[name] || name}">${name} ${count}</span>
                        `)}
                      </div>
                    `}
                  </td></tr>
                `}
              `;
            })}
          </tbody>
        </table>
      </div>
    `;
  }

  function renderTimeline() {
    if (agents.length < 2) return null;
    // Find global time range.
    let minT = Infinity, maxT = -Infinity;
    for (const a of agents) {
      const t0 = new Date(a.firstSeen).getTime();
      const t1 = a.finishedAt ? new Date(a.finishedAt).getTime() : new Date(a.lastSeen).getTime();
      if (isFinite(t0) && t0 < minT) minT = t0;
      if (isFinite(t1) && t1 > maxT) maxT = t1;
    }
    if (!isFinite(minT) || !isFinite(maxT)) return null;
    const range = maxT - minT || 1;
    const barH = 16;
    const rowH = 24;
    const labelW = 120;
    const barW = 300;
    const svgW = labelW + barW + 10;
    const svgH = agents.length * rowH + 4;

    return html`
      <div class="agent-timeline">
        <svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}">
          ${agents.map((a, i) => {
            const t0 = new Date(a.firstSeen).getTime();
            const t1 = a.finishedAt ? new Date(a.finishedAt).getTime() : new Date(a.lastSeen).getTime();
            const x = labelW + ((t0 - minT) / range) * barW;
            const w = Math.max(2, ((t1 - t0) / range) * barW);
            const y = i * rowH + (rowH - barH) / 2;
            const label = agentDisplayName(a, aliases, i);
            const status = normalizedAgentStatus(a.status);
            const fillColor = status === 'error' ? 'var(--danger)' :
                              status === 'running' ? 'var(--green)' : 'var(--cyan)';
            return html`
              <g key=${a.id}>
                <text x="${labelW - 4}" y="${i * rowH + rowH / 2 + 4}" text-anchor="end"
                      style="font-size:10px;fill:var(--cyan);font-family:var(--mono)">@${label}</text>
                <rect x="${x}" y="${y}" width="${w}" height="${barH}" rx="2"
                      style="fill:${fillColor};opacity:0.3" />
                <rect x="${x}" y="${y}" width="${w}" height="${barH}" rx="2"
                      style="fill:none;stroke:${fillColor};stroke-width:1;opacity:0.6" />
                ${status === 'running' && html`
                  <rect x="${x + w - 3}" y="${y}" width="3" height="${barH}" rx="1"
                        style="fill:${fillColor};opacity:0.8">
                    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.5s" repeatCount="indefinite" />
                  </rect>
                `}
              </g>
            `;
          })}
        </svg>
      </div>
    `;
  }

  return html`
    <div class="agents-panel">
      <div class="agents-summary">
        <${RollingNum} value=${totalAgents} label="agents" /> agent${totalAgents !== 1 ? 's' : ''} spawned
        · <${RollingNum} value=${totalTokens} label="tokens" /> tokens
        · <${RollingNum} value=${totalToolUses} label="tool uses" /> tool uses
        ${finishedCount > 0 && html`
          <span class="agents-lifecycle">
            · <${RollingNum} value=${finishedCount} /> finished${runningCount > 0 ? html`, <${RollingNum} value=${runningCount} /> running` : ''}
          </span>
        `}
        ${finishedCount === totalAgents && totalAgents > 0 && html`
          <span class="agents-team-done"> (team complete)</span>
        `}
      </div>
      <div class="agents-view-toggle">
        <button class=${viewMode === 'tree' ? 'active' : ''} onClick=${() => setViewMode('tree')}>tree</button>
        <button class=${viewMode === 'table' ? 'active' : ''} onClick=${() => setViewMode('table')}>table</button>
      </div>
      ${viewMode === 'tree' ? renderTree() : renderTable()}
      ${renderTimeline()}
    </div>
  `;
}

// WorkflowAgentTranscript lazily fetches and renders one workflow agent's
// transcript by source_path. Workflow agents are not sessions, so they are
// fetched via the dedicated /api/workflow-agent endpoint.
function WorkflowAgentTranscript({ sourcePath }) {
  const [entries, setEntries] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(null);
  const [hasEarlier, setHasEarlier] = useState(false);
  const [loadingEarlier, setLoadingEarlier] = useState(false);
  const [refreshTick, setRefreshTick] = useState(0);
  const sourceRef = useRef('');

  function fetchPage(offset) {
    return api('workflow-agent?' + qs({
      source_path: sourcePath,
      order: 'desc',
      limit: String(workflowAgentPageSize),
      offset: offset ? String(offset) : '',
    }));
  }

  useEffect(() => {
    let cancelled = false;
    const sourceChanged = sourceRef.current !== sourcePath;
    sourceRef.current = sourcePath;
    if (sourceChanged) {
      setEntries([]);
      setLoaded(false);
      setHasEarlier(false);
      setError(null);
      const cached = workflowAgentCache.get(sourcePath);
      if (cached) {
        setEntries(cached.entries || []);
        setHasEarlier(!!cached.hasEarlier);
        setLoaded(true);
        return () => { cancelled = true; };
      }
    } else {
      setError(null);
    }
    fetchPage(0)
      .then(data => {
        if (cancelled) return;
        const page = data || [];
        if (sourceChanged) {
          setEntries(page);
          setHasEarlier(page.length === workflowAgentPageSize);
        } else {
          setEntries(prev => mergeNewestEntries(page, prev));
          setHasEarlier(prev => page.length === workflowAgentPageSize || prev);
        }
        setLoaded(true);
      })
      .catch(e => { if (!cancelled) setError(errorMessage(e, 'workflow agent unavailable')); });
    return () => { cancelled = true; };
  }, [sourcePath, refreshTick]);

  useEffect(() => {
    const refresh = (e) => {
      if (refreshTouchesPath(e.detail, sourcePath)) setRefreshTick(t => t + 1);
    };
    window.addEventListener('cass:refresh', refresh);
    return () => window.removeEventListener('cass:refresh', refresh);
  }, [sourcePath]);

  useEffect(() => {
    if (loaded) workflowAgentCache.set(sourcePath, { entries, hasEarlier });
  }, [sourcePath, entries, hasEarlier, loaded]);

  function loadEarlier() {
    if (loadingEarlier || !hasEarlier) return;
    setLoadingEarlier(true);
    fetchPage(entries.length)
      .then(data => {
        const page = data || [];
        setEntries(prev => prev.concat(page));
        setHasEarlier(page.length === workflowAgentPageSize);
      })
      .catch(e => setError(errorMessage(e, 'workflow agent unavailable')))
      .finally(() => setLoadingEarlier(false));
  }

  if (error) return html`<div class="detail-error wf-agent-error">${error}</div>`;
  if (!loaded) return html`<div class="wf-agent-loading">loading transcript...</div>`;
  if (entries.length === 0) return html`<div class="wf-agent-empty">empty transcript</div>`;

  function blockText(block) {
    if (!block) return '';
    if (block.type === 'text' || block.text) return block.text || '';
    if (block.type === 'tool_use') {
      const summary = workflowToolSummary(block);
      return summary || block.name || 'tool';
    }
    if (block.type === 'tool_result') {
      const text = typeof block.content === 'string'
        ? block.content
        : Array.isArray(block.content) ? block.content.map(c => c.text || '').join('\n')
        : JSON.stringify(block.content || '');
      return (block.is_error ? 'error: ' : 'result: ') + text;
    }
    return '';
  }

  function entryBlocks(e) {
    const msg = e.message;
    if (!msg) return [];
    if (typeof msg.content === 'string') return [{ role: msg.role || e.type || 'message', text: msg.content }];
    if (!Array.isArray(msg.content)) return [];
    return msg.content
      .map(block => ({
        role: isImageBlock(block) ? 'image' : block.type === 'tool_use' ? (block.name || 'tool') : block.type === 'tool_result' ? 'result' : (msg.role || 'message'),
        text: blockText(block),
        image: isImageBlock(block) ? block : null,
        isError: !!block.is_error,
      }))
      .filter(block => !!block.text || !!block.image);
  }

  function roleClass(role) {
    if (role === 'user' || role === 'assistant' || role === 'result') return role;
    return 'tool';
  }

  const renderableEntries = entries
    .map((entry, idx) => ({ entry, idx, blocks: entryBlocks(entry) }))
    .filter(item => item.blocks.length > 0);
  const earlierButton = hasEarlier && html`
    <button class="wf-agent-more" disabled=${loadingEarlier} onClick=${loadEarlier}>
      ${loadingEarlier ? 'loading...' : 'load earlier messages'}
    </button>
  `;
  if (renderableEntries.length === 0) return html`
    <div class="wf-agent-transcript">
      <div class="wf-agent-empty">empty transcript</div>
      ${earlierButton}
    </div>
  `;

  return html`
    <div class="wf-agent-transcript">
      ${renderableEntries.map(item => html`
        <div class="wf-agent-msg" key=${entryKey(item.entry) || item.idx}>
          ${item.blocks.map((block, bi) => html`
            <div class="wf-agent-block ${block.isError ? 'error' : ''}" key=${bi}>
              <span class="wf-agent-role ${roleClass(block.role)}">${block.role}</span>
              ${block.image
                ? html`<${ImageBlockPreview} block=${block.image} />`
                : html`<${AnsiContent} text=${block.text} maxLen=${1200} cls=${''} searchQuery=${''} />`}
            </div>
          `)}
        </div>
      `)}
      ${earlierButton}
    </div>
  `;
}

function workflowToolSummary(block) {
  const input = block.input || {};
  if (block.name === 'Read') return input.file_path || '';
  if (block.name === 'Write' || block.name === 'Edit' || block.name === 'MultiEdit') return input.file_path || '';
  if (block.name === 'Bash') return String(input.command || '').split('\n')[0].slice(0, 160);
  if (block.name === 'Grep') return [input.pattern, input.path].filter(Boolean).join(' ');
  if (block.name === 'Glob') return [input.pattern, input.path].filter(Boolean).join(' ');
  if (block.name === 'StructuredOutput') return input.schema ? 'structured output' : '';
  return toolBlockSummary(block);
}

// WorkflowsTab renders each workflow run on the parent session as a tree of its
// fan-out agents; expanding an agent streams its transcript inline. The agents
// come from hit.workflows[].agents[] (attributed to the parent, never top-level).
function workflowAgentName(a, index) {
  if (a.label) return a.label;
  if (a.title && !looksLikePromptTitle(a.title)) return a.title;
  if (a.agent_type) return a.agent_type + ' ' + String((index || 0) + 1).padStart(2, '0');
  return numberedAgentName(index);
}

function workflowAgentSubtitle(a, name) {
  const title = (a.title || '').trim();
  if (!title || title === name || title === a.label || looksLikePromptTitle(title)) return '';
  return title;
}

function workflowAgentTerminal(a) {
  return agentIsTerminal(a);
}

function workflowAgentErrored(a) {
  return agentIsErrored(a);
}

function workflowPhaseGroups(wf) {
  const agents = wf.agents || [];
  const groups = [];
  const byTitle = {};
  for (const p of wf.phases || []) {
    if (!p || !p.title || byTitle[p.title]) continue;
    const group = { title: p.title, detail: p.detail || '', agents: [] };
    byTitle[p.title] = group;
    groups.push(group);
  }
  for (const a of agents) {
    const title = a.phase || 'Agents';
    let group = byTitle[title];
    if (!group) {
      group = { title, detail: '', agents: [] };
      byTitle[title] = group;
      groups.push(group);
    }
    group.agents.push(a);
  }
  if (groups.length === 0) groups.push({ title: 'Agents', detail: '', agents });
  return groups;
}

function workflowAgentFocusMatch(focus, wf, ri, agent, agentIndex, key) {
  if (!focus) return false;
  const id = agent?.id || '';
  const runID = wf?.run_id || '';
  const candidates = [
    key,
    id,
    runID && id ? runID + '#' + id : '',
    runID && id ? runID + ':' + id : '',
    runID ? runID + '#' + agentIndex : '',
    runID ? runID + ':' + agentIndex : '',
    agent?.source_path || '',
  ].filter(Boolean);
  return candidates.includes(focus);
}

function WorkflowsTab({ workflows, focusAgent }) {
  const [expanded, setExpanded] = useState(null); // "<runIdx>:<agentId>"

  useEffect(() => {
    if (!focusAgent || !workflows || workflows.length === 0) return;
    for (let ri = 0; ri < workflows.length; ri++) {
      const wf = workflows[ri];
      const agents = wf.agents || [];
      for (let ai = 0; ai < agents.length; ai++) {
        const agentKey = agents[ai].id || String(ai);
        const key = ri + ':' + agentKey;
        if (workflowAgentFocusMatch(focusAgent, wf, ri, agents[ai], ai, key)) {
          setExpanded(key);
          return;
        }
      }
    }
  }, [focusAgent, workflows]);

  if (!workflows || workflows.length === 0) {
    return html`<div class="empty" style="margin-top:20px">no workflow runs in this session</div>`;
  }

  return html`
    <div class="wf-tab">
      ${workflows.map((wf, ri) => {
        const groups = workflowPhaseGroups(wf);
        return html`
          <div class="wf-run" key=${wf.run_id || ri}>
            <div class="wf-run-head">
              <span class="wf-run-name">${wf.name || wf.run_id || 'workflow'}</span>
              ${wf.status && html`<span class="wf-run-status ${normalizedAgentStatus(wf.status)}">${wf.status}</span>`}
              <span class="wf-run-meta">${(wf.agents || []).length || wf.agent_count || 0} agents${wf.journal_event_count ? ' · ' + wf.journal_event_count + ' events' : ''}</span>
            </div>
            ${wf.description && html`<div class="wf-run-desc">${wf.description}</div>`}
            <div class="wf-phase-list">
              ${groups.map((group, gi) => {
                const total = group.agents.length;
                const terminal = group.agents.filter(workflowAgentTerminal).length;
                const failed = group.agents.some(workflowAgentErrored);
                const phaseState = total === 0 ? 'pending' : terminal === total ? (failed ? 'error' : 'complete') : 'active';
