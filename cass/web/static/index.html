<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CASS — Coding Agent Session Search</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="app"></div>
<script type="module">
import { html, render } from 'https://esm.sh/htm@3/preact?deps=preact@10';
import { useState, useEffect, useCallback, useRef } from 'https://esm.sh/preact@10/hooks';

// --- API helpers ---

async function api(path, opts) {
  const r = await fetch('/api/' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function qs(params) {
  const p = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) {
    if (v) p.set(k, v);
  }
  return p.toString();
}

// --- Relative time ---

function relTime(ts) {
  if (!ts) return '';
  const d = Date.now() - new Date(ts).getTime();
  const m = Math.floor(d / 60000);
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  const days = Math.floor(h / 24);
  if (days < 7) return days + 'd ago';
  return ts.slice(0, 10);
}

function shortProject(ws) {
  if (!ws) return '';
  const idx = ws.indexOf('github.com/');
  if (idx >= 0) {
    const after = ws.slice(idx + 11);
    const parts = after.split('/');
    return parts.length >= 2 ? parts[0] + '/' + parts[1] : after;
  }
  const parts = ws.split('/');
  return parts.slice(-2).join('/');
}

// --- Components ---

function App() {
  const [tab, setTab] = useState('search');
  const [connected, setConnected] = useState(false);
  const [toast, setToast] = useState('');
  const toastRef = useRef(null);

  // SSE connection.
  useEffect(() => {
    const es = new EventSource('/events');
    es.onopen = () => setConnected(true);
    es.onerror = () => setConnected(false);
    es.addEventListener('session_change', (e) => {
      const data = JSON.parse(e.data);
      showToast(data.files_changed + ' session(s) updated');
      window.dispatchEvent(new CustomEvent('cass:refresh'));
    });
    es.addEventListener('index_complete', (e) => {
      const data = JSON.parse(e.data);
      showToast('Indexed ' + data.indexed + ' sessions');
      window.dispatchEvent(new CustomEvent('cass:refresh'));
    });
    return () => es.close();
  }, []);

  function showToast(msg) {
    setToast(msg);
    if (toastRef.current) clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(''), 3000);
  }

  return html`
    <div class="app">
      <div class="header">
        <h1>cass <span>session search</span></h1>
        <div class="live-badge">
          <div class="live-dot ${connected ? 'connected' : ''}"></div>
          ${connected ? 'live' : 'disconnected'}
        </div>
      </div>
      <div class="tabs">
        ${['search', 'graph', 'map', 'stats'].map(t => html`
          <button class="tab ${tab === t ? 'active' : ''}" onClick=${() => setTab(t)}>
            ${t}
          </button>
        `)}
      </div>
      ${tab === 'search' && html`<${SearchPanel} />`}
      ${tab === 'graph' && html`<${GraphPanel} />`}
      ${tab === 'map' && html`<${MapPanel} />`}
      ${tab === 'stats' && html`<${StatsPanel} />`}
      <div class="toast ${toast ? 'show' : ''}">${toast}</div>
    </div>
  `;
}

function SearchPanel() {
  const [query, setQuery] = useState('');
  const [agent, setAgent] = useState('');
  const [workspace, setWorkspace] = useState('');
  const [since, setSince] = useState('');
  const [sort, setSort] = useState('');
  const [results, setResults] = useState(null);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);

  // Effective sort: auto-select based on whether there's a query.
  const effectiveSort = sort || (query ? 'relevance' : 'recent');

  const doSearch = useCallback(async () => {
    setLoading(true);
    try {
      const params = { q: query, agent, workspace, since, sort: sort || '', limit: '30' };
      const r = await api('search?' + qs(params));
      setResults(r);
    } catch (e) {
      console.error('search:', e);
    }
    setLoading(false);
  }, [query, agent, workspace, since, sort]);

  // Debounced live search on any input change.
  useEffect(() => {
    const id = setTimeout(doSearch, 250);
    return () => clearTimeout(id);
  }, [query, agent, workspace, since, sort]);

  // Auto-refresh on SSE events.
  useEffect(() => {
    const handler = () => doSearch();
    window.addEventListener('cass:refresh', handler);
    return () => window.removeEventListener('cass:refresh', handler);
  }, [doSearch]);

  const sortModes = [
    { value: 'recent', label: 'Recent' },
    { value: 'relevance', label: 'Relevance' },
    { value: 'started', label: 'Started' },
    { value: 'oldest', label: 'Oldest' },
  ];

  return html`
    <div>
      <div class="search-bar">
        <input class="search-input" type="text" placeholder="search sessions..."
          value=${query} onInput=${e => setQuery(e.target.value)}
          autofocus />
        <button class="btn" onClick=${doSearch}>search</button>
      </div>
      <div class="filters">
        <input class="filter-input" placeholder="agent" value=${agent}
          onInput=${e => setAgent(e.target.value)} />
        <input class="filter-input" placeholder="workspace" value=${workspace}
          onInput=${e => setWorkspace(e.target.value)} />
        <input class="filter-input" placeholder="since (e.g. 24h)" value=${since}
          onInput=${e => setSince(e.target.value)} />
        <span class="sort-group">
          ${sortModes.map(m => html`
            <button class="sort-pill ${effectiveSort === m.value ? 'active' : ''}"
              onClick=${() => setSort(sort === m.value ? '' : m.value)}>
              ${m.label}
            </button>
          `)}
        </span>
      </div>
      ${loading && html`<div class="loading">searching...</div>`}
      ${selected && html`<${SessionDetail} hit=${selected} onClose=${() => setSelected(null)} />`}
      ${results && html`
        <ul class="results">
          ${results.hits && results.hits.map((h, i) => html`
            <${HitItem} key=${h.session_id} hit=${h} num=${i + 1} onClick=${() => setSelected(h)} />
          `)}
        </ul>
        <div class="result-count">${results.total_count || 0} results</div>
      `}
      ${results && (!results.hits || results.hits.length === 0) && !loading && html`
        <div class="empty">no results</div>
      `}
    </div>
  `;
}

function fmtDuration(secs) {
  if (!secs) return '';
  if (secs < 60) return secs + 's';
  const m = Math.floor(secs / 60);
  if (m < 60) return m + 'm';
  const h = Math.floor(m / 60);
  return h + 'h ' + (m % 60) + 'm';
}

function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'k';
  return '' + n;
}

function HitItem({ hit: h, num, onClick }) {
  const stats = [];
  if (h.tool_calls) stats.push(h.tool_calls + ' tools');
  if (h.turns > 1) stats.push(h.turns + ' turns');
  if (h.files_edited) stats.push(h.files_edited + ' files');
  if (h.lines_written) stats.push(h.lines_written + ' lines');
  const tok = (h.input_tokens || 0) + (h.output_tokens || 0);
  if (tok >= 1000) stats.push(fmtNum(tok) + ' tok');
  if (h.duration_secs) stats.push(fmtDuration(h.duration_secs));

  const it2 = [];
  if (h.it2_splits) it2.push(h.it2_splits + ' splits');
  if (h.it2_sends) it2.push(h.it2_sends + ' msgs');
  if (h.it2_screens) it2.push(h.it2_screens + ' reads');

  return html`
    <li class="hit" onClick=${onClick}>
      <div class="hit-header">
        <span class="hit-num">${num}.</span>
        <span class="hit-agent">[${h.agent}]</span>
        <span class="hit-title">${h.title}</span>
        ${h.sparkline && html`<span class="hit-sparkline">${h.sparkline}</span>`}
      </div>
      ${h.snippet && html`<div class="hit-snippet">${h.snippet}</div>`}
      <div class="hit-meta">
        ${h.workspace && html`<span class="hit-workspace">${shortProject(h.workspace)}</span>`}
        ${h.started_at && html`<span class="hit-time">${relTime(h.started_at)}${h.ended_at && relTime(h.ended_at) !== relTime(h.started_at) ? ' → ' + relTime(h.ended_at) : ''}</span>`}
        ${stats.length > 0 && html`<span class="hit-stats">${stats.join(' | ')}</span>`}
        ${it2.length > 0 && html`<span class="hit-it2">it2: ${it2.join(', ')}</span>`}
      </div>
    </li>
  `;
}

function SessionDetail({ hit, onClose }) {
  const [entries, setEntries] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    setLoading(true);
    api('session/' + hit.session_id).then(e => {
      setEntries(e);
      setLoading(false);
    }).catch(err => {
      console.error('session load:', err);
      setLoading(false);
    });
  }, [hit.session_id]);

  return html`
    <div class="session-detail">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>${hit.title}</h3>
        <button class="btn" onClick=${onClose}>close</button>
      </div>
      <div class="hit-meta" style="margin-bottom:12px">
        <span class="hit-agent">[${hit.agent}]</span>
        <span class="hit-workspace">${hit.workspace}</span>
        <span class="hit-time">${hit.started_at}</span>
      </div>
      ${loading && html`<div class="loading">loading session...</div>`}
      ${entries && html`
        <div class="session-entries">
          ${entries.map(e => html`
            <div style="margin-bottom:8px">
              <span style="color:var(--cyan)">[${e.type}]</span>
              ${e.message && e.message.content && html`
                <span> ${typeof e.message.content === 'string'
                  ? e.message.content.slice(0, 200)
                  : JSON.stringify(e.message.content).slice(0, 200)
                }</span>
              `}
            </div>
          `)}
        </div>
      `}
    </div>
  `;
}

function GraphPanel() {
  const [links, setLinks] = useState([]);
  const [labels, setLabels] = useState({});
  const [since, setSince] = useState('24h');
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const l = await api('links?' + qs({ since }));
      setLinks(l || []);

      // Collect node IDs and resolve labels.
      const ids = new Set();
      (l || []).forEach(link => {
        if (link.source_session) ids.add(link.source_session.slice(0, 8));
        if (link.target_session) ids.add(link.target_session.slice(0, 8));
      });
      if (ids.size > 0) {
        const lb = await api('labels?' + qs({ ids: [...ids].join(',') }));
        setLabels(lb || {});
      }
    } catch (e) {
      console.error('graph:', e);
    }
    setLoading(false);
  }, [since]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  if (loading) return html`<div class="loading">loading graph...</div>`;
  if (links.length === 0) return html`<div class="empty">no inter-session links found</div>`;

  // Collect unique nodes.
  const nodeSet = new Set();
  links.forEach(l => {
    const src = l.source_session ? l.source_session.slice(0, 8) : '?';
    nodeSet.add(src);
    nodeSet.add(l.target_session.slice(0, 8));
  });
  const nodes = [...nodeSet];

  // Layout: arrange in a circle.
  const cx = 400, cy = 250, radius = 180;
  const nodePos = {};
  nodes.forEach((n, i) => {
    const angle = (2 * Math.PI * i) / nodes.length - Math.PI / 2;
    nodePos[n] = { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
  });

  function nodeLabel(id) {
    const lb = labels[id];
    if (lb && lb.workspace) return id + ' ' + shortProject(lb.workspace);
    return id;
  }

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <input class="filter-input" placeholder="since (e.g. 24h)" value=${since}
          onInput=${e => setSince(e.target.value)} />
        <button class="btn" onClick=${load}>refresh</button>
      </div>
      <div class="graph-container">
        <svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrowMsg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
              <path d="M0,0 L8,3 L0,6" fill="var(--accent)" />
            </marker>
            <marker id="arrowObs" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
              <path d="M0,0 L8,3 L0,6" fill="var(--yellow)" />
            </marker>
          </defs>
          ${links.map(l => {
            const src = l.source_session ? l.source_session.slice(0, 8) : '?';
            const dst = l.target_session.slice(0, 8);
            const p1 = nodePos[src] || { x: cx, y: cy };
            const p2 = nodePos[dst] || { x: cx, y: cy };
            const cls = l.kind === 'observation' ? 'graph-edge-obs' : 'graph-edge-msg';
            return html`<line x1=${p1.x} y1=${p1.y} x2=${p2.x} y2=${p2.y} class=${cls} />`;
          })}
          ${nodes.map(n => {
            const p = nodePos[n];
            const label = nodeLabel(n);
            const w = Math.max(80, label.length * 7 + 16);
            return html`
              <g class="graph-node" transform="translate(${p.x - w/2},${p.y - 14})">
                <rect width=${w} height="28" />
                <text x=${w/2} y="18" text-anchor="middle">${label}</text>
              </g>
            `;
          })}
        </svg>
      </div>
      <div class="result-count">${nodes.length} nodes, ${links.length} links</div>
    </div>
  `;
}

function MapPanel() {
  const [filter, setFilter] = useState('');
  const [mappings, setMappings] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const m = await api('mappings?' + qs({ filter }));
      setMappings(m || []);
    } catch (e) {
      console.error('mappings:', e);
    }
    setLoading(false);
  }, [filter]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <input class="filter-input" placeholder="filter..." value=${filter}
          onInput=${e => setFilter(e.target.value)} style="width:240px" />
      </div>
      ${loading && html`<div class="loading">loading mappings...</div>`}
      ${!loading && mappings.length === 0 && html`<div class="empty">no session mappings found</div>`}
      ${mappings.length > 0 && html`
        <table class="map-table">
          <thead>
            <tr>
              <th>iTerm2</th>
              <th>CASS</th>
              <th>Project</th>
              <th>Title</th>
            </tr>
          </thead>
          <tbody>
            ${mappings.map(m => html`
              <tr>
                <td>${m.iterm_session ? m.iterm_session.slice(0, 8) : ''}</td>
                <td>${m.cass_session ? m.cass_session.slice(0, 8) : ''}</td>
                <td style="color:var(--green)">${shortProject(m.workspace)}</td>
                <td>${m.title && m.title.length > 50 ? m.title.slice(0, 50) + '...' : m.title}</td>
              </tr>
            `)}
          </tbody>
        </table>
        <div class="result-count">${mappings.length} mappings</div>
      `}
    </div>
  `;
}

function StatsPanel() {
  const [basic, setBasic] = useState(null);
  const [agg, setAgg] = useState(null);
  const [since, setSince] = useState('');
  const [indexing, setIndexing] = useState(false);

  const load = useCallback(async () => {
    try {
      const [b, a] = await Promise.all([
        api('stats'),
        api('stats?aggregate=true' + (since ? '&since=' + since : '')),
      ]);
      setBasic(b);
      setAgg(a);
    } catch (e) {
      console.error('stats:', e);
    }
  }, [since]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  async function reindex(force) {
    setIndexing(true);
    try {
      const r = await api('index?force=' + force, { method: 'POST' });
      load();
    } catch (e) {
      alert('Index error: ' + e.message);
    }
    setIndexing(false);
  }

  if (!basic || !agg) return html`<div class="loading">loading stats...</div>`;

  const lastIdx = basic.last_indexed
    ? new Date(parseInt(basic.last_indexed) * 1000).toLocaleString()
    : 'never';

  const card = (label, value, sub) => html`
    <div class="stat-card">
      <div class="stat-label">${label}</div>
      <div class="stat-value">${value}</div>
      ${sub && html`<div style="font-size:11px;color:var(--fg-muted);margin-top:4px">${sub}</div>`}
    </div>
  `;

  // Sessions per day sparkline.
  const daily = agg.sessions_per_day || {};
  const days = Object.keys(daily).sort();
  const dayVals = days.map(d => daily[d]);
  const maxDay = Math.max(...dayVals, 1);
  const bars = '▁▂▃▄▅▆▇█';
  const dailySparkline = dayVals.map(v => bars[Math.min(Math.floor(v / maxDay * 7), 7)]).join('');

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <input class="filter-input" placeholder="since (e.g. 24h, 168h)" value=${since}
          onInput=${e => setSince(e.target.value)} style="width:200px" />
        <button class="btn" onClick=${() => reindex(false)} disabled=${indexing}>
          ${indexing ? 'indexing...' : 're-index'}
        </button>
        <button class="btn" onClick=${() => reindex(true)} disabled=${indexing}>full</button>
      </div>

      <div class="stats-grid">
        ${card('sessions', fmtNum(agg.sessions), agg.agents + ' agents, ' + agg.workspaces + ' workspaces')}
        ${card('tool calls', fmtNum(agg.tool_calls))}
        ${card('total tokens', fmtNum(agg.total_tokens), fmtNum(agg.input_tokens) + ' in / ' + fmtNum(agg.output_tokens) + ' out')}
        ${card('turns', fmtNum(agg.turns))}
        ${card('files edited', fmtNum(agg.files_edited), fmtNum(agg.files_read) + ' read / ' + fmtNum(agg.files_written) + ' written')}
        ${card('lines written', fmtNum(agg.lines_written))}
        ${card('total time', fmtDuration(agg.duration_secs))}
        ${card('subagent spawns', fmtNum(agg.subagent_spawns))}
        ${card('it2 interactions', fmtNum(agg.it2_sends + agg.it2_screens),
          agg.it2_splits + ' splits, ' + agg.it2_sends + ' sends, ' + agg.it2_screens + ' screens')}
        ${card('team ops', fmtNum(agg.team_inbox_reads + agg.team_inbox_sends + agg.team_task_ops + agg.team_spawns),
          agg.team_inbox_sends + ' msgs, ' + agg.team_task_ops + ' tasks, ' + agg.team_spawns + ' spawns')}
        ${card('last indexed', lastIdx)}
      </div>

      ${days.length > 0 && html`
        <div style="margin-top:16px">
          <div class="stat-label" style="margin-bottom:4px">sessions per day (30d)</div>
          <div style="font-family:var(--mono);font-size:16px;letter-spacing:2px">${dailySparkline}</div>
          <div style="font-size:11px;color:var(--fg-muted);margin-top:2px">
            ${days[0]} — ${days[days.length - 1]} (peak: ${Math.max(...dayVals)}/day)
          </div>
        </div>
      `}

      ${agg.workspace_top && html`
        <div style="margin-top:16px">
          <div class="stat-label" style="margin-bottom:8px">top workspaces</div>
          <table class="map-table">
            <thead><tr><th>workspace</th><th>sessions</th></tr></thead>
            <tbody>
              ${Object.entries(agg.workspace_top).sort((a,b) => b[1] - a[1]).map(([ws, cnt]) => html`
                <tr>
                  <td style="color:var(--green)">${shortProject(ws)}</td>
                  <td>${cnt}</td>
                </tr>
              `)}
            </tbody>
          </table>
        </div>
      `}
    </div>
  `;
}

// --- Mount ---
render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
