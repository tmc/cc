// Normalize a node's started_at (unix seconds or RFC3339) to an ISO string.
function nodeStartISO(n) {
  if (!n || !n.started_at) return null;
  return typeof n.started_at === 'number' ? new Date(n.started_at * 1000).toISOString() : n.started_at;
}

// GraphTooltip renders the floating node/edge tooltip. Content varies by
// node_type; edges show the normalized edge_type label.
function GraphTooltip({ tooltip, edgeTooltip, nodeData, onNavigate, isExpanded, isActive }) {
  if (tooltip) {
    const n = nodeData[tooltip.id];
    if (n) {
      const startTs = nodeStartISO(n);
      if (n.node_type === 'workflow') {
        const dur = (n.started_at && n.completed_at) ? fmtDuration(n.completed_at - n.started_at) : null;
        return html`
          <div class="graph-tooltip visible" style="left:${tooltip.x}px;top:${tooltip.y}px">
            <div class="graph-tooltip-title">${n.name || tooltip.id}</div>
            ${n.description && html`<div class="graph-tooltip-stat" style="white-space:normal;max-width:240px">${n.description}</div>`}
            <div class="graph-tooltip-stat">
              ${[
                n.status,
                (n.agent_count || 0) + ' agents',
                n.journal_event_count && n.journal_event_count + ' events',
                dur && dur,
              ].filter(Boolean).join(' · ')}
            </div>
            ${startTs && html`<div class="graph-tooltip-stat">${relTime(startTs)}</div>`}
            <div class="graph-tooltip-hint">click to ${isExpanded(n.full_id || n.id) ? 'collapse' : 'expand'} agents</div>
          </div>
        `;
      }
      if (n.node_type === 'workflow_agent') {
        return html`
          <div class="graph-tooltip visible" style="left:${tooltip.x}px;top:${tooltip.y}px">
            <div class="graph-tooltip-title">${n.title || tooltip.id}</div>
            <div class="graph-tooltip-stat">${n.status || 'agent'} · ${n.workflow_run_id || ''}</div>
            <div class="graph-tooltip-hint">click to open parent session</div>
          </div>
        `;
      }
      if (n.node_type === 'subagent') {
        const tok = (n.tokens || 0);
        return html`
          <div class="graph-tooltip visible" style="left:${tooltip.x}px;top:${tooltip.y}px">
            <div class="graph-tooltip-title">${n.title || n.name || tooltip.id}</div>
            <div class="graph-tooltip-stat">
              ${[n.name || 'subagent', n.status, tok >= 1000 && fmtNum(tok) + ' tok'].filter(Boolean).join(' · ')}
            </div>
            ${startTs && html`<div class="graph-tooltip-stat">${relTime(startTs)}</div>`}
            <div class="graph-tooltip-hint">click to open spawned session</div>
          </div>
        `;
      }
      const tok = (n.tokens || 0);
      return html`
        <div class="graph-tooltip visible"
          style="left:${tooltip.x}px;top:${tooltip.y}px">
          <div class="graph-tooltip-title">${n.title || tooltip.id}</div>
          ${n.workspace && html`<div class="graph-tooltip-stat graph-tooltip-ws"
            onClick=${(e) => { e.stopPropagation(); if (onNavigate) onNavigate('search', { q: shortProject(n.workspace) }); }}
            style="cursor:pointer;text-decoration:underline">${shortProject(n.workspace)}</div>`}
          <div class="graph-tooltip-stat">
            ${[
              n.tool_calls && n.tool_calls + ' tools',
              n.turns && n.turns + ' turns',
              tok >= 1000 && fmtNum(tok) + ' tok',
              n.workflow_count && n.workflow_count + ' workflows',
            ].filter(Boolean).join(' · ') || 'no stats'}
          </div>
          ${startTs && html`<div class="graph-tooltip-stat">${relTime(startTs)}</div>`}
          ${isActive(tooltip.id) && html`<div style="color:var(--green);margin-top:2px">active</div>`}
          <div class="graph-tooltip-hint">click node to search</div>
        </div>
      `;
    }
  }
  if (edgeTooltip) {
    const l = edgeTooltip.link;
    const label = (l.edge_type || l.kind || 'link').replace(/_/g, ' ');
    const action = l.action && l.action !== l.edge_type ? l.action : '';
    const ts = l.timestamp ? relTime(l.timestamp) : '';
    return html`
      <div class="graph-tooltip visible"
        style="left:${edgeTooltip.x}px;top:${edgeTooltip.y}px">
        <div class="graph-tooltip-title">${l.source} → ${l.target}</div>
        <div class="graph-tooltip-stat">${label}${action ? ': ' + action : ''}</div>
        ${l.text && html`<div class="graph-tooltip-stat" style="white-space:normal;max-width:240px;color:var(--dim)">${l.text.slice(0, 120)}</div>`}
        ${ts && html`<div class="graph-tooltip-stat">${ts}</div>`}
      </div>
    `;
  }
  return null;
}

function GraphPanel({ urlParams, updateParams, navVersion, onNavigate }) {
  const [allLinks, setAllLinks] = useState([]);
  const [nodeData, setNodeData] = useState({});  // id -> {workspace, title, started_at, ended_at, tool_calls, turns, tokens, is_active}
  const [timeRange, setTimeRange] = useState({ min: 0, max: 0 });
  const [since, setSinceRaw] = useState(urlParams.since || '24h');
  const [loading, setLoading] = useState(true);
  const [zoom, setZoom] = useState(1);
  const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef(null);
  const [graphQuery, setGraphQueryRaw] = useState(urlParams.q || '');
  const [wsFilter, setWsFilterRaw] = useState(urlParams.ws || '');
  const [edgeFilter, setEdgeFilter] = useState({ message: true, observation: true, split: true, team: true, workflow: true });
  const [activeOnly, setActiveOnly] = useState(false);
  // Graph layout mode: workflow | sessions | teams | network. '' means auto.
  const [graphMode, setGraphMode] = useState(urlParams.mode || '');
  // Map of workflow run id -> true for workflows whose child agents are
  // expanded (workflow mode). A plain object is more idiomatic for Preact state
  // than a mutated Set.
  const [expandedWorkflows, setExpandedWorkflows] = useState({});
  const isExpanded = useCallback((runID) => !!expandedWorkflows[runID], [expandedWorkflows]);
  // True once the loaded graph contains at least one workflow node.
  const [hasWorkflows, setHasWorkflows] = useState(false);

  function setGraphQuery(v) { setGraphQueryRaw(v); updateParams({ since, q: v, ws: wsFilter }); }
  function setSince(v) { setSinceRaw(v); updateParams({ since: v, q: graphQuery, ws: wsFilter }); }
  function setWsFilter(v) { setWsFilterRaw(v); updateParams({ since, q: graphQuery, ws: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSinceRaw(urlParams.since || '24h');
    setGraphQueryRaw(urlParams.q || '');
    setWsFilterRaw(urlParams.ws || '');
  }, [navVersion]);

  // Scrubber state.
  const [scrubberPos, setScrubberPos] = useState(1);  // 0..1 normalized
  const [playing, setPlaying] = useState(false);
  const playRef = useRef(null);

  // Tooltip state.
  const [tooltip, setTooltip] = useState(null);  // {id, x, y}
  const containerRef = useRef(null);

  // Track which links just appeared for animation.
  const prevVisibleCount = useRef(0);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      // Workflow nodes/agents keep their full ids; only iTerm2/session prefixes
      // are shortened to 8 chars for display. Detect those by '#'/'wf_' shape.
      function normID(raw) {
        const id = raw || '?';
        if (id.startsWith('wf_') || id.includes('#') || id.includes('@')) return id;
        return id.slice(0, 8);
      }
      // Normalize link: keep edge_type so workflow/team edges render distinctly.
      function normLink(lk) {
        return {
          source: normID(lk.source || lk.source_session),
          target: normID(lk.target || lk.target_session),
          kind: lk.kind, action: lk.action, edge_type: lk.edge_type,
          text: lk.text, timestamp: lk.timestamp,
        };
      }

      // Request workflow nodes unless an explicit non-workflow mode is active.
      const wfParam = (graphMode === 'sessions' || graphMode === 'teams' || graphMode === 'network')
        ? 'none' : 'expanded';

      let nodes = [], links = [], tRange = null;
      try {
        const g = await api('graph?' + qs({ since, workflow: wfParam }));
        nodes = g.nodes || [];
        links = (g.links || []).map(normLink);
        tRange = g.time_range;
      } catch {
        // Fallback to old 2-call pattern.
        const l = await api('links?' + qs({ since }));
        links = (l || []).map(normLink);
        const ids = new Set();
        links.forEach(lk => { ids.add(lk.source); ids.add(lk.target); });
        if (ids.size > 0) {
          const lb = await api('labels?' + qs({ ids: [...ids].join(',') }));
          nodes = [...ids].map(id => {
            const info = (lb || {})[id] || {};
            return { id, workspace: info.workspace || '', title: info.title || '' };
          });
        }
      }

      // Build node lookup, normalizing ids to match link endpoints. Keep the
      // full id for parent/run references used by workflow layout.
      const nd = {};
      let sawWorkflow = false;
      nodes.forEach(n => {
        const nid = normID(n.id);
        nd[nid] = { ...n, id: nid, full_id: n.id, parent_session_id: n.parent_session_id ? normID(n.parent_session_id) : undefined };
        if (n.node_type === 'workflow') sawWorkflow = true;
      });
      setHasWorkflows(sawWorkflow);

      // Ensure all link endpoints have a node entry.
      links.forEach(l => {
        if (!nd[l.source]) nd[l.source] = { id: l.source };
        if (!nd[l.target]) nd[l.target] = { id: l.target };
      });

      // Compute time range from link timestamps.
      let tMin = Infinity, tMax = -Infinity;
      if (tRange) {
        tMin = new Date(tRange.min).getTime();
        tMax = new Date(tRange.max).getTime();
      } else {
        links.forEach(l => {
          if (l.timestamp) {
            const t = new Date(l.timestamp).getTime();
            if (t < tMin) tMin = t;
            if (t > tMax) tMax = t;
          }
        });
      }
      if (!isFinite(tMin)) tMin = Date.now() - 3600000;
      if (!isFinite(tMax)) tMax = Date.now();
      // Add a small buffer so the last link is visible at max.
      if (tMax <= tMin) tMax = tMin + 1000;

      setAllLinks(links);
      setNodeData(nd);
      setTimeRange({ min: tMin, max: tMax });
      setScrubberPos(1);
      prevVisibleCount.current = links.length;
    } catch (e) { console.error('graph:', e); }
    setLoading(false);
  }, [since, graphMode]);

  useEffect(() => { load(); }, [load]);
  // Graph does NOT auto-refresh on SSE — layout is expensive and causes visual jumps.
  // Use the refresh button instead.

  // Playback timer.
  useEffect(() => {
    if (!playing) { if (playRef.current) cancelAnimationFrame(playRef.current); return; }
    const duration = 5000; // 5s real time for full playback
    const start = performance.now();
    const startPos = 0;
    function tick(now) {
      const elapsed = now - start;
      const pos = Math.min(1, startPos + elapsed / duration);
      setScrubberPos(pos);
      if (pos < 1) { playRef.current = requestAnimationFrame(tick); }
      else { setPlaying(false); }
    }
    setScrubberPos(0);
    playRef.current = requestAnimationFrame(tick);
    return () => { if (playRef.current) cancelAnimationFrame(playRef.current); };
  }, [playing]);

  function onWheel(e) {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    setZoom(z => {
      const next = Math.max(0.3, Math.min(3, z + delta));
      // Zoom toward cursor: adjust pan so the point under the cursor stays fixed.
      const rect = containerRef.current?.getBoundingClientRect();
      if (rect) {
        const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
        const frac = (next - z) / z;
        setPanOffset(p => ({ x: p.x - cx * frac, y: p.y - cy * frac }));
      }
      return next;
    });
  }

  const didDrag = useRef(false);

  function onPointerDown(e) {
    // Only pan on primary button and not on interactive elements.
    if (e.button !== 0) return;
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'BUTTON') return;
    dragStart.current = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
    didDrag.current = false;
    setDragging(true);
    e.currentTarget.setPointerCapture(e.pointerId);
  }
  function onPointerMove(e) {
    if (!dragStart.current || !dragging) return;
    didDrag.current = true;
    setPanOffset({ x: e.clientX - dragStart.current.x, y: e.clientY - dragStart.current.y });
  }
  function onPointerUp(e) {
    dragStart.current = null;
    setDragging(false);
  }

  function resetView() {
    setZoom(1);
    setPanOffset({ x: 0, y: 0 });
  }

  // Effective layout mode: explicit choice, else auto (workflow when the data
  // has workflow runs, otherwise the inter-session view).
  const effectiveMode = graphMode || (hasWorkflows ? 'workflow' : 'sessions');

  function selectMode(m) {
    setGraphMode(m);
    updateParams({ since, q: graphQuery, ws: wsFilter, mode: m });
    resetView();
  }

  // Fit recomputes pan/zoom to frame the current node bounds. The SVG viewBox
  // already frames all nodes, so fit resets the overlay transform to 1:1 —
  // distinct from a manual zoom level the user dialed in.
  function fitView() {
    setZoom(1);
    setPanOffset({ x: 0, y: 0 });
  }

  function toggleWorkflow(runID) {
    setExpandedWorkflows(prev => {
      const next = { ...prev };
      if (next[runID]) delete next[runID]; else next[runID] = true;
      return next;
    });
  }

  // Unique workspaces from node data for filter chips.
  const workspaces = useMemo(() => {
    const ws = new Set();
    Object.values(nodeData).forEach(n => { if (n.workspace) ws.add(n.workspace); });
    return [...ws].sort();
  }, [nodeData]);

  // Filter nodes by search query and workspace. In workflow mode, child agents
  // of collapsed workflows are hidden until their workflow is expanded.
  const filteredNodeIds = useMemo(() => {
    const all = Object.keys(nodeData);
    const q = graphQuery.toLowerCase();
    return all.filter(id => {
      const n = nodeData[id];
      if (effectiveMode === 'workflow' && n.node_type === 'workflow_agent') {
        if (!isExpanded(n.workflow_run_id)) return false;
      }
      if (wsFilter && (!n.workspace || n.workspace !== wsFilter)) return false;
      if (activeOnly && !n.is_active) return false;
      if (q) {
        const haystack = [id, n.title || '', n.workspace || '', n.name || ''].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });
  }, [nodeData, graphQuery, wsFilter, activeOnly, effectiveMode, expandedWorkflows]);

  // Only show links where both endpoints are visible.
  const filteredNodeSet = useMemo(() => new Set(filteredNodeIds), [filteredNodeIds]);

  // Compute scrubber cutoff time.
  const cutoffTime = timeRange.min + (timeRange.max - timeRange.min) * scrubberPos;

  // Classify a link's edge type for filtering.
  function edgeType(l) {
    const et = l.edge_type || '';
    if (et === 'workflow_contains' || et === 'workflow_spawn') return 'workflow';
    const act = l.action || '';
    const kind = l.kind || '';
    if (kind === 'team' || act === 'team-spawn' || act === 'team-message') return 'team';
    if (act === 'get-screen' || act === 'get-buffer') return 'observation';
    if (act === 'split') return 'split';
    return 'message';
  }

  // Filter links by scrubber position, node visibility, and edge type.
  const visibleLinks = useMemo(() => {
    return allLinks.filter(l => {
      if (!filteredNodeSet.has(l.source) || !filteredNodeSet.has(l.target)) return false;
      if (scrubberPos < 1 && l.timestamp) {
        if (new Date(l.timestamp).getTime() > cutoffTime) return false;
      }
      if (!edgeFilter[edgeType(l)]) return false;
      return true;
    });
  }, [allLinks, cutoffTime, scrubberPos, filteredNodeSet, edgeFilter]);

  // Track newly appearing links for animation.
  const newLinkIndices = useMemo(() => {
    const prev = prevVisibleCount.current;
    const curr = visibleLinks.length;
    const indices = new Set();
    if (curr > prev && playing) {
      for (let i = prev; i < curr; i++) indices.add(i);
    }
    prevVisibleCount.current = curr;
    return indices;
  }, [visibleLinks.length, playing]);

  // Count links per node for sizing.
  const nodeLinkCount = useMemo(() => {
    const counts = {};
    visibleLinks.forEach(l => {
      counts[l.source] = (counts[l.source] || 0) + 1;
      counts[l.target] = (counts[l.target] || 0) + 1;
    });
    return counts;
  }, [visibleLinks]);

  if (loading) return html`<div class="loading">loading graph...</div>`;

  const allNodeIds = Object.keys(nodeData);
  if (allNodeIds.length === 0) return html`<div class="empty">no graph data for this range</div>`;

  // Group nodes by workspace for clustered layout.
  const wsGroups = useMemo(() => {
    const groups = {};
    filteredNodeIds.forEach(id => {
      const ws = (nodeData[id] && nodeData[id].workspace) || '(unknown)';
      if (!groups[ws]) groups[ws] = [];
      groups[ws].push(id);
    });
    return groups;
  }, [filteredNodeIds, nodeData]);

  // Group nodes by team_name for team cluster overlays.
  const teamGroups = useMemo(() => {
    const groups = {};
    filteredNodeIds.forEach(id => {
      const tn = nodeData[id] && nodeData[id].team_name;
      if (tn) {
        if (!groups[tn]) groups[tn] = [];
        groups[tn].push(id);
      }
    });
    return groups;
  }, [filteredNodeIds, nodeData]);

  // Deterministic hierarchical layout for workflow mode: parent sessions as
  // roots, workflows in a row beneath each, child agents in a grid beneath an
  // expanded workflow. Ordered by started_at then id; no overlap.
  const workflowPos = useMemo(() => {
    if (effectiveMode !== 'workflow') return null;
    const pos = {};
    const visible = new Set(filteredNodeIds);
    const sessionsList = filteredNodeIds.filter(id => nodeData[id].node_type === 'session');
    const wfBySession = {};
    filteredNodeIds.forEach(id => {
      const nn = nodeData[id];
      if (nn.node_type === 'workflow' && visible.has(nn.parent_session_id)) {
        (wfBySession[nn.parent_session_id] ||= []).push(id);
      }
    });
    const agentsByWf = {};
    const subBySession = {};
    filteredNodeIds.forEach(id => {
      const nn = nodeData[id];
      if (nn.node_type === 'workflow_agent') {
        (agentsByWf[nn.workflow_run_id] ||= []).push(id);
      } else if (nn.node_type === 'subagent' && visible.has(nn.parent_session_id)) {
        (subBySession[nn.parent_session_id] ||= []).push(id);
      }
    });
    const byStart = (a, b) => {
      const sa = nodeData[a].started_at || 0, sb = nodeData[b].started_at || 0;
      return sa !== sb ? sa - sb : (a < b ? -1 : 1);
    };
    sessionsList.sort(byStart);

    const COL_W = 240, SESS_Y = 0, WF_Y = 90, WF_H = 60, AGENT_W = 70, AGENT_H = 34, AGENT_GAP = 8;
    let colX = 0;
    sessionsList.forEach(sid => {
      const wfs = (wfBySession[sid] || []).sort(byStart);
      // Width this session column needs: max of its own box and its workflows row.
      const wfRowW = Math.max(1, wfs.length) * (COL_W - 20);
      const colWidth = Math.max(COL_W, wfRowW);
      pos[sid] = { x: colX + colWidth / 2, y: SESS_Y, vx: 0, vy: 0 };
      let wx = colX + (colWidth - wfRowW) / 2;
      wfs.forEach(wfid => {
        const cx = wx + (COL_W - 20) / 2;
        pos[wfid] = { x: cx, y: WF_Y, vx: 0, vy: 0 };
        const agents = (agentsByWf[nodeData[wfid].full_id] || agentsByWf[wfid] || []).slice().sort(byStart);
        if (agents.length) {
          // Grid the agents below the workflow node.
          const perRow = Math.max(1, Math.min(agents.length, Math.ceil(Math.sqrt(agents.length))));
          const gridW = perRow * (AGENT_W + AGENT_GAP);
          agents.forEach((aid, i) => {
            const r = Math.floor(i / perRow), c = i % perRow;
            pos[aid] = {
              x: cx - gridW / 2 + AGENT_W / 2 + c * (AGENT_W + AGENT_GAP),
              y: WF_Y + WF_H + 10 + r * (AGENT_H + AGENT_GAP),
              vx: 0, vy: 0,
            };
          });
        }
        wx += COL_W - 20;
      });
      // Subagents the session spawned directly: a grid below the workflow row
      // (or below the session node when there are no workflows).
      const subs = (subBySession[sid] || []).slice().sort(byStart);
      if (subs.length) {
        const baseY = wfs.length ? WF_Y + WF_H + 60 : SESS_Y + 70;
        const perRow = Math.max(1, Math.min(subs.length, Math.ceil(Math.sqrt(subs.length))));
        const gridW = perRow * (AGENT_W + AGENT_GAP);
        const cx = colX + colWidth / 2;
        subs.forEach((aid, i) => {
          const r = Math.floor(i / perRow), c = i % perRow;
          pos[aid] = {
            x: cx - gridW / 2 + AGENT_W / 2 + c * (AGENT_W + AGENT_GAP),
            y: baseY + r * (AGENT_H + AGENT_GAP),
            vx: 0, vy: 0,
          };
        });
      }
      colX += colWidth + 40;
    });
    return pos;
  }, [effectiveMode, filteredNodeIds, nodeData, expandedWorkflows]);

  // Force-directed layout: initialize from workspace clusters, then simulate.
  const forcePos = useMemo(() => {
    const pos = {};
    const wsKeys = Object.keys(wsGroups);
    const n = filteredNodeIds.length;
    if (n === 0) return pos;

    // Scale layout area based on node count.
    const area = Math.max(600, Math.sqrt(n) * 120);
    const cx = area / 2, cy = area / 2;
    const clusterRadius = wsKeys.length <= 1 ? 0 : Math.min(area * 0.35, 80 + wsKeys.length * 25);

    // Initialize positions from workspace-clustered arrangement.
    wsKeys.forEach((ws, gi) => {
      const group = wsGroups[ws];
      const clusterAngle = wsKeys.length <= 1 ? 0 : (2 * Math.PI * gi) / wsKeys.length - Math.PI / 2;
      const gcx = cx + clusterRadius * Math.cos(clusterAngle);
      const gcy = cy + clusterRadius * Math.sin(clusterAngle);
      if (group.length === 1) {
        pos[group[0]] = { x: gcx, y: gcy, vx: 0, vy: 0 };
      } else {
        const subR = Math.min(80, 20 + group.length * 10);
        group.forEach((id, ni) => {
          const a = (2 * Math.PI * ni) / group.length - Math.PI / 2;
          pos[id] = { x: gcx + subR * Math.cos(a), y: gcy + subR * Math.sin(a), vx: 0, vy: 0 };
        });
      }
    });

    // Workspace centroids for gravity.
    const wsCentroid = {};
    wsKeys.forEach(ws => {
      const group = wsGroups[ws];
      let sx = 0, sy = 0;
      group.forEach(id => { if (pos[id]) { sx += pos[id].x; sy += pos[id].y; } });
      wsCentroid[ws] = { x: sx / group.length, y: sy / group.length };
    });

    // Force simulation: 80 iterations.
    const ids = Object.keys(pos);
    const repulseK = 5000;  // Repulsion constant.
    const attractK = 0.01;  // Spring constant.
    const gravityK = 0.005; // Workspace gravity.
    const damping = 0.9;

    for (let iter = 0; iter < 80; iter++) {
      const alpha = 1 - iter / 80; // Cooling.

      // Repulsion: all pairs push apart.
      for (let i = 0; i < ids.length; i++) {
        for (let j = i + 1; j < ids.length; j++) {
          const a = pos[ids[i]], b = pos[ids[j]];
          let dx = b.x - a.x, dy = b.y - a.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 1) { dx = Math.random() - 0.5; dy = Math.random() - 0.5; dist = 1; }
          const force = repulseK / (dist * dist) * alpha;
          const fx = (dx / dist) * force, fy = (dy / dist) * force;
          a.vx -= fx; a.vy -= fy;
          b.vx += fx; b.vy += fy;
        }
      }

      // Attraction: connected nodes pull together.
      visibleLinks.forEach(l => {
        const a = pos[l.source], b = pos[l.target];
        if (!a || !b) return;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) return;
        // Target distance based on whether same workspace.
        const nA = nodeData[l.source], nB = nodeData[l.target];
        const sameWs = nA && nB && nA.workspace && nA.workspace === nB.workspace;
        const ideal = sameWs ? 80 : 160;
        const force = attractK * (dist - ideal) * alpha;
        const fx = (dx / dist) * force, fy = (dy / dist) * force;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      });

      // Workspace gravity: light pull toward cluster centroid.
      wsKeys.forEach(ws => {
        const c = wsCentroid[ws];
        wsGroups[ws].forEach(id => {
          const p = pos[id];
          if (!p) return;
          p.vx += (c.x - p.x) * gravityK * alpha;
          p.vy += (c.y - p.y) * gravityK * alpha;
        });
      });

      // Apply velocities with damping.
      ids.forEach(id => {
        const p = pos[id];
        p.vx *= damping;
        p.vy *= damping;
        // Clamp velocity.
        const maxV = 20;
        const v = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (v > maxV) { p.vx = (p.vx / v) * maxV; p.vy = (p.vy / v) * maxV; }
        p.x += p.vx;
        p.y += p.vy;
      });
    }

    return pos;
  }, [filteredNodeIds, wsGroups, visibleLinks, nodeData]);

  // Active positions: deterministic workflow layout, else the force layout.
  const nodePos = workflowPos || forcePos;

  // Dynamic viewBox from node positions.
  const viewBox = useMemo(() => {
    const ids = Object.keys(nodePos);
    if (ids.length === 0) return { x: 0, y: 0, w: 800, h: 540 };
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    ids.forEach(id => {
      const p = nodePos[id];
      const w2 = nodeWidth(id) / 2 + 20;
      const h2 = nodeHeight(id) / 2 + 20;
      if (p.x - w2 < minX) minX = p.x - w2;
      if (p.y - h2 < minY) minY = p.y - h2;
      if (p.x + w2 > maxX) maxX = p.x + w2;
      if (p.y + h2 > maxY) maxY = p.y + h2;
    });
    const pad = 40;
    return { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
  }, [nodePos, filteredNodeIds, nodeData, nodeLinkCount]);

  // Compute workspace regions from final positions for group outlines.
  const wsRegions = useMemo(() => {
    const regions = [];
    const wsKeys = Object.keys(wsGroups);
    wsKeys.forEach(ws => {
      const group = wsGroups[ws];
      let sx = 0, sy = 0, count = 0;
      let maxR = 0;
      group.forEach(id => {
        const p = nodePos[id];
        if (p) { sx += p.x; sy += p.y; count++; }
      });
      if (count === 0) return;
      const cx = sx / count, cy = sy / count;
      group.forEach(id => {
        const p = nodePos[id];
        if (!p) return;
        const d = Math.sqrt((p.x - cx) * (p.x - cx) + (p.y - cy) * (p.y - cy));
        if (d > maxR) maxR = d;
      });
      regions.push({ ws, x: cx, y: cy, r: maxR + 55, nodes: group });
    });
    return regions;
  }, [wsGroups, nodePos]);

  // Edge pair grouping for parallel edge offset.
  const edgePairIndex = useMemo(() => {
    const pairCount = {};
    const pairSeen = {};
    visibleLinks.forEach(l => {
      const key = [l.source, l.target].sort().join(':');
      pairCount[key] = (pairCount[key] || 0) + 1;
    });
    const result = [];
    visibleLinks.forEach(l => {
      const key = [l.source, l.target].sort().join(':');
      const total = pairCount[key] || 1;
      const idx = pairSeen[key] || 0;
      pairSeen[key] = idx + 1;
      result.push({ idx, total });
    });
    return result;
  }, [visibleLinks]);

  // Node label: workflow name / agent name for workflow nodes, else short ID + project.
  function nodeLabel(id) {
    const n = nodeData[id];
    if (!n) return id.slice(0, 8);
    if (n.node_type === 'workflow') return n.name || id;
    if (n.node_type === 'workflow_agent') return n.title || n.name || id;
    if (n.node_type === 'subagent') return n.name || n.title || id.slice(0, 8);
    if (n.workspace) return id.slice(0, 8) + ' ' + shortProject(n.workspace);
    return id.slice(0, 8);
  }

  // Node sub-info: workflow status/agent count for workflow nodes, else stats.
  function nodeInfo(id) {
    const n = nodeData[id];
    if (!n) return '';
    if (n.node_type === 'workflow') {
      const parts = [];
      if (n.status) parts.push(n.status);
      parts.push((n.agent_count || 0) + ' agents');
      if (n.journal_event_count) parts.push(n.journal_event_count + ' events');
      return parts.join(' · ');
    }
    if (n.node_type === 'workflow_agent') return n.status || '';
    if (n.node_type === 'subagent') return n.status || 'subagent';
    const parts = [];
    if (n.tool_calls) parts.push(n.tool_calls + ' tools');
    if (n.turns) parts.push(n.turns + ' turns');
    if (n.node_type === 'session' && n.workflow_count) parts.push(n.workflow_count + ' wf');
    if (n.started_at) {
      // started_at may be unix seconds (number) or RFC3339 string.
      const ts = typeof n.started_at === 'number' ? new Date(n.started_at * 1000).toISOString() : n.started_at;
      parts.push(relTime(ts));
    }
    return parts.join(' · ');
  }

  function isActive(id) {
    const n = nodeData[id];
    if (!n) return false;
    return !!n.is_active;
  }

  // Node box size scales with label and link count. Workflow nodes are wider;
  // child agents are compact.
  function nodeWidth(id) {
    const n = nodeData[id];
    const label = nodeLabel(id);
    if (n && n.node_type === 'workflow_agent') return 70;
    if (n && n.node_type === 'subagent') return Math.max(80, label.length * 6.5 + 16);
    const min = n && n.node_type === 'workflow' ? 150 : 70;
    const base = Math.max(min, label.length * 6.5 + 16);
    const links = nodeLinkCount[id] || 0;
    return base + Math.min(links * 3, 24);
  }
  function nodeHeight(id) {
    const n = nodeData[id];
    if (n && n.node_type === 'workflow_agent') return 30;
    const info = nodeInfo(id);
    return info ? 36 : 24;
  }

  // Hovered node for edge highlighting.
  const [hoveredNode, setHoveredNode] = useState(null);

  function onNodeEnter(id, e) {
    const n = nodeData[id];
    if (!n) return;
    setHoveredNode(id);
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    setTooltip({
      id,
      x: e.clientX - rect.left + 12,
      y: e.clientY - rect.top - 8,
    });
  }
  function onNodeLeave() { setTooltip(null); setHoveredNode(null); }

  // Node click → workflow nodes toggle their child agents; session/agent nodes
  // navigate to search.
  function onNodeClick(id) {
    if (didDrag.current) return;
    const n = nodeData[id];
    if (n && n.node_type === 'workflow') {
      toggleWorkflow(n.full_id || id);
      return;
    }
    if (n && n.node_type === 'workflow_agent') {
      if (onNavigate) onNavigate('search', { q: n.parent_session_id || id });
      return;
    }
    if (n && n.node_type === 'subagent') {
      // The subagent id is the spawned session's own id; search for it.
      if (onNavigate) onNavigate('search', { q: id });
      return;
    }
    if (onNavigate) onNavigate('search', { q: id });
  }

  // Edge tooltip state.
  const [edgeTooltip, setEdgeTooltip] = useState(null);  // {link, x, y}

  function onEdgeEnter(link, e) {
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    setEdgeTooltip({
      link,
      x: e.clientX - rect.left + 12,
      y: e.clientY - rect.top - 8,
    });
  }
  function onEdgeLeave() { setEdgeTooltip(null); }

  // Format scrubber time display.
  const scrubberLabel = new Date(cutoffTime).toLocaleString(undefined, {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
  });

  const timePresets = [
    { label: '1h', value: '1h' }, { label: '24h', value: '24h' },
    { label: '7d', value: '168h' }, { label: '30d', value: '720h' },
  ];

  return html`
    <div class="graph-panel">
      <div class="filters" style="margin-bottom:4px">
        <input class="filter-input" placeholder="search graph..." value=${graphQuery}
          onInput=${e => setGraphQuery(e.target.value)} style="width:180px" />
        <div class="filter-chips">
          ${timePresets.map(t => html`
            <button class="filter-chip ${since === t.value ? 'active' : ''}"
              onClick=${() => setSince(t.value)}>${t.label}</button>
          `)}
        </div>
        <button class="btn btn-sm" onClick=${load}>refresh</button>
      </div>
      <div class="filters" style="margin-bottom:4px">
        <span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">layout</span>
        <div class="filter-chips">
          ${[
            { v: 'workflow', label: 'workflow' },
            { v: 'sessions', label: 'sessions' },
            { v: 'teams', label: 'teams' },
            { v: 'network', label: 'network' },
          ].map(m => html`
            <button class="filter-chip ${effectiveMode === m.v ? 'active' : ''}"
              onClick=${() => selectMode(m.v)}
              title=${m.v === 'network' ? 'force-directed (debug)' : ''}>${m.label}</button>
          `)}
        </div>
        ${effectiveMode === 'workflow' && hasWorkflows && html`
          <button class="filter-chip" style="margin-left:8px"
            onClick=${() => {
              const allWf = Object.values(nodeData).filter(x => x.node_type === 'workflow');
              const anyCollapsed = allWf.some(x => !isExpanded(x.full_id || x.id));
              const next = {};
              if (anyCollapsed) allWf.forEach(x => { next[x.full_id || x.id] = true; });
              setExpandedWorkflows(next);
            }}>expand/collapse all</button>
        `}
      </div>
      ${workspaces.length > 1 && html`
        <div class="filters" style="margin-bottom:4px">
          <span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">workspace</span>
          <div class="filter-chips">
            <button class="filter-chip ${wsFilter === '' ? 'active' : ''}"
              onClick=${() => setWsFilter('')}>all</button>
            ${workspaces.map(ws => html`
              <button class="filter-chip ${wsFilter === ws ? 'active' : ''}"
                onClick=${() => setWsFilter(wsFilter === ws ? '' : ws)}
                title=${ws}>${shortProject(ws)}</button>
            `)}
          </div>
        </div>
      `}
      <div class="filters" style="margin-bottom:4px">
        <span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">edges</span>
        <div class="filter-chips">
          <button class="filter-chip ${edgeFilter.message ? 'active' : ''}"
            onClick=${() => setEdgeFilter(f => ({ ...f, message: !f.message }))}>
            <span style="color:var(--accent)">—</span> it2 msg</button>
          <button class="filter-chip ${edgeFilter.observation ? 'active' : ''}"
            onClick=${() => setEdgeFilter(f => ({ ...f, observation: !f.observation }))}>
            <span style="color:var(--faint)">--</span> observe</button>
          <button class="filter-chip ${edgeFilter.split ? 'active' : ''}"
            onClick=${() => setEdgeFilter(f => ({ ...f, split: !f.split }))}>
            <span style="color:var(--green)">··</span> split</button>
          <button class="filter-chip ${edgeFilter.team ? 'active' : ''}"
            onClick=${() => setEdgeFilter(f => ({ ...f, team: !f.team }))}>
            <span style="color:var(--magenta)">—</span> team msg <span style="color:var(--magenta);opacity:0.7">··</span> spawn</button>
          ${hasWorkflows && html`
            <button class="filter-chip ${edgeFilter.workflow ? 'active' : ''}"
              onClick=${() => setEdgeFilter(f => ({ ...f, workflow: !f.workflow }))}>
              <span style="color:var(--accent)">—</span> workflow <span style="color:var(--cyan);opacity:0.8">··</span> spawn</button>
          `}
        </div>
        <button class="filter-chip ${activeOnly ? 'active' : ''}"
          onClick=${() => setActiveOnly(a => !a)} style="margin-left:8px">
          <span style="color:var(--green)">●</span> active only</button>
      </div>
      <div class="graph-container" onWheel=${onWheel} ref=${containerRef}
        onPointerDown=${onPointerDown} onPointerMove=${onPointerMove} onPointerUp=${onPointerUp}
        style=${"position:relative" + (dragging ? ";cursor:grabbing" : ";cursor:grab")}>
        <div class="graph-inner" style="transform:translate(${panOffset.x}px,${panOffset.y}px) scale(${zoom});transform-origin:0 0">
          <svg viewBox="${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="arrowMsg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--accent)" />
              </marker>
              <marker id="arrowObs" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--faint)" />
              </marker>
              <marker id="arrowSplit" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--green)" />
              </marker>
              <marker id="arrowTeam" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <path d="M0,0 L8,3 L0,6" fill="var(--magenta)" />
              </marker>
            </defs>
            ${effectiveMode !== 'workflow' && wsRegions.length > 1 && wsRegions.map((r, i) => html`
              <g key=${'ws' + i} class="graph-ws-group">
                <rect x=${r.x - r.r} y=${r.y - r.r} width=${r.r * 2} height=${r.r * 2}
                  rx="4" fill="none" stroke="var(--border)" stroke-width="1" stroke-dasharray="4,4" />
                <text x=${r.x} y=${r.y - r.r + 12} text-anchor="middle"
                  font-size="9" fill="var(--faint)" font-family="var(--mono)">${shortProject(r.ws)}</text>
              </g>
            `)}
            ${effectiveMode !== 'workflow' && Object.entries(teamGroups).map(([tn, ids]) => {
              if (ids.length < 2) return null;
              // Compute bounding box of team nodes + padding.
              let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
              ids.forEach(id => {
                const p = nodePos[id];
                if (!p) return;
                const w2 = nodeWidth(id) / 2 + 8;
                const h2 = nodeHeight(id) / 2 + 8;
                if (p.x - w2 < minX) minX = p.x - w2;
                if (p.y - h2 < minY) minY = p.y - h2;
                if (p.x + w2 > maxX) maxX = p.x + w2;
                if (p.y + h2 > maxY) maxY = p.y + h2;
              });
              if (!isFinite(minX)) return null;
              const pad = 12;
              return html`
                <g key=${'tm-' + tn} class="graph-team-group">
                  <rect x=${minX - pad} y=${minY - pad} width=${maxX - minX + pad * 2} height=${maxY - minY + pad * 2}
                    rx="3" fill="none" stroke="var(--magenta)" stroke-width="1" stroke-dasharray="6,3" opacity="0.6" />
                  <text x=${(minX + maxX) / 2} y=${minY - pad + 10} text-anchor="middle"
                    font-size="9" fill="var(--magenta)" font-family="var(--mono)" opacity="0.8">${tn}</text>
                </g>
              `;
            })}
            ${visibleLinks.map((l, i) => {
              const src = l.source || '?';
              const dst = l.target || '?';
              const fallback = { x: viewBox.x + viewBox.w / 2, y: viewBox.y + viewBox.h / 2 };
              const p1 = nodePos[src] || fallback;
              const p2 = nodePos[dst] || fallback;
              // Determine edge class and arrow by edge_type, then action/kind.
              const act = l.action || '';
              const kind = l.kind || '';
              const et = l.edge_type || '';
              let cls, marker, dotColor, isObs = false;
              if (et === 'workflow_contains') {
                cls = 'graph-edge-workflow';
                marker = 'url(#arrowMsg)';
                dotColor = 'var(--accent)';
              } else if (et === 'workflow_spawn') {
                cls = 'graph-edge-spawn';
                marker = 'url(#arrowSplit)';
                dotColor = 'var(--cyan)';
              } else if (et === 'subagent_spawn') {
                cls = 'graph-edge-subagent';
                marker = 'url(#arrowSplit)';
                dotColor = 'var(--yellow)';
              } else if (act === 'team-spawn') {
                cls = 'graph-edge-team-spawn';
                marker = 'url(#arrowTeam)';
                dotColor = 'var(--magenta)';
              } else if (kind === 'team' || act === 'team-message') {
                cls = 'graph-edge-team';
                marker = 'url(#arrowTeam)';
                dotColor = 'var(--magenta)';
              } else if (act === 'get-screen' || act === 'get-buffer') {
                cls = 'graph-edge-obs';
                marker = 'url(#arrowObs)';
                dotColor = 'var(--faint)';
                isObs = true;
              } else if (act === 'split') {
                cls = 'graph-edge-split';
                marker = 'url(#arrowSplit)';
                dotColor = 'var(--green)';
              } else {
                cls = 'graph-edge-msg';
                marker = 'url(#arrowMsg)';
                dotColor = 'var(--accent)';
              }
              if (newLinkIndices.has(i)) cls += ' graph-edge-new';
              // Edge highlighting: boost connected edges, dim others when a node is hovered.
              const isConnected = hoveredNode && (src === hoveredNode || dst === hoveredNode);
              if (hoveredNode) cls += isConnected ? ' graph-edge-highlight' : ' graph-edge-dimmed';
              const mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2;
              const dx = p2.x - p1.x, dy = p2.y - p1.y;
              const len = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
              // Adaptive curve: offset based on edge pair index for parallel edges.
              const pair = edgePairIndex[i] || { idx: 0, total: 1 };
              const baseOffset = Math.min(30, len * 0.15);
              const spread = pair.total > 1 ? (pair.idx - (pair.total - 1) / 2) * 12 : 0;
              const offset = baseOffset + spread;
              const cpx = mx - dy * offset / len, cpy = my + dx * offset / len;
              const pathId = 'lp' + i;
              const opacity = isObs && !isConnected ? 0.35 : undefined;
              return html`
                <g key=${i}
                  onMouseEnter=${(e) => onEdgeEnter(l, e)} onMouseLeave=${onEdgeLeave}>
                  <path d="M${p1.x},${p1.y} Q${cpx},${cpy} ${p2.x},${p2.y}"
                    stroke="transparent" stroke-width="12" fill="none" style="cursor:pointer" />
                  <path id=${pathId} d="M${p1.x},${p1.y} Q${cpx},${cpy} ${p2.x},${p2.y}"
                    class=${cls} marker-end=${marker} opacity=${opacity} pointer-events="none" />
                  ${newLinkIndices.has(i) && html`
                    <circle r="3" fill=${dotColor}>
                      <animateMotion dur="0.8s" fill="freeze" begin="0s">
                        <mpath href=${'#' + pathId} />
                      </animateMotion>
                    </circle>
                  `}
                </g>
              `;
            })}
            ${filteredNodeIds.map(n => {
              const p = nodePos[n];
              if (!p) return null;
              const nn = nodeData[n];
              const nt = nn && nn.node_type;
              const w = nodeWidth(n);
              const h = nodeHeight(n);
              const label = nodeLabel(n);
              const info = nodeInfo(n);
              const active = isActive(n);
              const typeCls = nt === 'workflow' ? 'node-workflow'
                : nt === 'workflow_agent' ? 'node-workflow-agent'
                : nt === 'subagent' ? 'node-subagent'
                : nt === 'session' ? 'node-session' : '';
              const statusCls = (nt === 'workflow' || nt === 'subagent') && nn.status ? 'node-status-' + nn.status : '';
              const isWf = nt === 'workflow';
              const expanded = isWf && isExpanded(nn.full_id || n);
              const showDot = active || (isWf && nn.status) || (nt === 'subagent' && nn.status);
              return html`
                <g class="graph-node ${typeCls} ${statusCls} ${n.includes('@') && !nt ? 'team-agent' : ''} ${active ? 'active' : ''} ${hoveredNode === n ? 'hovered' : ''}" transform="translate(${p.x - w/2},${p.y - h/2})" key=${n}
                  onMouseEnter=${(e) => onNodeEnter(n, e)} onMouseLeave=${onNodeLeave}
                  onClick=${() => onNodeClick(n)} style="cursor:pointer">
                  <rect width=${w} height=${h} />
                  ${showDot && html`<circle class="node-dot" cx="6" cy="6" r="3" />`}
                  <text x=${w/2} y=${info ? 12 : 15} text-anchor="middle" font-size="9">${label}</text>
                  ${info && html`<text class="node-info" x=${w/2} y="24" text-anchor="middle">${info}</text>`}
                  ${isWf && (nn.agent_count > 0) && html`
                    <text x=${w - 9} y=${h - 6} text-anchor="middle" font-size="10" fill="var(--dim)">${expanded ? '−' : '+'}</text>
                  `}
                </g>
              `;
            })}
          </svg>
        </div>
        ${html`<${GraphTooltip} tooltip=${tooltip} edgeTooltip=${edgeTooltip} nodeData=${nodeData}
          onNavigate=${onNavigate} isExpanded=${isExpanded} isActive=${isActive} />`}
        <div class="graph-zoom">
          <button onClick=${() => setZoom(z => Math.min(3, z + 0.2))}>+</button>
          <button onClick=${resetView} title="Reset zoom and pan">1:1</button>
          <button onClick=${() => setZoom(z => Math.max(0.3, z - 0.2))}>-</button>
          <button onClick=${fitView} title="Fit all nodes" style="margin-left:2px;font-size:10px">fit</button>
        </div>
      </div>
      <div class="graph-legend">
        ${effectiveMode === 'workflow' ? html`
          <span class="graph-legend-item"><span class="graph-legend-node node-session"></span>session</span>
          <span class="graph-legend-item"><span class="graph-legend-node node-workflow"></span>workflow</span>
          <span class="graph-legend-item"><span class="graph-legend-node node-workflow-agent"></span>agent</span>
          <span class="graph-legend-item"><span class="graph-legend-node node-subagent"></span>subagent</span>
          <span class="graph-legend-sep"></span>
          <span class="graph-legend-item"><span class="graph-legend-line" style="background:var(--accent)"></span>contains</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--cyan)"></span>spawn</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--yellow)"></span>subagent</span>
          <span class="graph-legend-sep"></span>
          <span class="graph-legend-item"><span class="graph-legend-dot" style="background:var(--green)"></span>completed</span>
          <span class="graph-legend-item"><span class="graph-legend-dot" style="background:var(--cyan)"></span>running</span>
          <span class="graph-legend-item"><span class="graph-legend-dot" style="background:var(--yellow)"></span>async</span>
        ` : html`
          <span class="graph-legend-item"><span class="graph-legend-line" style="background:var(--accent)"></span>it2 msg</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--faint)"></span>observe</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--green)"></span>split</span>
          <span class="graph-legend-item"><span class="graph-legend-line" style="background:var(--magenta)"></span>team msg</span>
          <span class="graph-legend-item"><span class="graph-legend-line dashed" style="background:var(--magenta)"></span>team spawn</span>
        `}
      </div>
      <div class="graph-scrubber">
        <button class="graph-play-btn ${playing ? 'active' : ''}"
          onClick=${() => setPlaying(p => !p)}>${playing ? '||' : '>'}</button>
        <input type="range" min="0" max="1000" value=${Math.round(scrubberPos * 1000)}
          onInput=${e => { setScrubberPos(parseInt(e.target.value) / 1000); setPlaying(false); }} />
        <span class="graph-scrubber-time">${scrubberLabel}</span>
      </div>
      <div class="graph-status">
        <span>${filteredNodeIds.length}${filteredNodeIds.length !== allNodeIds.length ? '/' + allNodeIds.length : ''} nodes, ${visibleLinks.length}/${allLinks.length} links</span>
        ${scrubberPos < 1 && html`<span style="color:var(--yellow)">timeline: ${scrubberLabel}</span>`}
      </div>
    </div>
  `;
}

// --- Teams Panel ---

const MEMBER_COLORS = {
  blue: 'var(--cyan)', green: 'var(--green)', yellow: 'var(--yellow)',
  red: 'var(--danger)', purple: 'var(--magenta)', orange: 'var(--orange)',
};

function memberColor(m) {
  return MEMBER_COLORS[m.color] || 'var(--accent)';
}

function TeamsPanel({ urlParams, updateParams, navVersion }) {
  const [teams, setTeams] = useState([]);
  const [loading, setLoading] = useState(true);
  const [selectedName, setSelectedNameRaw] = useState(urlParams.name || '');
  const [detail, setDetail] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [teamSearch, setTeamSearch] = useState('');
  const [teamSearchResults, setTeamSearchResults] = useState(null);
  const [teamSearchLoading, setTeamSearchLoading] = useState(false);

  function setSelectedName(v) { setSelectedNameRaw(v); updateParams(v ? { name: v } : {}); setTeamSearch(''); setTeamSearchResults(null); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSelectedNameRaw(urlParams.name || '');
  }, [navVersion]);

  const load = useCallback(async (soft) => {
    if (!soft) setLoading(true);
    try {
      const t = await api('teams');
      setTeams(Array.isArray(t) ? t : []);
    } catch (e) { console.error('teams:', e); }
    if (!soft) setLoading(false);
  }, []);

  useEffect(() => { load(false); }, [load]);
  useEffect(() => {
    const softRefresh = () => load(true);
    window.addEventListener('cass:refresh', softRefresh);
    return () => window.removeEventListener('cass:refresh', softRefresh);
  }, [load]);

  // Load detail when team selected.
  useEffect(() => {
    if (!selectedName) { setDetail(null); return; }
    setDetailLoading(true);
    api('teams/' + encodeURIComponent(selectedName)).then(d => {
      setDetail(d);
    }).catch(e => {
      console.error('team detail:', e);
      setDetail(null);
    }).finally(() => setDetailLoading(false));
  }, [selectedName]);

  // SSE: reload on team_message events.
  useEffect(() => {
    function handler(e) {
      if (selectedName) {
        api('teams/' + encodeURIComponent(selectedName)).then(d => setDetail(d)).catch(() => {});
      }
    }
    window.addEventListener('cass:team_message', handler);
    return () => window.removeEventListener('cass:team_message', handler);
  }, [selectedName]);

  // Debounced search within team sessions.
  useEffect(() => {
    if (!teamSearch || !selectedName) { setTeamSearchResults(null); return; }
    setTeamSearchLoading(true);
    const id = setTimeout(async () => {
      try {
        const r = await api('search?' + qs({ q: teamSearch, team: selectedName, limit: '50' }));
        setTeamSearchResults(r);
      } catch (e) { console.error('team search:', e); }
      setTeamSearchLoading(false);
    }, 300);
    return () => clearTimeout(id);
  }, [teamSearch, selectedName]);

  if (loading) return html`<div class="loading">loading teams...</div>`;
  if (teams.length === 0) return html`<div class="empty">no agent teams found</div>`;

  // Detail view.
  if (selectedName) {
    const team = teams.find(t => t.name === selectedName);
    if (detailLoading) return html`<div class="loading">loading ${selectedName}...</div>`;
    if (!detail) return html`
      <div>
        <button class="team-detail-back" onClick=${() => setSelectedName('')}>back</button>
        <div class="empty">team not found: ${selectedName}</div>
      </div>
    `;

    const config = detail.config || {};
    const members = config.members || (team && team.members) || [];
    const lead = config.leadAgentId || (team && team.lead) || '';

    // Sessions to display: search results if searching, otherwise detail.sessions.
    const displaySessions = teamSearch && teamSearchResults
      ? (teamSearchResults.hits || [])
      : (detail.sessions && detail.sessions.hits ? detail.sessions.hits : detail.sessions || []);
    const sessionCount = teamSearch && teamSearchResults
      ? (teamSearchResults.total_count || 0)
      : (detail.sessions && detail.sessions.total_count != null ? detail.sessions.total_count : (detail.sessions || []).length);

    return html`
      <div>
        <div class="team-detail-header">
          <button class="team-detail-back" onClick=${() => setSelectedName('')}>back</button>
          <span class="team-detail-name">${selectedName}</span>
          <span class="team-detail-desc">${config.description || ''}</span>
        </div>
        <div class="team-detail-body">
          <div>
            <${TopologySVG} members=${members} lead=${lead} />
            <div class="team-sessions">
              <div class="team-search-bar">
                <input class="team-search-input" type="text"
                  placeholder="search in team..."
                  value=${teamSearch}
                  onInput=${e => setTeamSearch(e.target.value)}
                  onKeyDown=${e => { if (e.key === 'Escape') { setTeamSearch(''); e.target.blur(); } }} />
                ${teamSearch && html`<span class="detail-search-count">${teamSearchLoading ? '...' : sessionCount + ' hits'}</span>`}
              </div>
              <div class="stat-label">${sessionCount} session${sessionCount !== 1 ? 's' : ''}</div>
              ${displaySessions.map(s => html`
                <div class="team-session-item" key=${s.session_id}>
                  <div style="font-weight:600">${s.title ? s.title.slice(0, 60) : 'Untitled'}</div>
                  <div style="font-size:11px;color:var(--dim)">${s.agent_name || ''} ${s.started_at ? relTime(s.started_at) : ''}</div>
                  ${teamSearch && s.snippet && html`<div class="team-session-snippet">${s.snippet}</div>`}
                </div>
              `)}
              ${displaySessions.length === 0 && !teamSearchLoading && html`<div class="empty" style="padding:8px">no matches</div>`}
            </div>
          </div>
          <${InboxViewer} teamName=${selectedName} inboxes=${detail.inboxes || {}} members=${members} />
        </div>
      </div>
    `;
  }

  // List view.
  return html`
    <div>
      <div class="teams-list">
        ${teams.map(t => html`
          <div class="team-card" key=${t.name} onClick=${() => setSelectedName(t.name)}>
            <div class="team-card-header">
              <span class="team-card-name">${t.name}</span>
              <span class="team-card-count">${t.member_count} member${t.member_count !== 1 ? 's' : ''}</span>
            </div>
            ${t.description && html`<div class="team-card-desc">${t.description}</div>`}
            <div class="team-card-members">
              ${(t.members || []).map(m => html`
                <span class="team-member ${m.is_active ? 'active' : ''}" key=${m.name}>
                  <span class="team-member-dot" style="background:${memberColor(m)}"></span>
                  <span class="team-member-name">${m.name}</span>
                  ${m.agent_type && m.agent_type !== m.name && html`<span class="team-member-role">${m.agent_type}</span>`}
                </span>
              `)}
            </div>
          </div>
        `)}
      </div>
    </div>
  `;
}

// --- Topology SVG ---

function TopologySVG({ members, lead }) {
  if (!members || members.length === 0) return html`<div class="team-topology"><div class="empty">no members</div></div>`;

  const leadName = (lead || '').split('@')[0];
  const leadMember = members.find(m => m.name === leadName);
  const others = members.filter(m => m.name !== leadName);

  const w = 260, h = 40 + others.length * 50 + 40;
  const cx = w / 2;
  const leadY = 30;
  const startY = 80;
  const spacing = 50;

  return html`
    <div class="team-topology">
      <svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
        ${others.map((m, i) => {
          const my = startY + i * spacing;
          return html`<line key=${'l' + i} class="team-topo-link" x1=${cx} y1=${leadY + 10} x2=${cx} y2=${my - 10} />`;
        })}
        ${leadMember && html`
          <g class="team-topo-node" transform="translate(${cx}, ${leadY})">
            <circle r="10" fill="${memberColor(leadMember)}" opacity="0.8" />
            <text class="topo-label" x="16" y="4">${leadMember.name}</text>
            <text class="topo-role" x="16" y="14">lead · ${leadMember.model || ''}</text>
          </g>
        `}
        ${others.map((m, i) => {
          const my = startY + i * spacing;
          return html`
            <g class="team-topo-node" key=${m.name} transform="translate(${cx}, ${my})">
              <circle r="8" fill="${memberColor(m)}" opacity="0.8" />
              <text class="topo-label" x="14" y="4">${m.name}</text>
              <text class="topo-role" x="14" y="14">${m.agentType || m.agent_type || ''} · ${m.model || ''}</text>
            </g>
          `;
        })}
      </svg>
    </div>
  `;
}

// --- Inbox Viewer ---

function InboxViewer({ teamName, inboxes, members }) {
  const agentNames = Object.keys(inboxes || {}).sort();
  const [selectedAgent, setSelectedAgent] = useState(agentNames[0] || '');
  const [msgText, setMsgText] = useState('');
  const [sending, setSending] = useState(false);
  const msgsRef = useRef(null);

  // Reset agent selection when team changes.
  useEffect(() => {
    const names = Object.keys(inboxes || {}).sort();
    if (names.length > 0 && !names.includes(selectedAgent)) {
      setSelectedAgent(names[0]);
    }
  }, [inboxes]);

  const messages = (inboxes && inboxes[selectedAgent]) || [];

  // Auto-scroll to bottom on new messages.
  useEffect(() => {
    if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight;
  }, [messages.length, selectedAgent]);

  async function send() {
    if (!msgText.trim() || sending) return;
    setSending(true);
    try {
      await fetch('api/teams/' + encodeURIComponent(teamName) + '/inbox/' + encodeURIComponent(selectedAgent), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ from: 'web-ui', text: msgText.trim() }),
      });
      setMsgText('');
    } catch (e) { console.error('send:', e); }
    setSending(false);
  }

  function renderMessage(msg, idx) {
    // Detect structured message type from text patterns.
    let msgType = '';
    let subject = '';
    if (msg.text) {
      if (msg.text.includes('idle_notification') || msg.text.includes('idle notification') || msg.text.includes("I'm idle") || msg.text.includes("ready for work")) {
        msgType = 'idle_notification';
      } else if (msg.text.includes('TASK:') || msg.text.includes('task_assignment') || msg.text.includes('Task:')) {
        msgType = 'task_assignment';
        const m = msg.text.match(/(?:TASK:|Task:)\s*(.+?)(?:\n|$)/);
        if (m) subject = m[1];
      } else if (msg.text.includes('shutdown') || msg.text.includes('SHUTDOWN')) {
        msgType = 'shutdown_request';
      } else if (msg.text.includes('permission') || msg.text.includes('Permission')) {
        msgType = 'permission_request';
      }
    }

    const cls = 'inbox-msg' + (msgType ? ' msg-' + msgType : '');

    return html`
      <div class=${cls} key=${idx}>
        <div>
          <span class="inbox-msg-from">${msg.from || 'unknown'}</span>
          ${msg.timestamp && html`<span class="inbox-msg-time">${relTime(msg.timestamp)}</span>`}
        </div>
        ${msgType === 'task_assignment' && subject && html`<div class="msg-subject">${subject}</div>`}
        ${msgType && html`<span class="msg-badge">${msgType.replace(/_/g, ' ')}</span>`}
        <div class="inbox-msg-text">${(msg.text || '').slice(0, 2000)}</div>
      </div>
    `;
  }

  return html`
    <div class="inbox-container">
      <div class="inbox-header">
        <span>inbox</span>
        <select class="inbox-select" value=${selectedAgent} onChange=${e => setSelectedAgent(e.target.value)}>
          ${agentNames.map(a => html`<option value=${a} key=${a}>${a} (${(inboxes[a] || []).length})</option>`)}
        </select>
      </div>
      <div class="inbox-messages" ref=${msgsRef}>
        ${messages.length === 0 && html`<div class="empty" style="padding:16px">no messages</div>`}
        ${messages.map(renderMessage)}
      </div>
      <div class="inbox-compose">
        <input placeholder="send message to ${selectedAgent}..." value=${msgText}
          onInput=${e => setMsgText(e.target.value)}
          onKeyDown=${e => { if (e.key === 'Enter') send(); }} />
        <button onClick=${send} disabled=${sending}>${sending ? '...' : 'send'}</button>
      </div>
    </div>
  `;
}

// --- Map Panel ---

function MapPanel({ urlParams, updateParams, navVersion }) {
  const [filter, setFilterRaw] = useState(urlParams.filter || '');
  const [mappings, setMappings] = useState([]);
  const [loading, setLoading] = useState(true);
  const [sortCol, setSortCol] = useState('');
  const [sortDir, setSortDir] = useState('asc');

  function setFilter(v) { setFilterRaw(v); updateParams({ filter: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setFilterRaw(urlParams.filter || '');
  }, [navVersion]);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const m = await api('mappings?' + qs({ filter }));
      setMappings(m || []);
    } catch (e) { console.error('mappings:', e); }
    setLoading(false);
  }, [filter]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);
  }, [load]);

  function toggleSort(col) {
    if (sortCol === col) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortCol(col); setSortDir('asc'); }
  }

  const sorted = useMemo(() => {
    if (!sortCol || mappings.length === 0) return mappings;
    return [...mappings].sort((a, b) => {
      const va = a[sortCol] || '', vb = b[sortCol] || '';
      const cmp = typeof va === 'number' ? va - vb : String(va).localeCompare(String(vb));
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }, [mappings, sortCol, sortDir]);

  const columns = [
    { key: 'iterm_session', label: 'iTerm2' },
    { key: 'cass_session', label: 'CASS' },
    { key: 'workspace', label: 'Project' },
    { key: 'title', label: 'Title' },
  ];

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
        <input class="filter-input" placeholder="filter..." value=${filter}
          onInput=${e => setFilter(e.target.value)} style="width:240px" />
      </div>
      ${loading && html`<div class="loading">loading mappings...</div>`}
      ${!loading && mappings.length === 0 && html`<div class="empty">no session mappings found</div>`}
      ${sorted.length > 0 && html`
        <table class="map-table">
          <thead>
            <tr>
              ${columns.map(c => html`
                <th class="${sortCol === c.key ? 'sorted' : ''}" onClick=${() => toggleSort(c.key)}>
                  ${c.label} <span class="sort-arrow">${sortCol === c.key ? (sortDir === 'asc' ? '↑' : '↓') : '↕'}</span>
                </th>
              `)}
            </tr>
          </thead>
          <tbody>
            ${sorted.map(m => html`
              <tr key=${m.iterm_session}>
                <td>${m.iterm_session ? m.iterm_session.slice(0, 8) : ''}</td>
                <td>${m.cass_session ? m.cass_session.slice(0, 8) : ''}</td>
                <td style="color:var(--green)">${shortProject(m.workspace)}</td>
                <td>${m.title && m.title.length > 50 ? m.title.slice(0, 50) + '...' : m.title}</td>
              </tr>
            `)}
          </tbody>
        </table>
        <div class="result-count">${sorted.length} mappings</div>
      `}
    </div>
  `;
}

// --- Usage Panel ---

function fmtTokens(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return '' + n;
}

function fmtResetCountdown(resetAt) {
  if (!resetAt) return '';
  const now = Math.floor(Date.now() / 1000);
  const diff = resetAt - now;
  if (diff <= 0) return 'resetting…';
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  if (h > 0) return 'resets in ' + h + 'h ' + m + 'm';
  return 'resets in ' + m + 'm';
}

function RateLimitGauges({ latestLimits }) {
  if (!latestLimits || latestLimits.length === 0) {
    return html`
      <div class="rl-no-data">
        no rate-limit data — run <code>cass index --har-dir &lt;proxyman-har-export-dir&gt;</code>
        or ensure proxyman artifact files exist at <code>~/.it2/sessions/*/proxy-traffic.*.jsonl</code>
      </div>
    `;
  }

  // Find binding constraint bucket (representative_claim is per-snapshot; here check max utilization).
  const maxUtil = Math.max(...latestLimits.map(l => l.utilization));

  return html`
    <div class="rl-gauges">
      ${latestLimits.map(gauge => {
        const pct = Math.round(gauge.utilization * 100);
        const fillClass = pct >= 80 ? 'high' : pct >= 50 ? 'medium' : 'low';
        const isBinding = gauge.utilization === maxUtil && maxUtil > 0;
        const label = gauge.bucket === '5h' ? '5-hour window' :
                      gauge.bucket === '7d' ? '7-day global' :
                      '7-day ' + gauge.bucket.replace('7d_', '');
        return html`
          <div class="rl-gauge ${isBinding ? 'binding' : ''}">
            <div class="rl-gauge-label">${label}</div>
            <div class="rl-gauge-track">
              <div class="rl-gauge-fill ${fillClass}" style="width:${pct}%"></div>
            </div>
            <div class="rl-gauge-pct">${pct}%</div>
            <div class="rl-gauge-reset">${fmtResetCountdown(gauge.reset_at)}</div>
            ${isBinding && maxUtil > 0 && html`<div class="rl-gauge-binding">binding constraint</div>`}
          </div>
        `;
      })}
    </div>
  `;
}

function TokenTimeline({ daily }) {
  if (!daily || daily.length === 0) {
    return html`
      <div class="rl-no-data">
        no token usage data — index HAR files or proxyman artifacts to populate
      </div>
    `;
  }

  const W = 700, H = 80, padL = 0, padR = 0, padT = 4, padB = 0;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  const colors = {
    input: '#7ab8d4',
    cache_creation: '#d4a017',
    cache_read: '#6ab04c',
    output: '#e87d3e',
  };

  // Compute stacked max.
  const maxStack = Math.max(...daily.map(d =>
    d.input_tokens + d.output_tokens + d.cache_read_tokens + d.cache_creation_tokens
  ), 1);

  const n = daily.length;
  const barW = Math.max(1, chartW / n - 1);

  const [tooltip, setTooltip] = useState(null);

  function barX(i) { return padL + i * (chartW / n); }
  function barH(v) { return Math.max(1, (v / maxStack) * chartH); }

  // Build stacked bars.
  const bars = daily.map((d, i) => {
    const total = d.input_tokens + d.output_tokens + d.cache_read_tokens + d.cache_creation_tokens;
    if (total === 0) return null;
    const x = barX(i);
    let y = H - padB;
    const segs = [];
    for (const [key, color] of [
      ['input_tokens', colors.input],
      ['cache_creation_tokens', colors.cache_creation],
      ['cache_read_tokens', colors.cache_read],
      ['output_tokens', colors.output],
    ]) {
      const h = barH(d[key]);
      y -= h;
      segs.push(html`<rect key=${key} x=${x} y=${y} width=${barW} height=${h} fill=${color} />`);
    }
    return html`
      <g key=${d.day}
        onMouseEnter=${(e) => {
          const rect = e.currentTarget.closest('svg').getBoundingClientRect();
          setTooltip({ day: d.day, data: d, x: e.clientX - rect.left, y: e.clientY - rect.top });
        }}
        onMouseLeave=${() => setTooltip(null)}
        style="cursor:default"
      >${segs}</g>
    `;
  });

  // X-axis labels: first, middle, last.
  const labelIdxs = [0, Math.floor(n / 2), n - 1].filter((v, i, a) => a.indexOf(v) === i);

  return html`
    <div class="token-chart">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="height:80px">
        ${bars}
      </svg>
      <div class="token-chart-xaxis">
        ${labelIdxs.map(i => html`<span key=${i}>${daily[i]?.day || ''}</span>`)}
      </div>
      <div class="token-chart-legend">
        ${[
          ['input', colors.input, 'input tokens'],
          ['cache_creation', colors.cache_creation, 'cache creation (1.25×)'],
          ['cache_read', colors.cache_read, 'cache read (~0.1×)'],
          ['output', colors.output, 'output tokens ⚠'],
        ].map(([k, c, label]) => html`
          <span key=${k}>
            <span class="legend-swatch" style="background:${c}"></span>${label}
          </span>
        `)}
      </div>
      <div class="undercount-note">
        ⚠ output tokens from session JSONL files are undercounted (streaming-start snapshot);
        accurate values require HAR proxy data.
      </div>
      ${tooltip && html`
        <div class="token-chart-tooltip" style="left:${tooltip.x + 12}px;top:${tooltip.y - 20}px">
          <div class="token-chart-tooltip-title">${tooltip.day}</div>
          <div class="token-chart-tooltip-row"><span>input</span><span>${fmtTokens(tooltip.data.input_tokens)}</span></div>
          <div class="token-chart-tooltip-row"><span>cache creation</span><span>${fmtTokens(tooltip.data.cache_creation_tokens)}</span></div>
          <div class="token-chart-tooltip-row"><span>cache read</span><span>${fmtTokens(tooltip.data.cache_read_tokens)}</span></div>
          <div class="token-chart-tooltip-row"><span>output ⚠</span><span>${fmtTokens(tooltip.data.output_tokens)}</span></div>
          <div class="token-chart-tooltip-row"><span>requests</span><span>${tooltip.data.requests}</span></div>
        </div>
      `}
    </div>
  `;
}

function ContextCompositionBar({ daily }) {
  // Aggregate context bytes across all days.
  if (!daily || daily.length === 0) return html`
    <div class="rl-no-data">
      no context breakdown data — requires HAR proxy capture with request bodies
    </div>
  `;

  // daily rows have system_prompt_bytes, tool_definition_bytes, conversation_bytes from api_requests.
  // Check if any are non-zero.
  const totalSys = daily.reduce((s, d) => s + (d.system_prompt_bytes || 0), 0);
  const totalTool = daily.reduce((s, d) => s + (d.tool_definition_bytes || 0), 0);
  const totalConv = daily.reduce((s, d) => s + (d.conversation_bytes || 0), 0);
  const totalBytes = totalSys + totalTool + totalConv;

  if (totalBytes === 0) return html`
    <div class="rl-no-data">
      no context breakdown — requires HAR files with request body capture
    </div>
  `;

  const segs = [
    { key: 'tools', label: 'tool definitions', bytes: totalTool, color: '#e87d3e' },
    { key: 'system', label: 'system prompt', bytes: totalSys, color: '#7ab8d4' },
    { key: 'convo', label: 'conversation', bytes: totalConv, color: '#6ab04c' },
  ].filter(s => s.bytes > 0);

  return html`
    <div class="ctx-bar-wrap">
      <div class="ctx-stacked">
        ${segs.map(s => {
          const pct = (s.bytes / totalBytes * 100).toFixed(1);
          return html`
            <div key=${s.key} class="ctx-seg" style="width:${pct}%;background:${s.color}" title="${s.label}: ${pct}%">
              ${parseFloat(pct) > 8 && html`<span class="ctx-seg-label">${pct}%</span>`}
            </div>
          `;
        })}
      </div>
      <div class="ctx-legend">
        ${segs.map(s => {
          const pct = (s.bytes / totalBytes * 100).toFixed(1);
          return html`
            <span key=${s.key} class="ctx-legend-item">
              <span class="legend-swatch" style="background:${s.color}"></span>
              ${s.label} ${pct}%
            </span>
          `;
        })}
      </div>
    </div>
  `;
}

function UsagePanel({ urlParams, updateParams, navVersion }) {
  const [data, setData] = useState(null);
  const [since, setSinceRaw] = useState(urlParams.since || '720h');

  function setSince(v) { setSinceRaw(v); updateParams({ since: v }); }

    if (navVersion === 0) return;
    setSinceRaw(urlParams.since || '720h');
  }, [navVersion]);

    try {
      const d = await api('usage' + (since ? '?since=' + since : ''));
      setData(d);
    } catch (e) { console.error('usage:', e); }
  }, [since]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    window.addEventListener('cass:refresh', load);
    return () => window.removeEventListener('cass:refresh', load);

    { label: '7d', value: '168h' },

  // Aggregate daily totals for summary cards.

  const totalInput = daily.reduce((s, d) => s + d.input_tokens, 0);

  const totalCacheRead = daily.reduce((s, d) => s + d.cache_read_tokens, 0);
  const totalRequests = daily.reduce((s, d) => s + d.requests, 0);

  return html`
    <div>
      <div class="filters" style="margin-bottom:12px">
