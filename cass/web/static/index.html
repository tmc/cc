                return html`
                  <section class="wf-phase ${phaseState}" key=${group.title}>
                    <div class="wf-phase-head">
                      <span class="wf-phase-index">${gi + 1}</span>
                      <span class="wf-phase-title">${group.title}</span>
                      <span class="wf-phase-count">${total ? terminal + '/' + total : 'not started'}</span>
                    </div>
                    ${group.detail && html`<div class="wf-phase-detail">${group.detail}</div>`}
                    ${total === 0 ? html`
                      <div class="wf-phase-empty">no agents yet</div>
                    ` : html`
                      <div class="wf-agent-list">
                        ${group.agents.map((a, ai) => {
                          const wfAgents = wf.agents || [];
                          const globalIndex = wfAgents.findIndex(x => x && x.id === a.id);
                          const agentIndex = globalIndex >= 0 ? globalIndex : ai;
                          const agentKey = a.id || String(agentIndex);
                          const key = ri + ':' + agentKey;
                          const isOpen = expanded === key;
                          const isLast = ai === group.agents.length - 1;
                          const name = workflowAgentName(a, agentIndex);
                          const subtitle = workflowAgentSubtitle(a, name);
                          const focused = workflowAgentFocusMatch(focusAgent, wf, ri, a, agentIndex, key);
                          const stats = [
                            a.agent_type,
                            a.tool_calls ? a.tool_calls + ' tools' : '',
                            a.tokens ? fmtNum(a.tokens) + ' tok' : '',
                            a.status && a.status !== 'unknown' ? a.status : '',
                          ].filter(Boolean).join(' · ');
                          return html`
                            <div class="wf-agent" key=${key}>
                              <div class="wf-agent-row ${isOpen ? 'expanded' : ''} ${focused ? 'focused' : ''}"
                                   onClick=${() => setExpanded(prev => prev === key ? null : key)}
                                   title=${a.title || ''}>
                                <span class="agent-tree-connector">${isLast ? '└─' : '├─'}</span>
                                <${AgentStatusIcon} status=${a.status} />
                                <span class="wf-agent-text">
                                  <span class="wf-agent-name">@${name}</span>
                                  ${subtitle && html`<span class="wf-agent-subtitle">${subtitle}</span>`}
                                </span>
                                <span class="wf-agent-stats">${stats}</span>
                              </div>
                              ${isOpen && a.source_path && html`
                                <${WorkflowAgentTranscript} sourcePath=${a.source_path} />
                              `}
                              ${isOpen && !a.source_path && html`
                                <div class="wf-agent-empty">transcript unavailable</div>
                              `}
                            </div>
                          `;
                        })}
                      </div>
                    `}
                  </section>
                `;
              })}
            </div>
          </div>
        `;
      })}
    </div>
  `;
}

function SessionDetailPanel({ hit, onClose, initialFilter, initialTab, workflowAgentFocus, onFilterChange, onTabChange }) {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(false);
  const [streaming, setStreaming] = useState(false);
  const [entryCount, setEntryCount] = useState(0);
  const [hasEarlierEntries, setHasEarlierEntries] = useState(false);
  const [loadingEarlierEntries, setLoadingEarlierEntries] = useState(false);
  const [expanded, setExpanded] = useState({});
  const [searchQuery, setSearchQuery] = useState('');
  const [detailError, setDetailError] = useState('');
  const [detailRefreshTick, setDetailRefreshTick] = useState(0);

  // Raw requested tab from URL/UI. activeTab falls back to conversation when
  // the selected session does not expose that tab.
  const [activeTabRaw, setActiveTabRaw] = useState(normalizeDetailTab(initialTab));
  const [apiRequestsState, setApiRequestsState] = useState({
    sessionID: '',
    items: [],
    loaded: false,
    refreshTick: -1,
  });
  const [requestsLoading, setRequestsLoading] = useState(false);
  const [indexedAgentsState, setIndexedAgentsState] = useState({
    sessionID: '',
    items: [],
    loaded: false,
    refreshTick: -1,
  });
  const [agentsLoading, setAgentsLoading] = useState(false);

  const bodyRef = useRef(null);
  const searchRef = useRef(null);
  const detailToolTotal = hit?.tool_breakdown
    ? Object.values(hit.tool_breakdown).reduce((a, b) => a + b, 0)
    : 0;
  const resumeCmd = resumeCommand(hit);
  const detailTitle = displaySessionTitle(hit);
  const detailSkillCount = (hit?.selected_skill_count || 0) + (hit?.loaded_skill_count || 0);
  const requestCount = hit?.api_request_count || 0;
  const apiRequests = apiRequestsState.sessionID === hit?.session_id ? apiRequestsState.items : [];
  const indexedAgentRuns = indexedAgentsState.sessionID === hit?.session_id ? indexedAgentsState.items : [];
  const indexedAgentData = useMemo(() => agentDataFromSubagentRuns(indexedAgentRuns), [indexedAgentRuns]);
  const parsedAgentData = useAgentData(entries, hit?.workflows);
  const agentData = indexedAgentData || parsedAgentData;
  const hasWorkflowTab = (hit?.workflows || []).length > 0;
  const directSubagentSpawns = hit?.subagent_spawns || 0;
  const hasAgentTabHint = directSubagentSpawns > 0;
  const hasAgentTab = hasAgentTabHint || (!hasWorkflowTab && agentData.hasAgents);
  const showRequestsTab = requestCount > 0 || apiRequests.length > 0;
  let activeTab = activeTabRaw;
  if (activeTab === 'agents' && !hasAgentTab) activeTab = hasWorkflowTab ? 'workflows' : 'conversation';
  if (activeTab === 'workflows' && !hasWorkflowTab) activeTab = 'conversation';
  if (activeTab === 'requests' && !showRequestsTab) activeTab = 'conversation';
  const needsSessionEntries = activeTab === 'conversation';

  function setActiveTab(tab) {
    const normalized = normalizeDetailTab(tab);
    setActiveTabRaw(normalized);
    onTabChange && onTabChange(normalized);
  }

  function setDetailSearch(v) {
    setSearchQuery(v);
    onFilterChange && onFilterChange(v);
  }

  function sessionEntriesPath(offset) {
    if (!hit) return '';
    if (activeTab === 'agents') return 'session/' + hit.session_id;
    return 'session/' + hit.session_id + '?' + qs({
      order: 'desc',
      limit: String(sessionEntryPageSize),
      offset: offset ? String(offset) : '',
    });
  }

  function loadEarlierSessionEntries() {
    if (!hit || loadingEarlierEntries || !hasEarlierEntries) return;
    setLoadingEarlierEntries(true);
    api(sessionEntriesPath(entries.length))
      .then(e => {
        const page = Array.isArray(e) ? e : [];
        setEntries(prev => prev.concat(page));
        setEntryCount(c => c + page.length);
        setHasEarlierEntries(page.length === sessionEntryPageSize);
      })
      .catch(e => setDetailError(errorMessage(e, 'session unavailable')))
      .finally(() => setLoadingEarlierEntries(false));
  }

  useEffect(() => {
    if (!hit) {
      setEntries([]); setEntryCount(0); setSearchQuery('');
      setActiveTabRaw('conversation');
      setApiRequestsState({ sessionID: '', items: [], loaded: false, refreshTick: -1 });
      setIndexedAgentsState({ sessionID: '', items: [], loaded: false, refreshTick: -1 });
      setAgentsLoading(false);
      setDetailError('');
      setHasEarlierEntries(false); setLoadingEarlierEntries(false);
      return;
    }
    setApiRequestsState(prev => prev.sessionID === hit.session_id
      ? prev
      : { sessionID: '', items: [], loaded: false, refreshTick: -1 });
    setIndexedAgentsState(prev => prev.sessionID === hit.session_id
      ? prev
      : { sessionID: '', items: [], loaded: false, refreshTick: -1 });
    setRequestsLoading(false);
    setAgentsLoading(false);
    setHasEarlierEntries(false);
    setLoadingEarlierEntries(false);
    if (!needsSessionEntries) {
      setLoading(false);
      setStreaming(false);
      setEntries([]);
      setEntryCount(0);
      setDetailError(hit.meta_error || '');
      return;
    }
    setLoading(true);
    setStreaming(false);
    setEntries([]);
    setEntryCount(0);
    setDetailError(hit.meta_error || '');
    setExpanded({});
    setDetailSearch(initialFilter || '');
    if (hit.meta_error) {
      setLoading(false);
      setStreaming(false);
      return;
    }

    let cancelled = false;
    api(sessionEntriesPath(0))
      .then(e => {
        if (cancelled) return;
        const page = Array.isArray(e) ? e : [];
        setEntries(page);
        setEntryCount(page.length);
        setHasEarlierEntries(activeTab === 'conversation' && page.length === sessionEntryPageSize);
      })
      .catch(e => {
        if (!cancelled) setDetailError(errorMessage(e, 'session unavailable'));
      })
      .finally(() => {
        if (!cancelled) setLoading(false);
      });

    return () => { cancelled = true; };
  }, [hit?.session_id, activeTab]);

  useEffect(() => {
    function refresh(e) {
      if (refreshTouchesSession(e.detail, hit)) setDetailRefreshTick(t => t + 1);
    }
    window.addEventListener('cass:refresh', refresh);
    return () => window.removeEventListener('cass:refresh', refresh);
  }, [hit?.session_id, hit?.source_path]);

  useEffect(() => {
    if (detailRefreshTick === 0 || !hit || !needsSessionEntries || hit.meta_error) return;
    let cancelled = false;
    api(sessionEntriesPath(0))
      .then(e => {
        if (cancelled) return;
        const page = Array.isArray(e) ? e : [];
        if (activeTab === 'conversation') {
          const next = mergeNewestEntries(page, entries);
          setEntries(next);
          setEntryCount(next.length);
          setHasEarlierEntries(page.length === sessionEntryPageSize || (next.length > page.length && hasEarlierEntries));
          return;
        }
        setEntries(page);
        setEntryCount(page.length);
        setHasEarlierEntries(false);
      })
      .catch(e => {
        if (!cancelled) setDetailError(errorMessage(e, 'session unavailable'));
      });
    return () => { cancelled = true; };
  }, [detailRefreshTick, hit?.session_id, activeTab]);

  // Apply initialFilter from tool click on search hit.
  useEffect(() => {
    if (initialFilter) {
      setSearchQuery(initialFilter);
      setActiveTab('conversation');
    }
  }, [initialFilter, hit?.session_id]);

  useEffect(() => {
    if (!initialFilter) {
      setSearchQuery('');
    }
  }, [initialFilter, hit?.session_id]);

  useEffect(() => {
    setActiveTabRaw(normalizeDetailTab(initialTab));
  }, [initialTab, hit?.session_id]);

  // Fetch API requests when the tab is switched or live data changes.
  useEffect(() => {
    if (!hit || activeTab !== 'requests') return;
    if (apiRequestsState.sessionID === hit.session_id &&
        apiRequestsState.loaded &&
        apiRequestsState.refreshTick === detailRefreshTick) {
      return;
    }

    let cancelled = false;
    setRequestsLoading(true);
    api('session/' + hit.session_id + '/requests')
      .then(reqs => {
        if (!cancelled) {
          setApiRequestsState({
            sessionID: hit.session_id,
            items: reqs || [],
            loaded: true,
            refreshTick: detailRefreshTick,
          });
        }
      })
      .catch(e => {
        if (!cancelled) console.error('failed resolving requests', e);
      })
      .finally(() => {
        if (!cancelled) setRequestsLoading(false);
      });
    return () => { cancelled = true; };
  }, [hit?.session_id, activeTab, detailRefreshTick]);

  // Fetch indexed subagent metadata when the Agents tab is opened. This avoids
  // reading the full parent transcript and every sidechain just to render the
  // agent overview.
  useEffect(() => {
    if (!hit || activeTab !== 'agents') return;
    if (indexedAgentsState.sessionID === hit.session_id &&
        indexedAgentsState.loaded &&
        indexedAgentsState.refreshTick === detailRefreshTick) {
      return;
    }

    let cancelled = false;
    setAgentsLoading(true);
    api('session/' + hit.session_id + '/agents')
      .then(items => {
        if (!cancelled) {
          setIndexedAgentsState({
            sessionID: hit.session_id,
            items: items || [],
            loaded: true,
            refreshTick: detailRefreshTick,
          });
        }
      })
      .catch(e => {
        if (!cancelled) console.error('failed resolving agents', e);
      })
      .finally(() => {
        if (!cancelled) setAgentsLoading(false);
      });
    return () => { cancelled = true; };
  }, [hit?.session_id, activeTab, detailRefreshTick]);

  // Auto-scroll during streaming.
  useEffect(() => {
    if (activeTab !== 'conversation') return;
    if (streaming && bodyRef.current) {
      bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
    }
  }, [entries.length, streaming, activeTab]);

  // Ctrl+F in panel focuses the search box.
  useEffect(() => {
    if (!hit) return;
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'f') {
        // Only intercept if the detail panel is open.
        const panel = bodyRef.current?.closest('.detail-panel');
        if (panel && panel.classList.contains('open')) {
          e.preventDefault();
          searchRef.current?.focus();
        }
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [hit]);

  function toggleExpand(key) {
    setExpanded(prev => ({ ...prev, [key]: !prev[key] }));
  }

  function canScroll(el, deltaY) {
    if (!el || el.scrollHeight <= el.clientHeight + 1) return false;
    if (deltaY < 0) return el.scrollTop > 0;
    if (deltaY > 0) return el.scrollTop + el.clientHeight < el.scrollHeight - 1;
    return false;
  }

  function onDetailWheel(e) {
    e.stopPropagation();
    const scrollTarget = e.target?.closest?.('.detail-body, .detail-header, .detail-skills, .detail-skills-scroll, .conv-content');
    if (canScroll(scrollTarget, e.deltaY)) {
      return;
    }
    if (canScroll(bodyRef.current, e.deltaY)) {
      e.preventDefault();
      bodyRef.current.scrollTop += e.deltaY;
    }
  }

  // Search the entries currently loaded in the detail panel.
  const { visibleEntries, matchIndices } = useMemo(() => {
    const all = entries.map((e, i) => ({ entry: e, idx: i }));
    if (!searchQuery) return { visibleEntries: all, matchIndices: [] };
    const matches = [];
    all.forEach(({ entry }, i) => {
      if (entryMatchesQuery(entry, searchQuery)) matches.push(i);
    });
    return { visibleEntries: all, matchIndices: matches };
  }, [entries, searchQuery]);

  const matchCount = matchIndices.length;
  const matchSet = useMemo(() => new Set(matchIndices), [matchIndices]);
  const searchHasUnloadedEntries = activeTab === 'conversation' && !!searchQuery && hasEarlierEntries;
  const [matchCursor, setMatchCursor] = useState(-1);

  // Reset cursor when query changes.
  useEffect(() => { setMatchCursor(matchCount > 0 ? 0 : -1); }, [searchQuery]);

  // Scroll to current match.
  useEffect(() => {
    if (matchCursor < 0 || matchCursor >= matchIndices.length) return;
    const targetIdx = matchIndices[matchCursor];
    const el = bodyRef.current?.querySelector('[data-eidx="' + targetIdx + '"]');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, [matchCursor, matchIndices]);

  function nextMatch() { if (matchCount > 0) setMatchCursor(c => (c + 1) % matchCount); }
  function prevMatch() { if (matchCount > 0) setMatchCursor(c => (c - 1 + matchCount) % matchCount); }

  // Render a text block with ansi_up and optional search highlighting.
  function renderAnsiContent(text, maxLen, cls) {
    if (!text) return null;
    return html`<${AnsiContent} text=${text} maxLen=${maxLen || 2000} cls=${cls} searchQuery=${searchQuery} />`;
  }

  function renderConversation() {
    return visibleEntries.map(({ entry, idx }) => {
      // When searching, dim non-matching entries.
      const isMatch = searchQuery && matchSet.has(idx);
      const dimClass = searchQuery && !isMatch ? ' search-dimmed' : '';
      const hlClass = isMatch && matchIndices[matchCursor] === idx ? ' search-current' : '';
      const entryID = entryKey(entry) || String(idx);

      // Compact boundary: horizontal divider with metadata badge.
      if (entry.type === 'system' && entry.subtype === 'compact_boundary') {
        const meta = entry.compactMetadata;
        const label = meta
          ? (meta.trigger || 'auto') + (meta.preTokens ? ' | ' + fmtNum(meta.preTokens) + ' tok' : '')
          : 'compacted';
        return html`
          <div class="conv-compact-boundary${dimClass}" key=${entryID} data-eidx=${idx}>
            <span class="conv-compact-badge">compacted (${label})</span>
          </div>
        `;
      }

      // Compact summary: collapsible italic summary text.
      if (entry.isCompactSummary) {
        const summaryText = entry.summary
          || (entry.message && typeof entry.message.content === 'string' ? entry.message.content : '')
          || '';
        if (summaryText) {
          const key = 'cs-' + entryID;
          const isExp = expanded[key];
          return html`
            <div class="conv-compact-summary${dimClass}${hlClass}" key=${entryID} data-eidx=${idx} onClick=${() => toggleExpand(key)}>
              <div class="conv-role">
                <span>compact summary</span>
                <span class="conv-tool-toggle">${isExp ? '[-]' : '[+]'}</span>
              </div>
              ${renderAnsiContent(summaryText, isExp ? 5000 : 200, isExp ? '' : 'collapsed')}
            </div>
          `;
        }
      }

      // Custom title rename.
      if (entry.type === 'custom-title' && entry.customTitle) {
        return html`<div class="conv-custom-title${dimClass}" key=${entryID} data-eidx=${idx}>renamed: ${entry.customTitle}</div>`;
      }

      // System entries (non-compact).
      if (entry.type === 'system' && !entry.message) {
        const text = entry.content || entry.summary || '';
        if (!text) return null;
        return html`
          <div class="conv-entry role-system${dimClass}${hlClass}" key=${entryID} data-eidx=${idx}>
            <div class="conv-role">system</div>
            ${renderAnsiContent(text, 500)}
          </div>
        `;
      }

      if (entry.type === 'attachment' && entry.attachment) {
        const text = attachmentSummary(entry.attachment);
        if (!text) return null;
        return html`
          <div class="conv-entry role-system${dimClass}${hlClass}" key=${entryID} data-eidx=${idx}>
            <div class="conv-role">attachment</div>
            ${renderAnsiContent(text, 500)}
          </div>
        `;
      }

      const msg = entry.message;
      if (!msg) return null;
      const role = msg.role || entry.type || 'unknown';
      const content = msg.content;

      if (Array.isArray(content)) {
        return html`<div key=${entryID} data-eidx=${idx} class="${dimClass}${hlClass}">
          ${content.map((block, bi) => {
            const key = entryID + '-' + bi;
            if (isImageBlock(block)) {
              return renderImageEntry(block, key, role);
            }
            if (block.type === 'tool_use') {
              const isExp = expanded[key];
              const inputText = typeof block.input === 'string' ? block.input : JSON.stringify(block.input, null, 2);
              const summary = toolBlockSummary(block);
              return html`
                <div class="conv-entry role-tool_use" key=${key} onClick=${() => toggleExpand(key)}>
                  <div class="conv-role">
                    <span class="conv-tool-name">${block.name || 'tool'}</span>
                    ${summary && html`<span class="conv-tool-summary">${summary}</span>`}
                    <span class="conv-tool-toggle">${isExp ? '[-]' : '[+]'}</span>
                  </div>
                  ${isExp && renderAnsiContent(inputText, 5000, 'tool-input')}
                </div>
              `;
            }
            if (block.type === 'tool_result') {
              const isErr = block.is_error;
              const text = typeof block.content === 'string' ? block.content
                : Array.isArray(block.content) ? block.content.map(c => c.text || '').join('\n')
                : JSON.stringify(block.content);
              const isExp = expanded[key];
              return html`
                <div class="conv-entry role-tool_result" key=${key} onClick=${() => toggleExpand(key)}>
                  <div class="conv-role">
                    <span class="${isErr ? 'conv-error' : 'conv-success'}">${isErr ? 'error' : 'result'}</span>
                    <span class="conv-tool-toggle">${isExp ? '[-]' : '[+]'}</span>
                  </div>
                  ${renderAnsiContent(text, isExp ? 5000 : 200, isExp ? '' : 'collapsed')}
                </div>
              `;
            }
            if (block.type === 'text' || block.text) {
              return html`
                <div class="conv-entry role-${role}" key=${key}>
                  <div class="conv-role">${role}</div>
                  ${renderAnsiContent(block.text || '', 2000)}
                </div>
              `;
            }
            return null;
          })}
        </div>`;
      }

      if (typeof content === 'string' && content.length > 0) {
        return html`
          <div class="conv-entry role-${role}${dimClass}${hlClass}" key=${entryID} data-eidx=${idx}>
            <div class="conv-role">${role}</div>
            ${renderAnsiContent(content, 2000)}
          </div>
        `;
      }
      return null;
    });
  }

  function attachmentSummary(att) {
    if (!att) return '';
    if (att.type === 'workflow_keyword_request') return 'workflow requested';
    if (att.type === 'task_reminder') return 'task reminder';
    if (att.type === 'deferred_tools_delta') {
      const n = (att.addedNames || att.added_names || []).length;
      return n ? 'deferred tools +' + n : 'deferred tools changed';
    }
    return '';
  }

  function toolBlockSummary(block) {
    const input = block.input || {};
    if (block.name === 'Workflow') {
      const script = input.script || '';
      const m = script.match(/\bname\s*:\s*['"]([^'"]+)['"]/);
      return m ? m[1] : (input.scriptPath || '');
    }
    if (block.name === 'TaskCreate') return input.subject || '';
    if (block.name === 'TaskUpdate') return '#' + (input.taskId || '') + ' ' + (input.status || '');
    return '';
  }

  function renderRequestsTab() {
    if (requestsLoading) return html`<div class="loading">loading api requests...</div>`;
    if (apiRequests.length === 0) return html`
      <div class="empty" style="margin-top:20px;">
        no API requests found. <br/><br/>
        Index HAR exports with <code>cass index --har-dir &lt;dir&gt;</code> or
        Proxyman session archives with <code>cass index --session-dir &lt;path&gt;</code>.
      </div>
    `;

    return html`
      <div class="requests-list">
        ${apiRequests.map((req, i) => {
          const bd = req.breakdown;
          const hasBd = bd && Object.keys(bd).length > 0 && req.total_request_bytes > 0;
          return html`
            <div class="api-request-card" key=${req.id}>
              <div class="req-header">
                <span class="req-method-badge">POST</span>
                <span class="req-model">${req.model}</span>
                <span class="req-time">${new Date(req.timestamp * 1000).toLocaleTimeString()}</span>
                <span class="req-duration">${req.duration_ms}ms</span>
                <span class="req-status ${req.status_code >= 400 ? 'error' : 'success'}">${req.status_code}</span>
              </div>

              <div class="req-metrics">
                <div class="req-metric">
                  <span class="label">Tokens (in/out/cr/cw)</span>
                  <span class="val">${req.input_tokens} / ${req.output_tokens} / ${req.cache_read_tokens || 0} / ${req.cache_creation_tokens || 0}</span>
                </div>
                ${bd && html`
                  <div class="req-metric">
                    <span class="label">Blocks (sys/tools/msgs)</span>
                    <span class="val">${bd.system_block_count} / ${bd.tool_count} / ${bd.message_count}</span>
                  </div>
                `}
                <div class="req-metric">
                  <span class="label">Stop Reason</span>
                  <span class="val">${req.stop_reason || 'unknown'}</span>
                </div>
                ${bd && bd.skill_names && bd.skill_names.length > 0 && html`
                  <div class="req-metric">
                    <span class="label">Skills</span>
                    <span class="val">${bd.skill_names.join(', ')}</span>
                  </div>
                `}
              </div>

              ${hasBd && html`
                <div class="req-context-viz">
                  <div class="req-viz-track">
                    ${bd.tool_definition_bytes > 0 && html`
                      <div class="req-viz-seg tool" style="width:${(bd.tool_definition_bytes / req.total_request_bytes * 100)}%" title="Tools: ${bd.tool_definition_bytes}b"></div>
                    `}
                    ${bd.system_prompt_bytes > 0 && html`
                      <div class="req-viz-seg sys" style="width:${(bd.system_prompt_bytes / req.total_request_bytes * 100)}%" title="System: ${bd.system_prompt_bytes}b"></div>
                    `}
                    ${bd.conversation_bytes > 0 && html`
                      <div class="req-viz-seg conv" style="width:${(bd.conversation_bytes / req.total_request_bytes * 100)}%" title="Conversation: ${bd.conversation_bytes}b"></div>
                    `}
                  </div>
                  <div class="req-viz-legend">
                    ${bd.tool_definition_bytes > 0 && html`<span><span class="swatch tool"></span> Tools (${(bd.tool_definition_bytes/1024).toFixed(1)}k)</span>`}
                    ${bd.system_prompt_bytes > 0 && html`<span><span class="swatch sys"></span> System (${(bd.system_prompt_bytes/1024).toFixed(1)}k)</span>`}
                    ${bd.conversation_bytes > 0 && html`<span><span class="swatch conv"></span> Messages (${(bd.conversation_bytes/1024).toFixed(1)}k)</span>`}
                    <span>Total: ${(req.total_request_bytes/1024).toFixed(1)}k bytes</span>
                  </div>
                </div>
              `}
            </div>
          `;
        })}
      </div>
    `;
  }

  function renderGoalPanel() {
    if (!hit?.goals || hit.goals.length === 0) return null;
    return html`
      <div class="detail-goals">
        ${hit.goals.map((goal, i) => {
          const status = goal.effective_status || goal.status || 'active';
          const rawStatus = goal.status || '';
          const rawStatusNote = rawStatus && rawStatus !== status ? 'reported ' + rawStatus : '';
          const used = goal.tokens_used || 0;
          const budget = goal.token_budget;
          const gates = goal.completion_gates || [];
          const gateSummary = goalGateSummary(gates);
          const unresolved = gates.filter(gate => ['required', 'missing', 'blocked'].includes(gate.status || 'required'));
          const complete = gates.filter(gate => (gate.status || 'required') === 'complete');
          const gateSummaryClass = gateSummary.unresolved > 0 ? 'blocked' : 'complete';
          const gateSummaryText = gateSummary.unresolved > 0
            ? gateSummary.unresolved + ' unresolved'
            : gateSummary.complete + ' complete';
          const unresolvedRows = unresolved.map(gate => html`
            <div class="detail-goal-gate ${gate.status || 'required'}" title=${gate.evidence || gate.source || ''}>
              <span class="detail-goal-gate-status">${gate.status || 'required'}</span>
              <span class="detail-goal-gate-name">${gate.name}</span>
            </div>
          `);
          const completeRows = complete.map(gate => html`
            <div class="detail-goal-gate complete" title=${gate.evidence || gate.source || ''}>
              <span class="detail-goal-gate-status">complete</span>
              <span class="detail-goal-gate-name">${gate.name}</span>
            </div>
          `);
          const completeBlock = complete.length > 0 ? html`
            <details class="detail-goal-gate-complete">
              <summary>${complete.length} ready</summary>
              ${completeRows}
            </details>
          ` : null;
          return html`
            <div class="detail-goal-card ${status}" key=${i}>
              <div class="detail-goal-head">
                <span class="detail-goal-status">${status}</span>
                ${goal.updated_at && html`<span class="detail-goal-time">${relTime(goal.updated_at)}</span>`}
              </div>
              <div class="detail-goal-objective">${goal.objective}</div>
              <div class="detail-goal-meta">
                ${goal.time_used_seconds > 0 && html`<span>${fmtDuration(goal.time_used_seconds)}</span>`}
                ${used > 0 && html`<span>${fmtNum(used)} tok${budget ? ' / ' + fmtNum(budget) : ''}</span>`}
                ${goal.thread_id && html`<span>${goal.thread_id.slice(0, 8)}</span>`}
                ${rawStatusNote && html`<span>${rawStatusNote}</span>`}
              </div>
              ${gateSummary.total > 0 && html`
                <div class="detail-goal-gates">
                  <div class="detail-goal-gates-head">
                    <span>Completion gates</span>
                    <strong class=${gateSummaryClass}>${gateSummaryText}</strong>
                  </div>
	                  ${unresolvedRows}
	                  ${completeBlock}
                </div>
              `}
              ${goal.completion_budget_report && html`
                <div class="detail-goal-report ${status === 'blocked' ? 'stale' : ''}">
                  ${status === 'blocked' ? html`<strong>raw completion report</strong> ` : null}
                  ${goal.completion_budget_report}
                </div>
              `}
            </div>
          `;
        })}
      </div>
    `;
  }

  function renderSkillPanel() {
    if (!hit?.skills || hit.skills.length === 0) return null;
    const active = hit.skills.filter(skill =>
      skill.kind !== 'available' && skill.kind !== 'expanded');
    const context = hit.skills.filter(skill => skill.kind === 'expanded');
    const available = hit.skills.filter(skill => skill.kind === 'available');
    const selected = hit.skills.filter(skill => skill.kind === 'selected' || skill.kind === 'tool').length;
    const loaded = hit.skills.filter(skill => skill.kind === 'loaded').length;
    const counts = [
      selected ? selected + ' selected' : '',
      loaded ? loaded + ' loaded' : '',
      context.length ? context.length + ' context' : '',
      available.length ? available.length + ' available' : '',
    ].filter(Boolean).join(' / ');
    const renderCard = (skill, i) => html`
      <div class="detail-skill-card ${skill.kind || 'skill'}" key=${i}>
        <div class="detail-skill-head">
          <span class="detail-skill-name">${skill.name}</span>
          <span class="detail-skill-kind">${skillKindLabel(skill.kind)}</span>
        </div>
        ${skill.path && skill.kind !== 'available' && html`<div class="detail-skill-path">${skill.path}</div>`}
        <div class="detail-skill-meta">
          ${skill.source && html`<span>${skill.source}</span>`}
          ${skill.count > 1 && html`<span>${skill.count} signals</span>`}
          ${skill.last_seen && html`<span>${relTime(skill.last_seen)}</span>`}
        </div>
        ${skill.evidence && skill.evidence.length > 0 && skill.kind !== 'available' && html`
          <div class="detail-skill-evidence">${skill.evidence.join('; ')}</div>
        `}
      </div>
    `;
    return html`
      <div class="detail-skills">
        <div class="detail-skills-summary">
          <span>Skills</span>
          <strong>${counts || hit.skills.length}</strong>
        </div>
        ${active.length > 0 && html`
          <div class="detail-skills-scroll detail-skill-list active">
            ${active.map(renderCard)}
          </div>
        `}
        ${context.length > 0 && html`
          <details class="detail-skill-section">
            <summary>
              <span>context skills</span>
              <strong>${context.length}</strong>
            </summary>
            <div class="detail-skills-scroll detail-skill-list context">
              ${context.map(renderCard)}
            </div>
          </details>
        `}
        ${available.length > 0 && html`
          <details class="detail-skill-section">
            <summary>
              <span>available skills</span>
              <strong>${available.length}</strong>
            </summary>
            <div class="detail-skills-scroll detail-skill-list available">
              ${available.map(renderCard)}
            </div>
          </details>
        `}
      </div>
    `;
  }

  function renderToolBreakdownPanel() {
    if (!hit?.tool_breakdown || Object.keys(hit.tool_breakdown).length === 0) return null;
    return html`
      <div class="detail-tool-breakdown">
        <div class="detail-tool-breakdown-head">
          <span>Tool calls</span>
          <strong>${detailToolTotal}</strong>
        </div>
        ${Object.entries(hit.tool_breakdown).sort((a,b) => b[1] - a[1]).map(([name, count]) => html`
          <span class="tool-chip" key=${name}
            style="border-left: 2px solid ${TOOL_COLORS[name]||'var(--faint)'}"
            title="${TOOL_DESCRIPTIONS[name] || name}: ${count} calls (${detailToolTotal ? (count/detailToolTotal*100).toFixed(0) : 0}%)">
            <span>${name}</span>
            <strong>${count}</strong>
          </span>
        `)}
      </div>
    `;
  }

  function renderContextPanel() {
    const hasGoals = !!(hit?.goals && hit.goals.length > 0);
    const hasSkills = !!(hit?.skills && hit.skills.length > 0);
    const hasTools = !!(hit?.tool_breakdown && Object.keys(hit.tool_breakdown).length > 0);
    if (!hasGoals && !hasSkills && !hasTools) return null;
    const parts = [
      hit.goal_count > 0 ? hit.goal_count + ' goal' + (hit.goal_count === 1 ? '' : 's') : '',
      detailSkillCount > 0 ? detailSkillCount + ' used skill' + (detailSkillCount === 1 ? '' : 's') : '',
      detailToolTotal > 0 ? detailToolTotal + ' tool calls' : '',
    ].filter(Boolean).join(' / ');
    return html`
      <details class="detail-context-panel">
        <summary>
          <span>Session context</span>
          ${parts && html`<strong>${parts}</strong>`}
        </summary>
        <div class="detail-context-content">
          ${renderGoalPanel()}
          ${renderSkillPanel()}
          ${renderToolBreakdownPanel()}
        </div>
      </details>
    `;
  }

  return html`
    <div class="detail-panel ${hit ? 'open' : ''}" role="complementary" aria-label="Session detail" onWheel=${onDetailWheel}>
      ${hit && html`
        <div class="detail-header">
          <div class="detail-header-top">
            <div class="detail-title" title=${hit.title && hit.title !== detailTitle ? hit.title : ''}>${detailTitle}</div>
            <button class="detail-close" onClick=${onClose}>close</button>
          </div>
          <div class="detail-badges">
            <span class="hit-agent">[${hit.agent}]</span>
            ${hit.team_name && html`<span class="hit-team">${hit.team_name}${hit.agent_name ? ':' + hit.agent_name : ''}</span>`}
            ${hit.workspace && html`<span class="hit-workspace">${shortProject(hit.workspace)}</span>`}
            ${hit.started_at && html`<span class="hit-time">${relTime(hit.started_at)}${hit.ended_at ? ' → ' + relTime(hit.ended_at) : ''}</span>`}
          </div>
          <div class="detail-stat-row">
            ${hit.tool_calls && html`<span>${hit.tool_calls} tools</span>`}
            ${hit.turns > 1 && html`<span>${hit.turns} turns</span>`}
            ${hit.files_edited && html`<span>${hit.files_edited} files</span>`}
            ${hit.duration_secs && html`<span>${fmtDuration(hit.duration_secs)}</span>`}
            ${(hit.input_tokens || hit.output_tokens) && html`<span>${fmtNum((hit.input_tokens||0)+(hit.output_tokens||0))} tok</span>`}
            ${hit.compactions > 0 && html`<span class="hit-compactions">${hit.compactions} compaction${hit.compactions > 1 ? 's' : ''}</span>`}
            ${hit.goal_count > 0 && html`<span class="hit-goals">${hit.active_goal_count || 0} active goals / ${hit.completed_goal_count || 0} complete</span>`}
            ${detailSkillCount > 0 && html`<span class="hit-skills">${hit.selected_skill_count || 0} selected skills / ${hit.loaded_skill_count || 0} loaded</span>`}
            ${hit.workflow_count > 0 && html`<span class="hit-workflows">${hit.workflow_count} workflow${hit.workflow_count === 1 ? '' : 's'} / ${hit.workflow_agent_count || 0} agents / ${hit.workflow_task_op_count || 0} task ops</span>`}
            ${hit.subagent_entries > 0 && html`<span>${hit.subagent_mirrored_entries || 0}/${hit.subagent_entries} mirrored</span>`}
          </div>
          <div class="detail-session-id">
            <div class="detail-session-line">
              <span class="detail-session-label">session</span>
              <button class="detail-session-copy" onClick=${() => copyText(hit.session_id)} title="copy session id">${hit.session_id}</button>
            </div>
            ${resumeCmd && html`
              <div class="detail-resume-command">
                <code>${resumeCmd}</code>
                <button class="detail-copy-button" onClick=${() => copyText(resumeCmd)}>copy</button>
              </div>
            `}
            ${hit.sparkline && html`<span class="hit-sparkline" style="margin-left:8px">${hit.sparkline}</span>`}
          </div>
          <div class="detail-search">
            <input ref=${searchRef} class="detail-search-input" type="text"
              placeholder="search in session... (Enter/Shift+Enter to navigate)"
              value=${searchQuery}
              onInput=${e => setDetailSearch(e.target.value)}
              onKeyDown=${e => {
                if (e.key === 'Escape') { setDetailSearch(''); e.target.blur(); }
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); nextMatch(); }
                if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); prevMatch(); }
              }} />
            ${searchQuery && html`
              <span class="detail-search-count">${matchCount > 0 ? (matchCursor + 1) + '/' + matchCount : '0'}</span>
            `}
            ${searchHasUnloadedEntries && html`
              <button class="detail-search-earlier" disabled=${loadingEarlierEntries} onClick=${loadEarlierSessionEntries}>
                ${loadingEarlierEntries ? 'loading...' : 'search earlier'}
              </button>
            `}
          </div>

          <div class="detail-tabs">
            <button class="detail-tab ${activeTab === 'conversation' ? 'active' : ''}"
                    onClick=${() => setActiveTab('conversation')}>
              Conversation
            </button>
            ${hasAgentTab && html`
              <button class="detail-tab ${activeTab === 'agents' ? 'active' : ''}"
                      onClick=${() => setActiveTab('agents')}>
                Agents (${agentData.hasAgents && agentData.runningCount > 0
                  ? agentData.runningCount + '/' + agentData.totalAgents + ' running'
                  : (agentData.hasAgents ? agentData.totalAgents : directSubagentSpawns)})
              </button>
            `}
            ${hasWorkflowTab && html`
              <button class="detail-tab ${activeTab === 'workflows' ? 'active' : ''}"
                      onClick=${() => setActiveTab('workflows')}>
                Workflows (${hit.workflows.length})
              </button>
            `}
            ${showRequestsTab && html`
              <button class="detail-tab ${activeTab === 'requests' ? 'active' : ''}"
                      onClick=${() => setActiveTab('requests')}>
                API Requests${requestCount > 0 ? ' (' + requestCount + ')' : ''}
              </button>
            `}
          </div>
        </div>
        ${(hit.team_name || hit.it2_splits > 0) && html`
          <div class="detail-team-context">
            <div class="detail-team-context-title">${hit.team_name ? 'team context' : 'ad-hoc team'}</div>
            ${hit.team_name ? html`
              <div style="margin-bottom:4px">
                <span class="team-role-icon" style="color:var(--magenta)">${hit.is_team_lead ? '\u265B' : '\u25CF'}</span>
                <span style="color:var(--magenta);font-weight:600">${hit.team_name}</span>
                ${hit.agent_name && html`<span style="color:var(--dim)"> / ${hit.agent_name}</span>`}
                <span style="color:var(--faint);margin-left:4px">${hit.is_team_lead ? 'lead' : 'member'}</span>
              </div>
            ` : html`
              <div style="margin-bottom:4px;color:var(--cyan)">
                \u2442 ${hit.it2_splits} terminal split${hit.it2_splits !== 1 ? 's' : ''}
                ${hit.it2_sends ? html` · ${hit.it2_sends} message${hit.it2_sends !== 1 ? 's' : ''} sent` : null}
              </div>
            `}
          </div>
        `}
        ${streaming && html`
          <div class="detail-streaming">
            <div class="streaming-dot"></div>
            ${loading ? 'streaming...' : 'live'} ${entryCount} entries
          </div>
        `}
        <div class="detail-body" ref=${bodyRef}>
          ${renderContextPanel()}
          ${activeTab === 'conversation' ? html`
            ${detailError && html`<div class="detail-error">${detailError}</div>`}
            ${loading && entries.length === 0 && html`<div class="loading">loading session...</div>`}
            ${!detailError && html`<div class="conversation">${renderConversation()}</div>`}
            ${hasEarlierEntries && !detailError && html`
              <button class="detail-load-earlier" disabled=${loadingEarlierEntries} onClick=${loadEarlierSessionEntries}>
                ${loadingEarlierEntries ? 'loading...' : 'load earlier messages'}
              </button>
            `}
          ` : activeTab === 'agents' ? html`
            ${agentsLoading && !agentData.hasAgents
              ? html`<div class="loading">loading agents...</div>`
              : html`<${AgentsTab} agentData=${agentData} workflows=${hit.workflows} />`}
          ` : activeTab === 'workflows' ? html`
            <${WorkflowsTab} workflows=${hit.workflows} focusAgent=${workflowAgentFocus} />
          ` : renderRequestsTab()}
        </div>
      `}
    </div>
  `;
}

// --- Graph Panel ---

// Normalize a node's started_at (unix seconds or RFC3339) to an ISO string.
function nodeStartISO(n) {
  if (!n || !n.started_at) return null;
  return typeof n.started_at === 'number' ? new Date(n.started_at * 1000).toISOString() : n.started_at;
}

function workflowGraphAgentLabel(n, id) {
  if (n.label) return n.label;
  if (n.title && !looksLikePromptTitle(n.title)) return n.title;
  if (n.agent_type) return n.agent_type + ' agent';
  if (n.name) return n.name;
  return id;
}

function workflowGraphAgentInfo(n) {
  return [
    n.phase,
    n.agent_type,
    n.status && n.status !== 'unknown' ? n.status : '',
  ].filter(Boolean).join(' · ');
}

// GraphTooltip renders the floating node/edge tooltip. Content varies by
// node_type; edges show the normalized edge_type label.
function GraphTooltip({ tooltip, edgeTooltip, nodeData, onNavigate, isExpanded, isActive }) {
  if (tooltip) {
    const n = nodeData[tooltip.id];
    if (n) {
      const startTs = nodeStartISO(n);
      if (n.node_type === 'workflow') {
        const dur = (n.started_at && n.completed_at) ? fmtDuration(n.completed_at - n.started_at) : null;
        return html`
          <div class="graph-tooltip visible" style="left:${tooltip.x}px;top:${tooltip.y}px">
            <div class="graph-tooltip-title">${n.name || tooltip.id}</div>
            ${n.description && html`<div class="graph-tooltip-stat" style="white-space:normal;max-width:240px">${n.description}</div>`}
            <div class="graph-tooltip-stat">
              ${[
                n.status,
                (n.agent_count || 0) + ' agents',
                n.journal_event_count && n.journal_event_count + ' events',
                dur && dur,
              ].filter(Boolean).join(' · ')}
            </div>
            ${startTs && html`<div class="graph-tooltip-stat">${relTime(startTs)}</div>`}
            <div class="graph-tooltip-hint">click to ${isExpanded(n.full_id || n.id) ? 'collapse' : 'expand'} agents</div>
          </div>
        `;
      }
      if (n.node_type === 'workflow_agent') {
        return html`
          <div class="graph-tooltip visible" style="left:${tooltip.x}px;top:${tooltip.y}px">
            <div class="graph-tooltip-title">${workflowGraphAgentLabel(n, tooltip.id)}</div>
            <div class="graph-tooltip-stat">${[workflowGraphAgentInfo(n) || 'agent', n.workflow_run_id || ''].filter(Boolean).join(' · ')}</div>
            <div class="graph-tooltip-hint">click to open parent session</div>
          </div>
        `;
      }
      if (n.node_type === 'subagent') {
        const tok = (n.tokens || 0);
        return html`
          <div class="graph-tooltip visible" style="left:${tooltip.x}px;top:${tooltip.y}px">
            <div class="graph-tooltip-title">${n.title || n.name || tooltip.id}</div>
            <div class="graph-tooltip-stat">
              ${[n.name || 'subagent', n.status, tok >= 1000 && fmtNum(tok) + ' tok'].filter(Boolean).join(' · ')}
            </div>
            ${startTs && html`<div class="graph-tooltip-stat">${relTime(startTs)}</div>`}
            <div class="graph-tooltip-hint">click to open spawned session</div>
          </div>
        `;
      }
      const tok = (n.tokens || 0);
      return html`
        <div class="graph-tooltip visible"
          style="left:${tooltip.x}px;top:${tooltip.y}px">
          <div class="graph-tooltip-title">${n.title || tooltip.id}</div>
          ${n.workspace && html`<div class="graph-tooltip-stat graph-tooltip-ws"
            onClick=${(e) => { e.stopPropagation(); if (onNavigate) onNavigate('search', { q: shortProject(n.workspace) }); }}
            style="cursor:pointer;text-decoration:underline">${shortProject(n.workspace)}</div>`}
          <div class="graph-tooltip-stat">
            ${[
              n.tool_calls && n.tool_calls + ' tools',
              n.turns && n.turns + ' turns',
              tok >= 1000 && fmtNum(tok) + ' tok',
              n.workflow_count && n.workflow_count + ' workflows',
            ].filter(Boolean).join(' · ') || 'no stats'}
          </div>
          ${startTs && html`<div class="graph-tooltip-stat">${relTime(startTs)}</div>`}
          ${isActive(tooltip.id) && html`<div style="color:var(--green);margin-top:2px">active</div>`}
          <div class="graph-tooltip-hint">click node to search</div>
        </div>
      `;
    }
  }
  if (edgeTooltip) {
    const l = edgeTooltip.link;
    const label = (l.edge_type || l.kind || 'link').replace(/_/g, ' ');
    const action = l.action && l.action !== l.edge_type ? l.action : '';
    const ts = l.timestamp ? relTime(l.timestamp) : '';
    return html`
      <div class="graph-tooltip visible"
        style="left:${edgeTooltip.x}px;top:${edgeTooltip.y}px">
        <div class="graph-tooltip-title">${l.source} → ${l.target}</div>
        <div class="graph-tooltip-stat">${label}${action ? ': ' + action : ''}</div>
        ${l.text && html`<div class="graph-tooltip-stat" style="white-space:normal;max-width:240px;color:var(--dim)">${l.text.slice(0, 120)}</div>`}
        ${ts && html`<div class="graph-tooltip-stat">${ts}</div>`}
      </div>
    `;
  }
  return null;
}

function GraphPanel({ urlParams, updateParams, navVersion, onNavigate }) {
  const [allLinks, setAllLinks] = useState([]);
  const [nodeData, setNodeData] = useState({});  // id -> {workspace, title, started_at, ended_at, tool_calls, turns, tokens, is_active}
  const [timeRange, setTimeRange] = useState({ min: 0, max: 0 });
  const [since, setSinceRaw] = useState(urlParams.since || '24h');
  const [loading, setLoading] = useState(true);
  const [zoom, setZoom] = useState(1);
  const [panOffset, setPanOffset] = useState({ x: 0, y: 0 });
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef(null);
  const [graphQuery, setGraphQueryRaw] = useState(urlParams.q || '');
  const [wsFilter, setWsFilterRaw] = useState(urlParams.ws || '');
  const [edgeFilter, setEdgeFilter] = useState({ message: true, observation: true, split: true, team: true, workflow: true });
  const [activeOnly, setActiveOnly] = useState(false);
  // Graph layout mode: workflow | sessions | teams | network. '' means auto.
  const [graphMode, setGraphMode] = useState(urlParams.mode || '');
  // Map of workflow run id -> true for workflows whose child agents are
  // expanded (workflow mode). A plain object is more idiomatic for Preact state
  // than a mutated Set.
  const [expandedWorkflows, setExpandedWorkflows] = useState({});
  const isExpanded = useCallback((runID) => !!expandedWorkflows[runID], [expandedWorkflows]);
  // True once the loaded graph contains at least one workflow node.
  const [hasWorkflows, setHasWorkflows] = useState(false);

  function setGraphQuery(v) { setGraphQueryRaw(v); updateParams({ since, q: v, ws: wsFilter }); }
  function setSince(v) { setSinceRaw(v); updateParams({ since: v, q: graphQuery, ws: wsFilter }); }
  function setWsFilter(v) { setWsFilterRaw(v); updateParams({ since, q: graphQuery, ws: v }); }

  useEffect(() => {
    if (navVersion === 0) return;
    setSinceRaw(urlParams.since || '24h');
    setGraphQueryRaw(urlParams.q || '');
    setWsFilterRaw(urlParams.ws || '');
  }, [navVersion]);

  // Scrubber state.
  const [scrubberPos, setScrubberPos] = useState(1);  // 0..1 normalized
  const [playing, setPlaying] = useState(false);
  const playRef = useRef(null);

  // Tooltip state.
  const [tooltip, setTooltip] = useState(null);  // {id, x, y}
  const containerRef = useRef(null);

  // Track which links just appeared for animation.
  const prevVisibleCount = useRef(0);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      // Workflow nodes/agents keep their full ids; only iTerm2/session prefixes
      // are shortened to 8 chars for display. Detect those by '#'/'wf_' shape.
      function normID(raw) {
        const id = raw || '?';
        if (id.startsWith('wf_') || id.includes('#') || id.includes('@')) return id;
        return id.slice(0, 8);
      }
      // Normalize link: keep edge_type so workflow/team edges render distinctly.
      function normLink(lk) {
        return {
          source: normID(lk.source || lk.source_session),
          target: normID(lk.target || lk.target_session),
          kind: lk.kind, action: lk.action, edge_type: lk.edge_type,
          text: lk.text, timestamp: lk.timestamp,
        };
      }

      // Request workflow nodes unless an explicit non-workflow mode is active.
      const wfParam = (graphMode === 'sessions' || graphMode === 'teams' || graphMode === 'network')
        ? 'none' : 'expanded';

      let nodes = [], links = [], tRange = null;
      try {
        const g = await api('graph?' + qs({ since, workflow: wfParam }));
        nodes = g.nodes || [];
        links = (g.links || []).map(normLink);
        tRange = g.time_range;
      } catch {
        // Fallback to old 2-call pattern.
        const l = await api('links?' + qs({ since }));
        links = (l || []).map(normLink);
        const ids = new Set();
        links.forEach(lk => { ids.add(lk.source); ids.add(lk.target); });
        if (ids.size > 0) {
          const lb = await api('labels?' + qs({ ids: [...ids].join(',') }));
          nodes = [...ids].map(id => {
            const info = (lb || {})[id] || {};
            return { id, workspace: info.workspace || '', title: info.title || '' };
          });
        }
      }

      // Build node lookup, normalizing ids to match link endpoints. Keep the
      // full id for parent/run references used by workflow layout.
      const nd = {};
      let sawWorkflow = false;
      nodes.forEach(n => {
        const nid = normID(n.id);
        nd[nid] = {
          ...n,
          id: nid,
          full_id: n.id,
          parent_session_id: n.parent_session_id ? normID(n.parent_session_id) : undefined,
          parent_session_full_id: n.parent_session_id || '',
        };
        if (n.node_type === 'workflow') sawWorkflow = true;
      });
      setHasWorkflows(sawWorkflow);

      // Ensure all link endpoints have a node entry.
      links.forEach(l => {
        if (!nd[l.source]) nd[l.source] = { id: l.source };
        if (!nd[l.target]) nd[l.target] = { id: l.target };
      });

      // Compute time range from link timestamps.
      let tMin = Infinity, tMax = -Infinity;
      if (tRange) {
        tMin = new Date(tRange.min).getTime();
        tMax = new Date(tRange.max).getTime();
      } else {
        links.forEach(l => {
          if (l.timestamp) {
            const t = new Date(l.timestamp).getTime();
            if (t < tMin) tMin = t;
            if (t > tMax) tMax = t;
          }
        });
      }
      if (!isFinite(tMin)) tMin = Date.now() - 3600000;
      if (!isFinite(tMax)) tMax = Date.now();
      // Add a small buffer so the last link is visible at max.
      if (tMax <= tMin) tMax = tMin + 1000;

      setAllLinks(links);
      setNodeData(nd);
      setTimeRange({ min: tMin, max: tMax });
      setScrubberPos(1);
      prevVisibleCount.current = links.length;
    } catch (e) { console.error('graph:', e); }
    setLoading(false);
  }, [since, graphMode]);

  useEffect(() => { load(); }, [load]);
  // Graph does NOT auto-refresh on SSE — layout is expensive and causes visual jumps.
  // Use the refresh button instead.

  // Playback timer.
  useEffect(() => {
    if (!playing) { if (playRef.current) cancelAnimationFrame(playRef.current); return; }
    const duration = 5000; // 5s real time for full playback
    const start = performance.now();
    const startPos = 0;
    function tick(now) {
      const elapsed = now - start;
      const pos = Math.min(1, startPos + elapsed / duration);
      setScrubberPos(pos);
      if (pos < 1) { playRef.current = requestAnimationFrame(tick); }
      else { setPlaying(false); }
    }
    setScrubberPos(0);
    playRef.current = requestAnimationFrame(tick);
    return () => { if (playRef.current) cancelAnimationFrame(playRef.current); };
  }, [playing]);

  function onWheel(e) {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.1 : 0.1;
    setZoom(z => {
      const next = Math.max(0.3, Math.min(3, z + delta));
      // Zoom toward cursor: adjust pan so the point under the cursor stays fixed.
      const rect = containerRef.current?.getBoundingClientRect();
      if (rect) {
        const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
        const frac = (next - z) / z;
        setPanOffset(p => ({ x: p.x - cx * frac, y: p.y - cy * frac }));
      }
      return next;
    });
  }

  const didDrag = useRef(false);

  function onPointerDown(e) {
    // Only pan on primary button and not on interactive elements.
    if (e.button !== 0) return;
    const tag = e.target.tagName;
    if (tag === 'INPUT' || tag === 'BUTTON') return;
    dragStart.current = { x: e.clientX - panOffset.x, y: e.clientY - panOffset.y };
    didDrag.current = false;
    setDragging(true);
    e.currentTarget.setPointerCapture(e.pointerId);
  }
  function onPointerMove(e) {
    if (!dragStart.current || !dragging) return;
    didDrag.current = true;
    setPanOffset({ x: e.clientX - dragStart.current.x, y: e.clientY - dragStart.current.y });
  }
  function onPointerUp(e) {
    dragStart.current = null;
    setDragging(false);
  }

  function resetView() {
    setZoom(1);
    setPanOffset({ x: 0, y: 0 });
  }

  // Effective layout mode: explicit choice, else auto (workflow when the data
  // has workflow runs, otherwise the inter-session view).
  const effectiveMode = graphMode || (hasWorkflows ? 'workflow' : 'sessions');

  function selectMode(m) {
    setGraphMode(m);
    updateParams({ since, q: graphQuery, ws: wsFilter, mode: m });
    resetView();
  }

  // Fit recomputes pan/zoom to frame the current node bounds. The SVG viewBox
  // already frames all nodes, so fit resets the overlay transform to 1:1 —
  // distinct from a manual zoom level the user dialed in.
  function fitView() {
    setZoom(1);
    setPanOffset({ x: 0, y: 0 });
  }

  function toggleWorkflow(runID) {
    setExpandedWorkflows(prev => {
      const next = { ...prev };
      if (next[runID]) delete next[runID]; else next[runID] = true;
      return next;
    });
  }

  // Unique workspaces from node data for filter chips.
  const workspaces = useMemo(() => {
    const ws = new Set();
    Object.values(nodeData).forEach(n => { if (n.workspace) ws.add(n.workspace); });
    return [...ws].sort();
  }, [nodeData]);

  // Filter nodes by search query and workspace. In workflow mode, child agents
  // of collapsed workflows are hidden until their workflow is expanded.
  const filteredNodeIds = useMemo(() => {
    const all = Object.keys(nodeData);
    const q = graphQuery.toLowerCase();
    return all.filter(id => {
      const n = nodeData[id];
      if (effectiveMode === 'workflow' && n.node_type === 'workflow_agent') {
        if (!isExpanded(n.workflow_run_id)) return false;
      }
      if (wsFilter && (!n.workspace || n.workspace !== wsFilter)) return false;
      if (activeOnly && !n.is_active) return false;
      if (q) {
        const haystack = [id, n.title || '', n.workspace || '', n.name || ''].join(' ').toLowerCase();
        if (!haystack.includes(q)) return false;
      }
      return true;
    });
  }, [nodeData, graphQuery, wsFilter, activeOnly, effectiveMode, expandedWorkflows]);

  // Only show links where both endpoints are visible.
  const filteredNodeSet = useMemo(() => new Set(filteredNodeIds), [filteredNodeIds]);

  // Compute scrubber cutoff time.
  const cutoffTime = timeRange.min + (timeRange.max - timeRange.min) * scrubberPos;

  // Classify a link's edge type for filtering.
  function edgeType(l) {
    const et = l.edge_type || '';
    if (et === 'workflow_contains' || et === 'workflow_spawn') return 'workflow';
    const act = l.action || '';
    const kind = l.kind || '';
    if (kind === 'team' || act === 'team-spawn' || act === 'team-message') return 'team';
    if (act === 'get-screen' || act === 'get-buffer') return 'observation';
    if (act === 'split') return 'split';
    return 'message';
  }

  // Filter links by scrubber position, node visibility, and edge type.
  const visibleLinks = useMemo(() => {
    return allLinks.filter(l => {
      if (!filteredNodeSet.has(l.source) || !filteredNodeSet.has(l.target)) return false;
      if (scrubberPos < 1 && l.timestamp) {
        if (new Date(l.timestamp).getTime() > cutoffTime) return false;
      }
      if (!edgeFilter[edgeType(l)]) return false;
      return true;
    });
  }, [allLinks, cutoffTime, scrubberPos, filteredNodeSet, edgeFilter]);

  // Track newly appearing links for animation.
  const newLinkIndices = useMemo(() => {
    const prev = prevVisibleCount.current;
    const curr = visibleLinks.length;
    const indices = new Set();
    if (curr > prev && playing) {
      for (let i = prev; i < curr; i++) indices.add(i);
    }
    prevVisibleCount.current = curr;
    return indices;
  }, [visibleLinks.length, playing]);

  // Count links per node for sizing.
  const nodeLinkCount = useMemo(() => {
    const counts = {};
    visibleLinks.forEach(l => {
      counts[l.source] = (counts[l.source] || 0) + 1;
      counts[l.target] = (counts[l.target] || 0) + 1;
    });
    return counts;
  }, [visibleLinks]);

  if (loading) return html`<div class="loading">loading graph...</div>`;

  const allNodeIds = Object.keys(nodeData);
  if (allNodeIds.length === 0) return html`<div class="empty">no graph data for this range</div>`;

  // Group nodes by workspace for clustered layout.
  const wsGroups = useMemo(() => {
    const groups = {};
    filteredNodeIds.forEach(id => {
      const ws = (nodeData[id] && nodeData[id].workspace) || '(unknown)';
      if (!groups[ws]) groups[ws] = [];
      groups[ws].push(id);
    });
    return groups;
  }, [filteredNodeIds, nodeData]);

  // Group nodes by team_name for team cluster overlays.
  const teamGroups = useMemo(() => {
    const groups = {};
    filteredNodeIds.forEach(id => {
      const tn = nodeData[id] && nodeData[id].team_name;
      if (tn) {
        if (!groups[tn]) groups[tn] = [];
        groups[tn].push(id);
      }
    });
    return groups;
  }, [filteredNodeIds, nodeData]);

  // Deterministic hierarchical layout for workflow mode: parent sessions as
  // roots, workflows in a row beneath each, child agents in a grid beneath an
  // expanded workflow. Ordered by started_at then id; no overlap.
  const workflowPos = useMemo(() => {
    if (effectiveMode !== 'workflow') return null;
    const pos = {};
    const visible = new Set(filteredNodeIds);
    const sessionsList = filteredNodeIds.filter(id => nodeData[id].node_type === 'session');
    const wfBySession = {};
    filteredNodeIds.forEach(id => {
      const nn = nodeData[id];
      if (nn.node_type === 'workflow' && visible.has(nn.parent_session_id)) {
        (wfBySession[nn.parent_session_id] ||= []).push(id);
      }
    });
    const agentsByWf = {};
    const subBySession = {};
    filteredNodeIds.forEach(id => {
      const nn = nodeData[id];
      if (nn.node_type === 'workflow_agent') {
        (agentsByWf[nn.workflow_run_id] ||= []).push(id);
      } else if (nn.node_type === 'subagent' && visible.has(nn.parent_session_id)) {
        (subBySession[nn.parent_session_id] ||= []).push(id);
      }
    });
    const byStart = (a, b) => {
      const sa = nodeData[a].started_at || 0, sb = nodeData[b].started_at || 0;
      return sa !== sb ? sa - sb : (a < b ? -1 : 1);
    };
    sessionsList.sort(byStart);

    const COL_W = 240, SESS_Y = 0, WF_Y = 90, WF_H = 60, AGENT_W = 70, AGENT_H = 34, AGENT_GAP = 8;
    let colX = 0;
    sessionsList.forEach(sid => {
      const wfs = (wfBySession[sid] || []).sort(byStart);
      // Width this session column needs: max of its own box and its workflows row.
      const wfRowW = Math.max(1, wfs.length) * (COL_W - 20);
      const colWidth = Math.max(COL_W, wfRowW);
      pos[sid] = { x: colX + colWidth / 2, y: SESS_Y, vx: 0, vy: 0 };
      let wx = colX + (colWidth - wfRowW) / 2;
      wfs.forEach(wfid => {
        const cx = wx + (COL_W - 20) / 2;
        pos[wfid] = { x: cx, y: WF_Y, vx: 0, vy: 0 };
        const agents = (agentsByWf[nodeData[wfid].full_id] || agentsByWf[wfid] || []).slice().sort(byStart);
        if (agents.length) {
          // Grid the agents below the workflow node.
          const perRow = Math.max(1, Math.min(agents.length, Math.ceil(Math.sqrt(agents.length))));
          const gridW = perRow * (AGENT_W + AGENT_GAP);
          agents.forEach((aid, i) => {
            const r = Math.floor(i / perRow), c = i % perRow;
            pos[aid] = {
              x: cx - gridW / 2 + AGENT_W / 2 + c * (AGENT_W + AGENT_GAP),
              y: WF_Y + WF_H + 10 + r * (AGENT_H + AGENT_GAP),
              vx: 0, vy: 0,
            };
          });
        }
        wx += COL_W - 20;
      });
      // Subagents the session spawned directly: a grid below the workflow row
      // (or below the session node when there are no workflows).
      const subs = (subBySession[sid] || []).slice().sort(byStart);
      if (subs.length) {
        const baseY = wfs.length ? WF_Y + WF_H + 60 : SESS_Y + 70;
        const perRow = Math.max(1, Math.min(subs.length, Math.ceil(Math.sqrt(subs.length))));
        const gridW = perRow * (AGENT_W + AGENT_GAP);
        const cx = colX + colWidth / 2;
        subs.forEach((aid, i) => {
          const r = Math.floor(i / perRow), c = i % perRow;
          pos[aid] = {
            x: cx - gridW / 2 + AGENT_W / 2 + c * (AGENT_W + AGENT_GAP),
            y: baseY + r * (AGENT_H + AGENT_GAP),
            vx: 0, vy: 0,
          };
        });
      }
      colX += colWidth + 40;
    });
    return pos;
  }, [effectiveMode, filteredNodeIds, nodeData, expandedWorkflows]);

  // Force-directed layout: initialize from workspace clusters, then simulate.
  const forcePos = useMemo(() => {
    const pos = {};
    const wsKeys = Object.keys(wsGroups);
    const n = filteredNodeIds.length;
    if (n === 0) return pos;

    // Scale layout area based on node count.
    const area = Math.max(600, Math.sqrt(n) * 120);
    const cx = area / 2, cy = area / 2;
    const clusterRadius = wsKeys.length <= 1 ? 0 : Math.min(area * 0.35, 80 + wsKeys.length * 25);

    // Initialize positions from workspace-clustered arrangement.
    wsKeys.forEach((ws, gi) => {
      const group = wsGroups[ws];
      const clusterAngle = wsKeys.length <= 1 ? 0 : (2 * Math.PI * gi) / wsKeys.length - Math.PI / 2;
      const gcx = cx + clusterRadius * Math.cos(clusterAngle);
      const gcy = cy + clusterRadius * Math.sin(clusterAngle);
      if (group.length === 1) {
        pos[group[0]] = { x: gcx, y: gcy, vx: 0, vy: 0 };
      } else {
        const subR = Math.min(80, 20 + group.length * 10);
        group.forEach((id, ni) => {
          const a = (2 * Math.PI * ni) / group.length - Math.PI / 2;
          pos[id] = { x: gcx + subR * Math.cos(a), y: gcy + subR * Math.sin(a), vx: 0, vy: 0 };
        });
      }
    });

    // Workspace centroids for gravity.
    const wsCentroid = {};
    wsKeys.forEach(ws => {
      const group = wsGroups[ws];
      let sx = 0, sy = 0;
      group.forEach(id => { if (pos[id]) { sx += pos[id].x; sy += pos[id].y; } });
      wsCentroid[ws] = { x: sx / group.length, y: sy / group.length };
    });

    // Force simulation: 80 iterations.
    const ids = Object.keys(pos);
    const repulseK = 5000;  // Repulsion constant.
    const attractK = 0.01;  // Spring constant.
    const gravityK = 0.005; // Workspace gravity.
    const damping = 0.9;

    for (let iter = 0; iter < 80; iter++) {
      const alpha = 1 - iter / 80; // Cooling.

      // Repulsion: all pairs push apart.
      for (let i = 0; i < ids.length; i++) {
        for (let j = i + 1; j < ids.length; j++) {
          const a = pos[ids[i]], b = pos[ids[j]];
          let dx = b.x - a.x, dy = b.y - a.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 1) { dx = Math.random() - 0.5; dy = Math.random() - 0.5; dist = 1; }
          const force = repulseK / (dist * dist) * alpha;
          const fx = (dx / dist) * force, fy = (dy / dist) * force;
          a.vx -= fx; a.vy -= fy;
          b.vx += fx; b.vy += fy;
        }
      }

      // Attraction: connected nodes pull together.
      visibleLinks.forEach(l => {
        const a = pos[l.source], b = pos[l.target];
        if (!a || !b) return;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 1) return;
        // Target distance based on whether same workspace.
        const nA = nodeData[l.source], nB = nodeData[l.target];
        const sameWs = nA && nB && nA.workspace && nA.workspace === nB.workspace;
        const ideal = sameWs ? 80 : 160;
        const force = attractK * (dist - ideal) * alpha;
        const fx = (dx / dist) * force, fy = (dy / dist) * force;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      });

      // Workspace gravity: light pull toward cluster centroid.
      wsKeys.forEach(ws => {
        const c = wsCentroid[ws];
        wsGroups[ws].forEach(id => {
          const p = pos[id];
          if (!p) return;
          p.vx += (c.x - p.x) * gravityK * alpha;
          p.vy += (c.y - p.y) * gravityK * alpha;
        });
      });

      // Apply velocities with damping.
      ids.forEach(id => {
        const p = pos[id];
        p.vx *= damping;
        p.vy *= damping;
        // Clamp velocity.
        const maxV = 20;
        const v = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (v > maxV) { p.vx = (p.vx / v) * maxV; p.vy = (p.vy / v) * maxV; }
        p.x += p.vx;
        p.y += p.vy;
      });
    }

    return pos;
  }, [filteredNodeIds, wsGroups, visibleLinks, nodeData]);

  // Active positions: deterministic workflow layout, else the force layout.
  const nodePos = workflowPos || forcePos;

  // Dynamic viewBox from node positions.
  const viewBox = useMemo(() => {
    const ids = Object.keys(nodePos);
    if (ids.length === 0) return { x: 0, y: 0, w: 800, h: 540 };
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    ids.forEach(id => {
      const p = nodePos[id];
      const w2 = nodeWidth(id) / 2 + 20;
      const h2 = nodeHeight(id) / 2 + 20;
      if (p.x - w2 < minX) minX = p.x - w2;
      if (p.y - h2 < minY) minY = p.y - h2;
      if (p.x + w2 > maxX) maxX = p.x + w2;
      if (p.y + h2 > maxY) maxY = p.y + h2;
    });
    const pad = 40;
    return { x: minX - pad, y: minY - pad, w: maxX - minX + pad * 2, h: maxY - minY + pad * 2 };
  }, [nodePos, filteredNodeIds, nodeData, nodeLinkCount]);

  // Compute workspace regions from final positions for group outlines.
  const wsRegions = useMemo(() => {
    const regions = [];
    const wsKeys = Object.keys(wsGroups);
    wsKeys.forEach(ws => {
      const group = wsGroups[ws];
      let sx = 0, sy = 0, count = 0;
      let maxR = 0;
      group.forEach(id => {
        const p = nodePos[id];
        if (p) { sx += p.x; sy += p.y; count++; }
      });
      if (count === 0) return;
      const cx = sx / count, cy = sy / count;
      group.forEach(id => {
        const p = nodePos[id];
        if (!p) return;
        const d = Math.sqrt((p.x - cx) * (p.x - cx) + (p.y - cy) * (p.y - cy));
        if (d > maxR) maxR = d;
      });
      regions.push({ ws, x: cx, y: cy, r: maxR + 55, nodes: group });
    });
    return regions;
  }, [wsGroups, nodePos]);

  // Edge pair grouping for parallel edge offset.
  const edgePairIndex = useMemo(() => {
    const pairCount = {};
    const pairSeen = {};
    visibleLinks.forEach(l => {
      const key = [l.source, l.target].sort().join(':');
      pairCount[key] = (pairCount[key] || 0) + 1;
    });
    const result = [];
    visibleLinks.forEach(l => {
      const key = [l.source, l.target].sort().join(':');
      const total = pairCount[key] || 1;
      const idx = pairSeen[key] || 0;
      pairSeen[key] = idx + 1;
      result.push({ idx, total });
    });
    return result;
  }, [visibleLinks]);

  // Node label: workflow name / agent name for workflow nodes, else short ID + project.
  function nodeLabel(id) {
    const n = nodeData[id];
    if (!n) return id.slice(0, 8);
    if (n.node_type === 'workflow') return n.name || id;
    if (n.node_type === 'workflow_agent') return workflowGraphAgentLabel(n, id);
    if (n.node_type === 'subagent') return n.name || n.title || id.slice(0, 8);
    if (n.workspace) return id.slice(0, 8) + ' ' + shortProject(n.workspace);
    return id.slice(0, 8);
  }

  // Node sub-info: workflow status/agent count for workflow nodes, else stats.
  function nodeInfo(id) {
    const n = nodeData[id];
    if (!n) return '';
    if (n.node_type === 'workflow') {
      const parts = [];
      if (n.status) parts.push(n.status);
      parts.push((n.agent_count || 0) + ' agents');
      if (n.journal_event_count) parts.push(n.journal_event_count + ' events');
      return parts.join(' · ');
    }
    if (n.node_type === 'workflow_agent') return workflowGraphAgentInfo(n);
    if (n.node_type === 'subagent') return n.status || 'subagent';
    const parts = [];
    if (n.tool_calls) parts.push(n.tool_calls + ' tools');
    if (n.turns) parts.push(n.turns + ' turns');
    if (n.node_type === 'session' && n.workflow_count) parts.push(n.workflow_count + ' wf');
    if (n.started_at) {
      // started_at may be unix seconds (number) or RFC3339 string.
      const ts = typeof n.started_at === 'number' ? new Date(n.started_at * 1000).toISOString() : n.started_at;
      parts.push(relTime(ts));
    }
    return parts.join(' · ');
  }

  function isActive(id) {
    const n = nodeData[id];
    if (!n) return false;
    return !!n.is_active;
  }

  // Node box size scales with label and link count. Workflow nodes are wider;
  // child agents are compact.
  function nodeWidth(id) {
    const n = nodeData[id];
    const label = nodeLabel(id);
    if (n && n.node_type === 'workflow_agent') return 70;
    if (n && n.node_type === 'subagent') return Math.max(80, label.length * 6.5 + 16);
    const min = n && n.node_type === 'workflow' ? 150 : 70;
    const base = Math.max(min, label.length * 6.5 + 16);
    const links = nodeLinkCount[id] || 0;
    return base + Math.min(links * 3, 24);
  }
  function nodeHeight(id) {
    const n = nodeData[id];
    if (n && n.node_type === 'workflow_agent') return 30;
    const info = nodeInfo(id);
    return info ? 36 : 24;
  }

  // Hovered node for edge highlighting.
  const [hoveredNode, setHoveredNode] = useState(null);

  function onNodeEnter(id, e) {
    const n = nodeData[id];
    if (!n) return;
    setHoveredNode(id);
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    setTooltip({
      id,
      x: e.clientX - rect.left + 12,
      y: e.clientY - rect.top - 8,
    });
  }
  function onNodeLeave() { setTooltip(null); setHoveredNode(null); }

  // Node click → workflow nodes toggle their child agents; session/agent nodes
  // navigate to search.
  function onNodeClick(id) {
    if (didDrag.current) return;
    const n = nodeData[id];
    if (n && n.node_type === 'workflow') {
      toggleWorkflow(n.full_id || id);
      return;
    }
    if (n && n.node_type === 'workflow_agent') {
      if (onNavigate) {
        const sessionID = n.parent_session_full_id || n.parent_session_id || id;
        onNavigate('search', { session_id: sessionID, detail_tab: 'workflows', workflow_agent: n.full_id || id });
      }
      return;
    }
    if (n && n.node_type === 'subagent') {
      // The subagent id is the spawned session's own id; search for it.
      if (onNavigate) onNavigate('search', { q: id });
      return;
    }
    if (onNavigate) onNavigate('search', { q: id });
  }

  // Edge tooltip state.
  const [edgeTooltip, setEdgeTooltip] = useState(null);  // {link, x, y}

  function onEdgeEnter(link, e) {
    const rect = containerRef.current?.getBoundingClientRect();
    if (!rect) return;
    setEdgeTooltip({
      link,
      x: e.clientX - rect.left + 12,
      y: e.clientY - rect.top - 8,
    });
  }
  function onEdgeLeave() { setEdgeTooltip(null); }

  // Format scrubber time display.
  const scrubberLabel = new Date(cutoffTime).toLocaleString(undefined, {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
  });

  const timePresets = [
    { label: '1h', value: '1h' }, { label: '24h', value: '24h' },
    { label: '7d', value: '168h' }, { label: '30d', value: '720h' },
  ];

  return html`
    <div class="graph-panel">
      <div class="filters" style="margin-bottom:4px">
        <input class="filter-input" placeholder="search graph..." value=${graphQuery}
          onInput=${e => setGraphQuery(e.target.value)} style="width:180px" />
        <div class="filter-chips">
          ${timePresets.map(t => html`
            <button class="filter-chip ${since === t.value ? 'active' : ''}"
              onClick=${() => setSince(t.value)}>${t.label}</button>
          `)}
        </div>
        <button class="btn btn-sm" onClick=${load}>refresh</button>
      </div>
      <div class="filters" style="margin-bottom:4px">
        <span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">layout</span>
        <div class="filter-chips">
          ${[
            { v: 'workflow', label: 'workflow' },
            { v: 'sessions', label: 'sessions' },
            { v: 'teams', label: 'teams' },
            { v: 'network', label: 'network' },
          ].map(m => html`
            <button class="filter-chip ${effectiveMode === m.v ? 'active' : ''}"
              onClick=${() => selectMode(m.v)}
              title=${m.v === 'network' ? 'force-directed (debug)' : ''}>${m.label}</button>
          `)}
        </div>
        ${effectiveMode === 'workflow' && hasWorkflows && html`
          <button class="filter-chip" style="margin-left:8px"
            onClick=${() => {
              const allWf = Object.values(nodeData).filter(x => x.node_type === 'workflow');
              const anyCollapsed = allWf.some(x => !isExpanded(x.full_id || x.id));
              const next = {};
              if (anyCollapsed) allWf.forEach(x => { next[x.full_id || x.id] = true; });
              setExpandedWorkflows(next);
            }}>expand/collapse all</button>
        `}
      </div>
      ${workspaces.length > 1 && html`
        <div class="filters" style="margin-bottom:4px">
          <span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">workspace</span>
          <div class="filter-chips">
            <button class="filter-chip ${wsFilter === '' ? 'active' : ''}"
              onClick=${() => setWsFilter('')}>all</button>
            ${workspaces.map(ws => html`
              <button class="filter-chip ${wsFilter === ws ? 'active' : ''}"
                onClick=${() => setWsFilter(wsFilter === ws ? '' : ws)}
                title=${ws}>${shortProject(ws)}</button>
            `)}
          </div>
        </div>
      `}
      <div class="filters" style="margin-bottom:4px">
        <span style="font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em">edges</span>
        <div class="filter-chips">
          <button class="filter-chip ${edgeFilter.message ? 'active' : ''}"
            onClick=${() => setEdgeFilter(f => ({ ...f, message: !f.message }))}>
            <span style="color:var(--accent)">—</span> it2 msg</button>
          <button class="filter-chip ${edgeFilter.observation ? 'active' : ''}"
            onClick=${() => setEdgeFilter(f => ({ ...f, observation: !f.observation }))}>
            <span style="color:var(--faint)">--</span> observe</button>
          <button class="filter-chip ${edgeFilter.split ? 'active' : ''}"
            onClick=${() => setEdgeFilter(f => ({ ...f, split: !f.split }))}>
            <span style="color:var(--green)">··</span> split</button>
          <button class="filter-chip ${edgeFilter.team ? 'active' : ''}"
            onClick=${() => setEdgeFilter(f => ({ ...f, team: !f.team }))}>
            <span style="color:var(--magenta)">—</span> team msg <span style="color:var(--magenta);opacity:0.7">··</span> spawn</button>
          ${hasWorkflows && html`
            <button class="filter-chip ${edgeFilter.workflow ? 'active' : ''}"
