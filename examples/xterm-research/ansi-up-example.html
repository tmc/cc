<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ansi_up - Simple ANSI to HTML Converter Example</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 {
            margin: 0 0 20px 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        #output {
            background: #0e0e0e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 20px;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            overflow-y: auto;
            max-height: 600px;
            white-space: pre-wrap;
        }
        .controls {
            margin-bottom: 15px;
        }
        button {
            padding: 8px 16px;
            margin-right: 10px;
            background: #0e639c;
            border: none;
            color: white;
            border-radius: 3px;
            cursor: pointer;
        }
        button:hover {
            background: #1177bb;
        }
        .message-header {
            font-weight: bold;
            margin-top: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        .message-content {
            margin-left: 15px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ansi_up - Simple ANSI to HTML Converter</h1>

        <div class="controls">
            <button onclick="addUserMessage()">Add User Message</button>
            <button onclick="addAssistantMessage()">Add Assistant Message</button>
            <button onclick="addToolUse()">Add Tool Use</button>
            <button onclick="addToolResult()">Add Tool Result</button>
            <button onclick="clearOutput()">Clear</button>
        </div>

        <div id="output"></div>
    </div>

    <script type="module">
        import AnsiUp from 'https://esm.sh/ansi_up@6.0.2';

        const ansi_up = new AnsiUp();
        const output = document.getElementById('output');

        // Enable URL detection for clickable links
        ansi_up.use_classes = false;  // Use inline styles instead of classes

        // Helper to append formatted HTML
        function appendHTML(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
        }

        // Format timestamp
        function timestamp() {
            return new Date().toLocaleTimeString();
        }

        // Simulate Claude Code message types
        function addMessage(type, content) {
            let ansiText = '';

            switch(type) {
                case 'user':
                    ansiText = `\x1b[1;36m[${timestamp()}] User:\x1b[0m\n  ${content}\n`;
                    break;

                case 'assistant':
                    ansiText = `\x1b[1;32m[${timestamp()}] Assistant:\x1b[0m\n  ${content}\n`;
                    break;

                case 'tool_use':
                    ansiText = `\x1b[1;33m[${timestamp()}] Tool Use: ${content.name}\x1b[0m\n`;
                    if (content.input) {
                        ansiText += `\x1b[2m  ${JSON.stringify(content.input, null, 2)}\x1b[0m\n`;
                    }
                    break;

                case 'tool_result':
                    ansiText = `\x1b[1;34m[${timestamp()}] Tool Result:\x1b[0m\n`;
                    ansiText += `\x1b[2m  ${content}\x1b[0m\n`;
                    break;

                case 'error':
                    ansiText = `\x1b[1;31m[${timestamp()}] Error:\x1b[0m\n  \x1b[31m${content}\x1b[0m\n`;
                    break;
            }

            const html = ansi_up.ansi_to_html(ansiText);
            appendHTML(html);
        }

        // Example functions for demo
        window.addUserMessage = function() {
            addMessage('user', 'Can you help me debug this Go code?');
        };

        window.addAssistantMessage = function() {
            addMessage('assistant', 'I\'ll help you debug that code. Let me read the file first.');
        };

        window.addToolUse = function() {
            addMessage('tool_use', {
                name: 'Read',
                input: { file_path: '/Volumes/tmc/go/src/github.com/tmc/cc/main.go' }
            });
        };

        window.addToolResult = function() {
            const result = `package main

import (
    "fmt"
)

func main() {
    fmt.Println("Hello, World!")
}`;
            addMessage('tool_result', result);
        };

        window.clearOutput = function() {
            output.innerHTML = '';
        };

        // Initial welcome message
        const welcomeText = `\x1b[1;36mSession Replay Viewer (ansi_up)\x1b[0m
\x1b[2mSimple ANSI-to-HTML conversion for Claude Code sessions\x1b[0m
\x1b[2m${'─'.repeat(80)}\x1b[0m

`;
        appendHTML(ansi_up.ansi_to_html(welcomeText));

        // Make ansi_up available globally for debugging
        window.ansi_up = ansi_up;

    </script>
</body>
</html>
